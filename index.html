r":"Challenging (+0) Willpower test","Range":"20 meters x psy rating","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Shoots lightning","Page":"PG 202 CB","Name":"Smite","XP Cost":200,"School":"Biomancy","Summary School":"Biomancy"},{"Power":"Shape Flesh","Source Sheet":"PP Biomancy","Cost":"200 XP","Prerequisite":"Perception 35, Toughness 30","Action":"Full Action","Focus Power":"Concentration","Range":"1 meter","Sustained":"Free Action","Subtype":"Concentration","Effect":"Chooses himself or an organic target that he can physically touch. The target’s physical appearance changes to a new form of the psyker’s choosing for the duration of the power. The amount and precision of the alterations depend on the final psy rating used.","Page":"PG 202 CB","Name":"Shape Flesh","XP Cost":200,"School":"Biomancy","Summary School":"Biomancy"},{"Power":"Enfeeble","Source Sheet":"PP Biomancy","Cost":"100 xp","Prerequisite":"Toughness 35","Action":"Half Action","Focus Power":"Challenging (+0) Opposed Willpower test","Range":"20 metres x psy rating","Sustained":"Half Action","Subtype":"Attack, Concentration","Effect":"A single target in range and line of sight who opposes this power with a Toughness test. If failed, it is Stunned for one round. Also, as power remains in effect, if the target rolls doubles on any test it makes, it suffers a number of levels of Fatigue equal to half the psyker’s psy rating (rounded down). Target can only be affected by one Enfeeble power at a time","Page":"PG 200 CB","Name":"Enfeeble","XP Cost":100,"School":"Biomancy","Summary School":"Biomancy"},{"Power":"Iron Arm","Source Sheet":"PP Biomancy","Cost":"400 xp","Prerequisite":"Strength 35, Toughness 35","Action":"Half Action","Focus Power":"Hard (-20) Willpower Test","Range":"Self","Sustained":"Free Action","Subtype":"Concentration","Effect":"While this power is in effect, the psyker gains the Unnatural Toughness and Unnatural Strength traits with ratings equal to half his psy rating, rounded up. However, his flesh’s sturdier form weighs the psyker down, causing him to suffer a -10 penalty to his Agility characteristic while the power is in effect.","Page":"PG 200 CB","Name":"Iron Arm","XP Cost":400,"School":"Biomancy","Summary School":"Biomancy"},{"Power":"Endurance","Source Sheet":"PP Biomancy","Cost":"300 xp","Prerequisite":"Toughness 30","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"3 metres x psy rating radius","Sustained":"No","Subtype":"Concentration","Effect":"A number of allies in range equal to the psyker’s psy rating, plus the psyker himself, recover wounds equal to half the psyker’s psy rating, rounded up. They can also immediately overcome the effects of Pinning. This power is incredibly taxing and requires at least 12 hours of recovery before it may be used again.","Page":"PG 200 CB","Name":"Endurance","XP Cost":300,"School":"Biomancy","Summary School":"Biomancy"},{"Power":"Life Leech","Source Sheet":"PP Biomancy","Cost":"400 XP","Prerequisite":"Toughness 40","Action":"Full Action","Focus Power":"Opposed Difficult (-10) Willpower test","Range":"10 metres x psy rating","Sustained":"Free Action","Subtype":"Attack, Concentration","Effect":"Nominates a single target in range and line of sight who opposes this power with a Toughness test. If target fails, they suffers 1d10 + psy rating Toughness damage, and the psyker gains Unnatural Toughness (1) trait, with its value increased by 1 for every full 5 points of Toughness damage the power inflicts. This Unnatural Toughness trait remains for as long as the power’s effect persists.","Page":"PG 201 CB","Name":"Life Leech","XP Cost":400,"School":"Biomancy","Summary School":"Biomancy"},{"Power":"Warp Speed","Source Sheet":"PP Biomancy","Cost":"500 xp","Prerequisite":"Psy rating 5","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"Self","Sustained":"Free Action","Subtype":"Concentration","Effect":"The psyker gains the Unnatural Weapon Skill, Unnatural Ballistic Skill, and Unnatural Agility traits, all at values equal to his psy rating.","Page":"PG 202 CB","Name":"Warp Speed","XP Cost":500,"School":"Biomancy","Summary School":"Biomancy"},{"Power":"Hemorrhage","Source Sheet":"PP Biomancy","Cost":"400 xp","Prerequisite":"Psy rating 4","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"1 m","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Nominates a single target in range and line of sight who opposes this power with a Toughness test. If  failed to resist the power, suffers Energy damage equal to the psyker’s psy rating, plus one additional damage per degree of failure on its Toughness test; this damage ignores Toughness bonus and Armour. If this damage successfully kills the target, the psyker may immediately recast this psychic power as a Free Action on any legal target within 5 metres of the original target.","Page":"PG 200 CB","Name":"Hemorrhage","XP Cost":400,"School":"Biomancy","Summary School":"Biomancy"},{"Power":"Warp Perception","Source Sheet":"PP Divination","Cost":"100 xp","Prerequisite":"Willpower 35","Action":"Half Action","Focus Power":"Challenging (+0) Psyniscience test","Range":"Self","Sustained":"Half Action","Subtype":"Concentration","Effect":"The psyker gains the Unnatural Senses (X) trait, where the X value is equal to the psy rating multiplied by 10.","Page":"PG 204 CB","Name":"Warp Perception","XP Cost":100,"School":"Divination","Summary School":"Divination"},{"Power":"Prescience","Source Sheet":"PP Divination","Cost":"200 xp","Prerequisite":"Psyniscience Rank 1","Action":"Half Action","Focus Power":"Challenging (+0) Psyniscience test","Range":"3 metres x psy rating radius","Sustained":"Half Action","Subtype":"Concentration","Effect":"For the duration of this power, the psyker and a number of allies equal to his psy rating within range, gain a bonus to their Weapon Skill and Ballistic Skill tests equal to twice the psyker’s psy rating. Allies affected by this power lose its benefit as soon as they move out of range.","Page":"PG 204 CB","Name":"Prescience","XP Cost":200,"School":"Divination","Summary School":"Divination"},{"Power":"Foreboding","Source Sheet":"PP Divination","Cost":"200 xp","Prerequisite":"Psyniscience rank 1","Action":"Reaction","Focus Power":"Difficult (-10) Perception test","Range":"Self","Sustained":"No","Subtype":"Concentration","Effect":"In any situation where the psyker would be called upon to make an Evasion test, he may instead attempt to use this power. If the power is successful, the psyker avoids the attack exactly as if he has passed an Evasion test with the number of degrees of success he scored on the Focus Power test.","Page":"PG 203 CB","Name":"Foreboding","XP Cost":200,"School":"Divination","Summary School":"Divination"},{"Power":"Misfortune","Source Sheet":"PP Divination","Cost":"Willpower 45","Prerequisitee":"Half Action","Action":"Difficult (-10) Opposed Willpower test","Focus Power":"20 metres x psy rating","Range":"20 metres x psy rating","Sustained":"Free Action","Subtype":"Attack, Concentration","Effect":"The psyker nominates a single target in range and line ofsight who opposes this power with a Willpower test. If the target fails to resist the power, misfortune follows it wherever it goes. For the duration of this power, the target’s Armour points are reduced in all locations by half the psyker’s psy rating, rounded up. The target’s weapons also jam on any attack in which they fail to hit their target.","Page":"PG 203 CB","Name":"Misfortune","XP Cost":0,"School":"Divination","Summary School":"Divination"},{"Power":"Scier's Gaze","Source Sheet":"PP Divination","Cost":"200 xp","Prerequisite":"Psyniscience rank 2","Action":"Special","Focus Power":"Challenging (+0) Psyniscience test","Range":"Self","Sustained":"No","Subtype":"Concentration","Effect":"To begin the ritual, the psyker must spend at least thirty minutes using assorted psychic foci to concentrate his vision: drawing Tarot cards, casting runes, gazing deep into fire, or other methods as varied as the stars of the Imperium. At the end of this time, he makes his Focus Power test to project his vision over the area, with the GM revealing information based on the degrees of success","Page":"PG 204 CB","Name":"Scier's Gaze","XP Cost":200},{"Power":"Forewarning","Source Sheet":"PP Divination","Cost":"400 xp","Prerequisite":"Perception 50","Action":"Half Action","Focus Power":"Challenging (+0) Psyniscience test","Range":"3 metres x psy rating radius","Sustained":"Free Action","Subtype":"Concentration","Effect":"For the duration of this power, a number of allies within range equal to the psyker’s psy rating, plus the psyker himself, gain a bonus to all Evasion tests equal to twice the psyker’s psy rating. Allies affected by this power lose its benefits as soon as they move out of range.","Page":"PG 203 CB","Name":"Forewarning","XP Cost":400,"School":"Divination","Summary School":"Divination"},{"Power":"Precognition","Source Sheet":"PP Divination","Cost":"400 xp","Prerequisite":"Perception 45, Willpower 45","Action":"Full Action","Focus Power":"Hard (-20) Psyniscience test","Range":"5 metres x psy rating radius","Sustained":"No","Subtype":"Concentration","Effect":"The psyker gains a number of re-rolls equal to his psy rating that last until the beginning of the his next turn. For the duration of that round, whenever the psyker or an ally in range makes a test or damage roll, the psyker may spend one of the rerolls to allow that ally to re-roll all dice involved in the roll. If the psyker is killed or rendered Unconscious before the beginning of his next turn, all remaining re-rolls are lost.","Page":"PG 203 CB","Name":"Precognition","XP Cost":400,"School":"Divination","Summary School":"Divination"},{"Power":"Winding Fate","Source Sheet":"PP Divination","Cost":"500 xp","Prerequisite":"Perception 50","Action":"Full Action","Focus Power":"Difficult (-10) Psyniscience test","Range":"Self","Sustained":"No","Subtype":"Concentration","Effect":"The vision lasts for a number of seconds equal to the twice the psy rating, and can be from the subject’s future or past a number of days equal to the psy rating. The higher the psy rating, the more the psyker can control what his flashes focus on (at the GM’s discretion).","Page":"PG 205 CB","Name":"Winding Fate","XP Cost":500,"School":"Divination","Summary School":"Divination"},{"Power":"Perfect Timing","Source Sheet":"PP Divination","Cost":"300 xp","Prerequisite":"Perception 55","Action":"Half Action","Focus Power":"Difficult (-10) Psyniscience test","Range":"3 metres x psy rating radius","Sustained":"Half Action","Subtype":"Concentration","Effect":"For the duration of this power, the psyker and a number of allies equal to his psy rating within range, ignore the effects of cover when firing on a target. If their attacks would strike a Hit Location on the enemy that would benefit from cover, that benefit is ignored. Allies affected by this power lose its benefits as soon asthey move out of range.","Page":"PG 203 CB","Name":"Perfect Timing","XP Cost":300,"School":"Divination","Summary School":"Divination"},{"Power":"Manipulate Flame","Source Sheet":"PP Pyromancy","Cost":"100 xp","Prerequisite":"Willpower 35","Action":"Half Action","Focus Power":"Routine (+20) Willpower test","Range":"10 metres x psy rating","Sustained":"Half Action","Subtype":"Attack","Effect":"Chooses a patch of fire in range and line of sight with a radius no greater than PR metres. Each round, he can either extinguish or control the fire. If he extinguishes the fire, this power ends and the fire goes out. If he controls the fire, he can move it up to a number of metres equal to his psy rating per round along a flammable surface.","Page":"PG 208 CB","Name":"Manipulate Flame","XP Cost":100,"School":"Pyromancy","Summary School":"Pyromancy"},{"Power":"Fiery Form","Source Sheet":"PP Pyromancy","Cost":"400 xp","Prerequisite":"Psy rating 4","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"Self","Sustained":"Half Action","Subtype":"Concentration","Effect":"Psychic Attack. Effect: While this power is in effect, all of the psyker attacks deal additional Energy damage equal to his psy rating and gain the Flame quality. In addition, at the end of each of the psyker Blast centred on his location. Each character within the area of the blast, with the exception of the psyker himself, are struck.","Page":"PG 206 CB","Name":"Fiery Form","XP Cost":400,"School":"Pyromancy","Summary School":"Pyromancy"},{"Power":"Fire Shield","Source Sheet":"PP Pyromancy","Cost":"300 xp","Prerequisite":"Agility 40","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"20 metres x psy rating","Sustained":"Free Action","Subtype":"Concentration","Effect":"Any character in range and line of sight that successfully strikes the psyker with an attack immediately suffers Energy damage equal to the psyker rating. The degrees of success on this attack are equal to those from the Focus Power test, and the inflicted damage is not reduced by Armour or Toughness bonus.","Page":"PG 206 CB","Name":"Fire Shield","XP Cost":300,"School":"Pyromancy","Summary School":"Pyromancy"},{"Power":"Spontaneous Combustion","Source Sheet":"PP Pyromancy","Cost":"200 xp","Prerequisite":"Willpower 40","Action":"Half Action","Focus Power":"Ordinary (+10) Willpower test","Range":"20 metres x psy rating","Sustained":"No","Subtype":"Attack","Effect":"Psychic Attack. Burst into flames.","Page":"PG 208 CB","Name":"Spontaneous Combustion","XP Cost":200,"School":"Pyromancy","Summary School":"Pyromancy"},{"Power":"Flame Breath","Source Sheet":"PP Pyromancy","Cost":"300 xp","Prerequisite":"Psy Rating 3","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"20 metres x psy rating","Sustained":"No","Subtype":"Attack","Effect":"Psychic Attack. Shoot flames from breath and eyes.","Page":"","Name":"Flame Breath","XP Cost":300,"School":"Pyromancy","Summary School":"Pyromancy"},{"Power":"Cauterise","Source Sheet":"PP Pyromancy","Cost":"300 xp","Prerequisite":"Willpower 45","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"1 meter","Sustained":"No","Subtype":"Concentration","Effect":"The psyker chooses himself or another character he can physically touch. If the target is suffering from Blood Loss, successfully using the power removes that condition.","Page":"PG 206 CB","Name":"Cauterise","XP Cost":300,"School":"Pyromancy","Summary School":"Pyromancy"},{"Power":"Molten Beam","Source Sheet":"PP Pyromancy","Cost":"400 xp","Prerequisite":"Psy rating 4","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"5 metres x psy rating","Sustained":"No","Subtype":"Attack","Effect":"Psychic Attack. Flame Beam.","Page":"PG 208 CB","Name":"Molten Beam","XP Cost":400,"School":"Pyromancy","Summary School":"Pyromancy"},{"Power":"Sunburst","Source Sheet":"PP Pyromancy","Cost":"400 xp","Prerequisite":"Psy rating 4","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"20 metres x psy rating","Sustained":"No","Subtype":"Attack","Effect":"Psychic Attack. Nova of fire.","Page":"PG 208 CB","Name":"Sunburst","XP Cost":400,"School":"Pyromancy","Summary School":"Pyromancy"},{"Power":"Inferno","Source Sheet":"PP Pyromancy","Cost":"500 xp","Prerequisite":"Psy rating 5","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"10 meters x psy rating","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Psychic Attack. Disco Inferno","Page":"PG 207 CB","Name":"Inferno","XP Cost":500,"School":"Pyromancy","Summary School":"Pyromancy"},{"Power":"Telekinetic Control","Source Sheet":"PP Telekinesis","Cost":"100 xp","Prerequisite":"Willpower 35","Action":"Half Action","Focus Power":"Routine (+20) Willpower test","Range":"10 metres x psy rating","Sustained":"Half Action","Subtype":"Concentration","Effect":"The psyker chooses an object in range and line of sight with a weight no greater than 2 x PR kilograms. At the beginning of each of his turns, he can move the object in any direction up to a number of metres equal to twice his psy rating. If the object ever leaves the range of the power, the power ends.","Page":"PG 211 CB","Name":"Telekinetic Control","XP Cost":100},{"Power":"Assail","Source Sheet":"PP Telekinesis","Cost":"200 xp","Prerequisite":"Willpower 40","Action":"Half Action","Focus Power":"Ordinary (+10) Willpower test","Range":"20 metres x psy rating","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Psychic Attack. If the psyker scores at least three degrees of success on the Focus Power test for this attack, the target is also thrown 1d5 metres away and knocked Prone. Certain especially large targets such as battle tanks, Greater Daemons, and Titans are immune to this effect at the Game Master's discretion.","Page":"PG 209 CB","Name":"Assail","XP Cost":200,"School":"Telekenesis","Summary School":"Telekenesis"},{"Power":"Telekine Shield","Source Sheet":"PP Telekinesis","Cost":"200 xp","Prerequisite":"Intelligence 40","Action":"Half Action","Focus Power":"Routine (+20) Willpower Test","Range":"Self","Sustained":"Free Action","Subtype":"Concentration","Effect":"For the duration of the power, all of the psyker's Hit Locations count as being protected by cover with an Armour Value equal to half this power damaged just like normal cover by damage that exceeds the shield's Armour Value (pg 229). If the shield is reduced to 0 Armour points, the power stops, and is no longer sustained.","Page":"PG 211 CB","Name":"Telekine Shield","XP Cost":200,"School":"Telekenesis","Summary School":"Telekenesis"},{"Power":"Crush","Source Sheet":"PP Telekinesis","Cost":"300 xp","Prerequisite":"Willpower 45","Action":"Half Action","Focus Power":"Challenging (+0) Opposed Willpower test","Range":"10 metres x psy rating","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Psychic Attack. The psyker nominates a single target in range and line ofsight who opposes this power with a Toughness test. If the target fails to resist the power, it suffers the attack below.","Page":"PG 209 CB","Name":"Crush","XP Cost":300,"School":"Telekenesis","Summary School":"Telekenesis"},{"Power":"Objuration Mechanicum","Source Sheet":"PP Telekinesis","Cost":"300 xp","Prerequisite":"Intelligence 40","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"10 metres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker chooses a point anywhere within range and line of sight. This power creates a Haywire Field (page 147 CB) centred at this point, with a radius in metres equal to the psyker psy rating.","Page":"PG 209 CB","Name":"Objuration Mechanicum","XP Cost":300,"School":"Telekenesis","Summary School":"Telekenesis"},{"Power":"Telekine Dome","Source Sheet":"PP Telekinesis","Cost":"300 xp","Prerequisite":"Psy rating 4","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"5 metres x psy rating","Sustained":"Free Action","Subtype":"Concentration","Effect":"The psyker chooses a point in range and line of sight, and creates a dome of invisible energy centred on that point with a radius equal to half the psyker psy rating, rounding up. Each ally  standing inside the dome gains a number of Armour points equal to the psy rating to all Hit Locations against any attack that originated outside of the dome radius. However, characters may still physically pass through the dome at no penalty.","Page":"PG 211 CB","Name":"Telekine Dome","XP Cost":300,"School":"Telekenesis","Summary School":"Telekenesis"},{"Power":"Shockwave","Source Sheet":"PP Telekinesis","Cost":"300 xp","Prerequisite":"Willpower 50","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"Self","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Psychic Attack. Each character in the area of effect (other than the psyker) suffers the damage. He is also pushed directly away from the psyker a number of metres equal to the psyker","Page":"PG 210 CB","Name":"Shockwave","XP Cost":300,"School":"Telekenesis","Summary School":"Telekenesis"},{"Power":"Gate of Infinity","Source Sheet":"PP Telekinesis","Cost":"400 xp","Prerequisite":"Psy rating 5","Action":"Extended Action (3)","Focus Power":"Hard (-20) Willpower test","Range":"1 kilometres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker chooses a point anywhere within 5 metres times his psy rating, and opens a gate to the Immaterium at that point. He then chooses a point within range of the power, and opens an exit to the gate at that location. The psyker must be aware of the location in which he is opening the exit to the gate, either having visited it before, seen it from afar, or simply studied it on a map. The gate lasts for a number of rounds equal to the psyker psy rating, and has a radius in metres equal to the psyker rating as well. For the duration of the power, the two sides of the gate are linked, and any person or objects may pass between them freely provided they can fit through the gate. This power is incredibly taxing and requires at least 12 hours of recovery before it may be used again.","Page":"PG 209 CB","Name":"Gate of Infinity","XP Cost":400,"School":"Telekenesis","Summary School":"Telekenesis"},{"Power":"Vortex of Doom","Source Sheet":"PP Telekinesis","Cost":"400 xp","Prerequisite":"Psy Rating 5","Action":"Half Action","Focus Power":"5 x metres","Range":"Difficult (-10) Willpower test","Sustained":"Half Action","Subtype":"Attack, Concentration","Effect":"Psychic Attack. The psyker chooses a point in range and line of sight, and creates a vortex of energy centred on that point that starts with a radius of 2 metres. Each character who is touching the vortex at the end of the psyker's turn suffers damage. The psyker cannot voluntarily stop sustaining this power. Instead, at the beginning of each turn the psyker is sustaining the vortex, he must make a Challenging (+0) Willpower test with -5 per meter of the vortex's current radius. If passed, he may: Increase or decrease the radius by a meter or move it meters equal to psy rating. If the psyker fails the Willpower test to sustain the vortex,its radius increases by one metre and it moves a number of metres equal to the psyker's psy rating in a random direction. If the vortex ends and the vortex disappears. If the vortex larger than the psyker's psy rating, it explodes and destroys the vortex. The psyker is hit by this damage regardless of his proximity","Page":"PG 211 CB","Name":"Vortex of Doom","XP Cost":400,"School":"Telekenesis","Summary School":"Telekenesis"},{"Power":"Telepathic Link","Source Sheet":"PP Telepathy","Cost":"100 xp","Prerequisite":"Willpower 35","Action":"Half Action","Focus Power":"Difficult (-10) Opposed Willpower test","Range":"20 metres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker chooses a person in range and line of sight who opposes this power with a Willpower test. If the target fails, the psyker can either read the person's thoughts or send a mental message.","Page":"PG 214 CB","Name":"Telepathic Link","XP Cost":100,"School":"Telepathy","Summary School":"Telepathy"},{"Power":"Erasure","Source Sheet":"PP Telepathy","Cost":"100 xp","Prerequisite":"Fellowship 40","Action":"Full Action","Focus Power":"Challenging (+0) Opposed Willpower test","Range":"5 metres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker chooses a single foe in range and line of sight who opposes this power with a Willpower test. If he fails, the psyker removes a memory of a recent event from the target The psyker can only remove an amount of time from the target memory up to 10 x PR minutes, and the event removed cannot have occurred more than PR hours prior to the use of this power. The enemy is left with a gap in his memory, with no recollection of what occurred during that time.","Page":"PG 212 CB","Name":"Erasure","XP Cost":100,"School":"Telepathy","Summary School":"Telepathy"},{"Power":"Hallucination","Source Sheet":"PP Telepathy","Cost":"200 xp","Prerequisite":"Fellowship 40","Action":"Half Action","Focus Power":"Challenging (+0) Opposed Willpower test","Range":"10 metres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker nominates a single target in range and line of sight who opposes this power with a Willpower test. If the target fails to resist the power, it must roll on Table 5-3: Hallucinogenic Effects and immediately apply the effects. The effect rolled on the table lasts for a number of rounds equal to half the psyker","Page":"","Name":"Hallucination","XP Cost":200,"School":"Telepathy","Summary School":"Telepathy"},{"Power":"Psychic Shirek","Source Sheet":"PP Telepathy","Cost":"300 xp","Prerequisite":"Psy Rating 3","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"10 metres x psy rating","Sustained":"No","Subtype":"Attack","Effect":"Psychic Attack. Loud Noises.","Page":"PG 213 CB","Name":"Psychic Shirek","XP Cost":300,"School":"Telepathy","Summary School":"Telepathy"},{"Power":"Dominate","Source Sheet":"PP Telepathy","Cost":"200 xp","Prerequisite":"Willpower 40","Action":"Full Action","Focus Power":"Challenging (+0) Opposed Willpower test","Range":"5 metres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker nominates a number targets in range and line of sight up to half his psy rating (rounded up) who oppose this power with a Willpower test. Each target that fails to resist the power must follow a simple command given by the psyker. If command is a potentially suicidal act, each target receives a +20 to its Willpower test to Oppose the power. In all cases, the command must be achievable in a single round.","Page":"PG 212 CB","Name":"Dominate","XP Cost":200,"School":"Telepathy","Summary School":"Telepathy"},{"Power":"Mental Fortitude","Source Sheet":"PP Telepathy","Cost":"300 xp","Prerequisite":"Adamantium Faith","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"10 metres x psy rating","Sustained":"Free Action","Subtype":"Concentration","Effect":"For the duration of this power, a number of allies up to the psyker's psy rating within range count as having the Adamantium Faith talent. Allies affected by this power lose its benefits as soon as they move out of range.","Page":"PG 212 CB","Name":"Mental Fortitude","XP Cost":300,"School":"Telepathy","Summary School":"Telepathy"},{"Power":"Terrify","Source Sheet":"PP Telepathy","Cost":"400 xp","Prerequisite":"Fellowship 45","Action":"Half Action","Focus Power":"Difficult (-10) Opposed Willpower test","Range":"10 metres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker nominates a single target in range and line of sight who opposes this power with a Willpower test. If the target fails to resist the power, it must roll on Table 8-11: Shock adding +10 times the psyker's psy rating to the roll in place of the normal additions for degrees of failure, and immediately apply the effects.","Page":"PG 214 CB","Name":"Terrify","XP Cost":400,"School":"Telepathy","Summary School":"Telepathy"},{"Power":"Invisibility","Source Sheet":"PP Telepathy","Cost":"400 xp","Prerequisite":"Agility 30 Psy rating 4","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"10m x PR","Sustained":"","Subtype":"","Effect":"The psyker nominates a single target within range and line of sight or himself. For the duration of the power, the target counts having the Stealth skill at Known (rank 1), and gains a bonus to Stealth tests equal to +5 times the psyker's psy rating. Additionally, all ranged attacks made against the target suffer a penalty equal to -5 times the Psyker's psy rating, if the target moves beyond the power's range, it ends.","Page":"PG 212 CB","Name":"Invisibility","XP Cost":400,"School":"Telepathy","Summary School":"Telepathy"},{"Power":"Puppet Master","Source Sheet":"PP Telepathy","Cost":"400 xp","Prerequisite":"Fellowship 55","Action":"Full Action","Focus Power":"Difficult (-10) Opposed Willpower test","Range":"10 metres x psy rating","Sustained":"Special","Subtype":"Concentration","Effect":"The psyker nominates a single target in range and line ofsight with total wounds no greater than 3 times the psyker's psy rating, who opposes this power with a Willpower test. If the target fails to resist the power, it is controlled by the psyker like a puppet. For the duration of the power, the psyker can divide his Actions between himself and the target. The dominated target uses its own Characteristics, but at -10. If at any point the psyker would make the target perform a potentially suicidal action, the target can attempt a Challenging (+0) Opposed Willpower test to try to break free of the power. Additionally, the power breaks as soon as the target moves out of range.","Page":"PG 214 CB","Name":"Puppet Master","XP Cost":400,"School":"Telepathy","Summary School":"Telepathy"},{"Power":"Psychic Communion","Source Sheet":"PP Sanctic","Cost":"100 xp","Prerequisite":"Perception 35","Action":"Full Action","Focus Power":"Ordinary (+10) Willpower test","Range":"10 metres x PR","Sustained":"Free Action","Subtype":"Concentration","Effect":"Select a number of allies up to psy rating within range. While the power persists, the psyker and his affected allies add +2 to their Initiative. This can change an already established Initiative order.","Page":"PG 56 EB","Name":"Psychic Communion","XP Cost":100,"School":"Sanctic","Summary School":"Sanctic"},{"Power":"Exorcism","Source Sheet":"PP Sanctic","Cost":"200 xp","Prerequisite":"Willpower 40","Action":"Full Action","Focus Power":"Difficult (-10) Opposed Willpower test","Range":"5 meters x PR","Sustained":"Half Action","Subtype":"Attack, Concentration","Effect":"Select a single target character with the Daemonic trait, which opposes the power with a Willpower test. If the psyker wins the opposed test, the character suffers Willpower damage equal to the user’s psy rating for each degree of success on the psyker’s test.","Page":"PG 55 EB","Name":"Exorcism","XP Cost":200,"School":"Sanctic","Summary School":"Sanctic"},{"Power":"Word of the Emperor","Source Sheet":"PP Sanctic","Cost":"200 xp","Prerequisite":"Fellowship 30","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"10 metres x PR","Sustained":"Half Action","Subtype":"Concentration","Effect":"Whilst the power remains in effect, whenever a character within range takes an Attack action targeting the psyker, the attacker must pass a Challenging (+0) Willpower test or suffer a -5 penalty to his attack roll for each degree of failure.","Page":"PG 56 EB","Name":"Word of the Emperor","XP Cost":200,"School":"Sanctic","Summary School":"Sanctic"},{"Power":"Banishment","Source Sheet":"PP Sanctic","Cost":"300 xp","Prerequisite":"Psy rating 3","Action":"Full Action","Focus Power":"Hard (-20) Willpower test","Range":"10 metres x PR","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Select a target in range and line of sight, which must possess the Warp Instability trait. The targeted Daemon must immediately make a Willpower test, with a -5 penalty for each degree of success on the Focus Power test. The target suffers 1 point of Energy damage per DoF on the test, ignoring Toughness bonus and armour. If this would deal damage equal to or in excess of the target’s remaining wounds, it is immediately cast back into the Warp.","Page":"PG 54 EB","Name":"Banishment","XP Cost":300,"School":"Sanctic","Summary School":"Sanctic"},{"Power":"Purge Soul","Source Sheet":"PP Sanctic","Cost":"200 xp","Prerequisite":"Willpower 35","Action":"Half Action","Focus Power":"Difficult (-10) Opposed Willpower test","Range":"10 metres x PR","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Chooses a target within range and line of sight, who opposes the power with a Willpower test. If the psyker wins the Opposed test, the target suffers 1 point of Energy damage per degree of success on the test, plus an amount equal to the target’s Corruption bonus, ignoring armour and Toughness bonus.","Page":"PG 56 EB","Name":"Purge Soul","XP Cost":200,"School":"Sanctic","Summary School":"Sanctic"},{"Power":"Hammerhand","Source Sheet":"PP Sanctic","Cost":"300 xp","Prerequisite":"Psy Rating 3","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"5 metres x PR","Sustained":"Free Action","Subtype":"Concentration","Effect":"Select a number of allies within range equal to his PR (which may include the psyker). While the power persists, the affected characters gain the Unnatural Strength (X) trait where X is equal to the user’s psy rating, or increases their existing trait’s value by 4. This benefit ends if a character moves out of range.","Page":"PG 55 EB","Name":"Hammerhand","XP Cost":300,"School":"Sanctic","Summary School":"Sanctic"},{"Power":"Sanctuary","Source Sheet":"PP Sanctic","Cost":"400 xp","Prerequisite":"Willpower 45","Action":"Full Action","Focus Power":"Challenging (+0) Willpower test","Range":"Self","Sustained":"Half Action","Subtype":"Concentration","Effect":"Select a number of allies up to psy rating (which may include the psyker) within 10 metres x psy rating. For the duration of the power, each affected character benefits from a force field with a protection rating of 5 x PR and no overload chance. In addition, Daemons must pass a Challenging(+0) Willpower test in order to move toward an affected character.","Page":"PG 56 EB","Name":"Sanctuary","XP Cost":400,"School":"Sanctic","Summary School":"Sanctic"},{"Power":"Cleansing Flame","Source Sheet":"PP Sanctic","Cost":"300 xp","Prerequisite":"Psy raging 4","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"5 metres x PR","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Psychic Attack.","Page":"PG 54 EB","Name":"Cleansing Flame","XP Cost":300,"School":"Sanctic","Summary School":"Sanctic"},{"Power":"Holocaust","Source Sheet":"PP Sanctic","Cost":"500 xp","Prerequisite":"Psy rating 5","Action":"Full Action","Focus Power":"Hard (-20) Willpower test","Range":"Self","Sustained":"Full Action","Subtype":"Attack, Concentration","Effect":"Psychic Attack. Emits a psychic blast centred on himself. He is not affected by the blast, but each turn the psyker sustains the power he suffers 1d10+psy rating Energy damage, ignoring armour and Toughness bonus.","Page":"PG 56 EB","Name":"Holocaust","XP Cost":500,"School":"Sanctic","Summary School":"Sanctic"},{"Power":"Summoning","Source Sheet":"PP Malefic","Cost":"50 xp","Prerequisite":"Willpower 35","Action":"Full Action","Focus Power":"Challenging (+0) Willpower tes","Range":"Self","Sustained":"Free Action","Subtype":"Concentration","Effect":"As long as this power is sustained, the psyker gains a bonus of +10 x psy rating to Forbidden Lore (Daemonology) tests made to summon Daemons.","Page":"PG 58 EB","Name":"Summoning","XP Cost":50,"School":"Malefic","Summary School":"Malefic"},{"Power":"Cursed Earth","Source Sheet":"PP Malefic","Cost":"100 xp","Prerequisite":"Willpower 40","Action":"Full Action","Focus Power":"Difficult (-10) Willpower test","Range":"1 metre x psy rating","Sustained":"Free Action","Subtype":"Concentration","Effect":"Selects an area of ground with a radius in metres equal to psy rating. While the power is sustained, Daemons standing within this area increase the value of their Daemonic trait by half psy rating and receive a bonus of +5 x psy rating to Warp Instability tests. In addition, psychic powers used within the affected area add +10 to Focus Power tests and rolls on Table 6-2: Psychic Phenomena (pg 196 CB). Those in the presence of the Cursed Earth may experience disturbing Warp phenomena","Page":"PG 57 EB","Name":"Cursed Earth","XP Cost":100,"School":"Malefic","Summary School":"Malefic"},{"Power":"Dark Flame","Source Sheet":"PP Malefic","Cost":"100 xp","Prerequisite":"10 Corruption points","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"5 metres x psy rating","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Psychic Attack. Any character who suffers damage from Dark Flame must succeed at an Easy (+30) Willpower test or gain 1 Corruption point for each degree of failure.","Page":"PG 57 EB","Name":"Dark Flame","XP Cost":100,"School":"Malefic","Summary School":"Malefic"},{"Power":"Incursion","Source Sheet":"PP Malefic","Cost":"100 xp","Prerequisite":"20 Corruption points","Action":"Full Action","Focus Power":"Difficult (-10) Willpower test","Range":"Self","Sustained":"Free Action","Subtype":"Concentration","Effect":"As long as this power remains in effect, the psyker gains a bonus to his Daemonic Mastery tests (pg 59) of +10 x psy rating.","Page":"PG 57 EB","Name":"Incursion","XP Cost":100,"School":"Malefic","Summary School":"Malefic"},{"Power":"Infernal Gaze","Source Sheet":"PP Malefic","Cost":"200 xp","Prerequisite":"15 Corruption points, Willpower 45","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"5 metres x psy rating","Sustained":"No","Subtype":"Attack, Concentration","Effect":"Affects all characters within range and line of sight, friend and foe, who do not possess the Daemonic trait. Each affected character opposes the power with a Challenging (+0) Willpower test. Any character who fails suffers Energy damage equal to the user’s psy rating plus Corruption bonus, ignoring armour and Toughness bonus, and gains Insanity points and Corruption points equal to half the user’s psy rating.","Page":"PG 57 EB","Name":"Infernal Gaze","XP Cost":200,"School":"Malefic","Summary School":"Malefic"},{"Power":"Sacrifice","Source Sheet":"PP Malefic","Cost":"100 xp","Prerequisite":"Willpower 45","Action":"Half Action","Focus Power":"Ordinary (+10) Willpower test","Range":"Self","Sustained":"No","Subtype":"Concentration","Effect":"Can only be used if the psyker has inflicted damage on a target (possibly himself) since the beginning of the previous round. If the Focus Power test succeeds, the psyker gains a +5 bonus to his next Focus Power test for each point of damage inflicted (after reductions for armour and Toughness bonus) with the preceding attack. This bonus must be used within 1 hour.","Page":"PG 58 EB","Name":"Sacrifice","XP Cost":100,"School":"Malefic","Summary School":"Malefic"},{"Power":"Possession","Source Sheet":"PP Malefic","Cost":"200 xp","Prerequisite":"20 Corruption points","Action":"Full Action","Focus Power":"Difficult (-10) Willpower test","Range":"Self","Sustained":"Free Action","Subtype":"Concentration","Effect":"While the power is sustained, the psyker gains the Daemonic (X) and Unnatural Strength (X) traits, where X equals half his psy rating, as well as the Deadly Natural Weapons trait. In addition, the psyker must succeed at a Challenging (+0) Willpower test each round the power is sustained or enter a Frenzied state per the Frenzy talent (pg 127 of the Dark Heresy Core Rulebook). While Frenzied, the psyker must continue to sustain the power (in a special exception to the prohibition on using psychic powers while Frenzied). Psychic Phenomena: A result of Psychic Phenomena when using this power means that a more powerful Daemon, as chosen by the GM, has taken the psyker’s invitation. The psyker must succeed in an Opposed Willpower test against the Daemon or become possessed (pg 69).","Page":"PG 57 EB","Name":"Possession","XP Cost":200,"School":"Malefic","Summary School":"Malefic"},{"Name":"Telekenetic Control","Power":"Telekenetic Control","Action":"Half Action","Focus Power":"Routine (+20) Willpower test","Range":"10m x PR","Effect":"Object in range weighing max 2xPR kg, at start of turn psyker can move it 2xPR meters.","School":"Telekenesis","Special":"Concentration","Sustain":"Half Action","XP Cost":0,"Source Sheet":"ALL Psyker Abilities"},{"Name":"Scrier’s Gaze","Power":"Scrier’s Gaze","Action":"30 min.","Focus Power":"Challenging (+0) Psyniscience test","Range":"Self","Effect":"Spend 30 minutes drawing Tarot cards, casting runes, gazing deep into fire, or other methods as varied as the stars of the Imperium. At the end of this time, he makes his Focus Power test to project his vision over the area, with the GM revealing information based on the degrees of success","School":"Divination","Special":"Concentration","Sustain":"","XP Cost":0,"Source Sheet":"ALL Psyker Abilities"},{"Name":"Calm the Warp","Power":"Calm the Warp","Action":"Full Action","Focus Power":"Opposed Difficult (-10) Willpower test","Range":"10m x PR","Effect":"Focusing his energy, the flow of the warp is dampened. All psykers in PR meter radius from a point halve the PR of their psychic effects, round down. Any warp-entities who fail a +30 willpower test are cast back into the warp.","School":"Navigator","Special":"Concentration","Sustain":"Full Action","XP Cost":0,"Source Sheet":"ALL Psyker Abilities"},{"Name":"A Cloud in the Warp","Power":"A Cloud in the Warp","Action":"Full Action","Focus Power":"Challenging (+0) Perception Test","Range":"1m","Effect":"Cause a -50 penalty to all attempts to detect the psychic presence of the target.","School":"Navigator","Special":"Concentration","Sustain":"Free Action","XP Cost":0,"Source Sheet":"ALL Psyker Abilities"},{"Name":"Corrupt the Flesh","Power":"Corrupt the Flesh","Action":"Half Action","Focus Power":"Opposed Difficult (-10)  Willpower test","Range":"3m x PR","Effect":"The target can choose to save with Toughness or Willpower. If he fails, the target rolls on the Mutations table and gains the effect. The user of this ability suffers 1d10 points of insanity.","School":"Navigator","Special":"Concentration","Sustain":"","XP Cost":0,"Source Sheet":"ALL Psyker Abilities"},{"Name":"Disrupt the Empyrean","Power":"Disrupt the Empyrean","Action":"Full Action","Focus Power":"Hard (-20) Willpower Test","Range":"3m x PR","Effect":"Create a warp-storm with 2m radius on point within range that lasts as long as it is sustained. Anything in the area takes 1d10+PR Energy Damage and creatures take 2d10 corruption damage per round, and test for stunning.","School":"Navigator","Special":"Concentration","Sustain":"Full Action","XP Cost":0,"Source Sheet":"ALL Psyker Abilities"},{"Name":"Ebb and Flow","Power":"Ebb and Flow","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"3m x PR","Effect":"Everything in a PR meter radius slows down 50% while this effect is active. Creatures may only take half actions","School":"Navigator","Special":"Concentration","Sustain":"Half Action","XP Cost":0,"Source Sheet":"ALL Psyker Abilities"},{"Name":"Eye of Oblivion","Power":"Eye of Oblivion","Action":"Full Action","Focus Power":"Hard (-20) Willpower Test","Range":"3m x PR","Effect":"Open the third eye. Anyone within range who could realistically glance in this direction takes 4d10+PR Energy damage and if they fail a +0 Willpower test they suffer 2d10 corruption damage.","School":"Navigator","Special":"Attack","Sustain":"","XP Cost":0,"Source Sheet":"ALL Psyker Abilities"}],"categories":{"Weapons":[{"Name":"Improvised","Family":"Low-Tech","Class":"Melee","Range":"‒","RoF":"‒","Damage":"1d10-2 Impact","Pen":0,"Clip":"‒","Reload":"‒","Special Qualities":"Primitive (7), Unbalanced","Weight":"‒","Availability":"‒","Page #":"DH2 - 160","Notes":"","Description":"","Upgrades":"","Page":""},{"Name":"Unarmed","Family":"Low-Tech","Class":"Melee","Range":"‒","RoF":"‒","Damage":"1d5-3 Impact","Pen":0,"Clip":"‒","Reload":"‒","Special Qualities":"","Weight":"‒","Availability":"‒","Page #":"DH2 - 226","Notes":"","Description":"","Upgrades":"","Page":""},{"Name":"Fire Bomb","Family":"Explosives","Class":"Thrown","Range":"SBx3m","RoF":"S/‒/‒","Damage":"1d10+2 Energy","Pen":0,"Clip":1,"R onus and Armour.","Page":"PG 169 CB"},{"Name":"Icon of the Just","Type":"Force Field","Location":"-","AP":"-","Max Ag":"-","Protection Rating":55,"Weight":"0.5 kg","Availability":"Extremely Rare","Note":"Opponents with the Daemonic trait suffer a -10 penalty to attack tests and Focus Power tests against the wearer.","Page":"PG 46 EB"},{"Name":"Rosarius","Type":"Force Field","Location":"-","AP":"-","Max Ag":"-","Protection Rating":50,"Weight":"0.6 kg","Availability":"Extremely Rare","Note":"Allies who can draw a line of sight to a character with a rosarius gain a +10 bonus to Fear and Pinning tests; this is lost if the wearer dies or suffers any Critical damage.","Page":"PG 168 CB"},{"Name":"Adepta Sororitas Power Armour","Type":"Power","Location":"All","AP":7,"Max Ag":50,"Protection Rating":"-","Weight":"35 kg","Availability":"Extremely Rare","Note":"Grants Unnatural Strength (1) trait and always counts as Braced.","Page":"PG 48 EI"},{"Name":"Heavy Power Armour","Type":"Power","Location":"All","AP":8,"Max Ag":35,"Protection Rating":"-","Weight":"65 kg","Availability":"Extremely Rare","Note":"Grants the wearer the Auto-Stabilised and Unnatural Strength (1) trait, and increases the value of his Size (X) trait by 1. When used with the detachable helmet, it is environmentally sealed with its own oxygen supply and voxcaster systems. Its power supply can operate for 2d5 hours before recharging or refueling is needed, and while powered the suit’s weight does not count towards the user’s carry limit","Page":"PG 46 EB"},{"Name":"Praetor Armour","Type":"Power","Location":"All","AP":6,"Max Ag":50,"Protection Rating":"-","Weight":"16 kg","Availability":"Extremely Rare","Note":"Contains an integral respirator, commlink, photo-visor, targeter, and recoil suppression sleeves, as well as a magnetic harness on the back capable of holding a single basic weapon. Any Acolyte without the Adeptus Mechanicus background gains the Enemy (Adeptus Mechanicus) talent while wearing or displaying Praetor Armour.","Page":"PG 43 EO"},{"Name":"Displacer Field","Type":"Force Field","Location":"-","AP":"-","Max Ag":"-","Protection Rating":55,"Weight":"2 kg","Availability":"Near Unique","Note":"When successfully blocks an attack, user jumps in a random direction. Roll 3d10 for meters travelled. If all 3 numbers rolled are the same then user dose not re-emerge for 1d5 rounds and gains 1 Corruption for each round. If activated when unexpected, user can not act for one round.","Page":"PG 49 EI"},{"Name":"Power Field (Personnel)","Type":"Force Field","Location":"-","AP":"-","Max Ag":"-","Protection Rating":80,"Weight":"50 kg","Availability":"Near Unique","Note":"Bulky. Imposes -20 to stealth tests and dose not defend against ranged attacks made within 1 metre or melee.","Page":"PG 169 CB"},{"Name":"Power Field (Vehicle/Emplacement)","Type":"Force Field","Location":"-","AP":"-","Max Ag":"-","Protection Rating":80,"Weight":"500 kg","Availability":"Near Unique","Note":"Bulky. Imposes -20 to stealth tests and dose not defend against ranged attacks made within 1 metre or melee.","Page":"PG 169 CB"}],"Armour Upgrade":[{"Name":"Adamantine Chainguard","Weight":"4 kg","Availability":"Very Rare","Used With":"Any Armor","Note":"If the 1s digit of his attack roll is a 1, the weapon is destroyed unless it has the Power Field or Warp Weapon quality, or is otherwise immune to being destroyed. -5 to armor's Max Agility."},{"Name":"Auto-Senses","Weight":"2 kg","Availability":"Very Rare","Used With":"Power Armor Helmet","Note":"Gains a +5 bonus to his Ballistic Skill and a +10 bonus to all Awareness tests based on Sight and Hearing."},{"Name":"Brazier of Saint Roberto","Weight":"10 kg","Availability":"Common","Used With":"Any armour, helmet, or backpack","Note":"A brazier must be affixed to a backpack, helmet, or similarly worn item. Setting it aflame requires a Half Action and it can burn for 2 hours. Whilst alight, it acts as a glow-globe and grants a +30 bonus to all Charm and Command tests, a +10 bonus to Intimidate tests, and a -40 penalty to all Stealth tests. If the wearer is ever knocked Prone while it is lit, he must pass an Ordinary (+10) Agility test to avoid setting himself on fire."},{"Name":"Ceramite Plating","Weight":"2 kg","Availability":"Rare","Used With":"Carapace and power armor","Note":"Provides an additional 3 Armour points of protection against attacks with the Flame or Melta qualities and other heat-based attacks."},{"Name":"Devotional Iconography","Weight":"1 kg","Availability":"Common","Used With":"Any armour.","Note":"Gains a +10 bonus to Command tests when dealing with those faithful to the Imperium, but suffers a -10 penalty to Fellowship tests when dealing with those not loyal to the Emperor."},{"Name":"Hexagrammic Wards","Weight":"-","Availability":"Extremely Rare","Used With":"Carapace and power armor","Note":"Gains a +20 bonus to tests made to resist any psychic attack or manipulation directed at him. The upgraded armour’s Armour points are doubled against hits inflicted by psychic attacks. The Warp Weapon quality does not ignore the AP of this armour."},{"Name":"Pentagramatic Wards","Weight":"-","Availability":"Extremely Rare","Used With":"Any Armour","Note":"Whenever a character with the Daemonic or Warp Instability trait becomes engaged in melee with the warded armour’s wearer or begins his turn engaged with the wearer, that character must make a Hard (-20) Willpower test. If the character fails, he suffers 1d5 Energy damage per degree of failure (ignoring armour and Toughness bonus). If the character scores 4 or more degrees of success on the test, however, the pentachromatic ward shatters and the armour permanently loses this upgrade."},{"Name":"Sacred Incense Burner","Weight":"-","Availability":"Rare","Used With":"Any Armour","Note":"Must be affixed to a backpack, helmet, or similarly worn item. Setting it aflame requires a Half Action and it can burn for 1 hour. While the burner is alight, any creature with the Daemonic trait within 3 metres of the bearer suffers a -10 penalty to Weapon Skill tests and a -10 penalty to Warp Instability tests."},{"Name":"Truesilver Filigree","Weight":"-","Availability":"Very Rare","Used With":"Any Armour","Note":"Any character with the Daemonic trait suffers a penalty to Weapon Skill tests equal to 5 times the wearer’s Willpower bonus."},{"Name":"Unguents of Warding","Weight":"","Availability":"Common","Used With":"Any Armour","Note":"Working the unguents onto armour takes roughly one hour, and empties one container for each hit location treated. As part of the process, careful rituals must also be performed to inscribe runes and litanies into the armour. This requires a Hard (-20) Scholastic Lore (Occult) or Forbidden Lore (Imperial Creed) test for each location; failure means the unguents must be cleaned off that location and the ritual started again. For each hit location treated with Unguents of Warding, the armour grants its wearer a +5 bonus to tests to resist Fear caused by characters with the Daemonic trait and to resist psychic powers. The effects of the unguents last for one month"}],"Drugs & Consumables":[{"Name":"Ration Pack","Weight":"2 kg","Availability":"Plentiful","Notes":"During rest of at least 2 hours or more remove one additional level of Fatigue.","Page":"PG 173 CB"},{"Name":"Recaf","Weight":"-","Availability":"Abundant","Notes":"Removes 1 level of Fatigue.","Page":"PG 173 CB"},{"Name":"Tranq","Weight":"1 kg","Availability":"Abundant","Notes":"Numbs the body and mind.","Page":"PG 174 CB"},{"Name":"Amasec","Weight":"1 kg","Availability":"Average","Notes":"BOOZE","Page":"PG 172 CB"},{"Name":"Stimm","Weight":"-","Availability":"Average","Notes":"Lasts 3d10 rounds and ignores any negative effects from damage, Critical damage, Fatigue, and cannot be stunned. When it wears off, they suffer a -20 to Strength, Toughness, and Agility tests for one hour and gains one level of Fatigue.","Page":"PG 174 CB"},{"Name":"Lho-Sticks","Weight":"-","Availability":"Common","Notes":"SMOKES! Goes great with Amasec.","Page":"PG 173 CB"},{"Name":"Desoleum Fungus","Weight":"-","Availability":"Scarce","Notes":"Lasts 1d10 rounds, and suffers 1 Fatigue. While under the effects can invert any 1d100 roll.","Page":"PG 172 CB"},{"Name":"Slaught","Weight":"-","Availability":"Scarce","Notes":"Increase Agility and Perception bonus by 3 for 2d10 minutes. When over take a toughness test or suffer -20 to Agility and Perception tests for 1d5 hours.","Page":"PG 174 CB"},{"Name":"De-Tox","Weight":"-","Availability":"Rare","Notes":"Clears any chemical effects. User is Stunned for 1d10 minus Toughness bonus rounds.","Page":"PG 172 CB"},{"Name":"Obscura","Weight":"-","Availability":"Rare","Notes":"Enters a dream like state for 1d5 hours. If in combat consider them under the effects of a hallucinogen grenade.","Page":"PG 173 CB"},{"Name":"Spook","Weight":"-","Availability":"Rare","Notes":"Pass a Willpower test or gain 1d5 Insanity . If successful gains 1 psy rating or additional psy rating. Effects last for 1d5 hours.","Page":"PG 174 CB"},{"Name":"Frenzon","Weight":"-","Availability":"Very Rare","Notes":"Grants Frenzied for 1d10 minutes.","Page":"PG 173 CB"},{"Name":"Sacred Unguents","Weight":"-","Availability":"Very Rare","Notes":"Applied to weapon as a full action and becomes immune to jamming for one clip.","Page":"PG 173 CB"}],"Tools":[{"Name":"Manacles","Weight":"1 kg","Availability":"Plentiful","Notes":"Handcuffs.","Page":"PG 176 CB"},{"Name":"Regicide Set","Weight":"1 kg","Availability":"Plentiful","Notes":"Chess in the future and takes 1d5 hours. Can grant +10 to fellowship with the opponent the following day.","Page":"PG 177 CB"},{"Name":"Writing Kit","Weight":"2 kg","Availability":"Plentiful","Notes":"Pen and paper.","Page":"PG 178 CB"},{"Name":"Glow-globe/stab light","Weight":"0.5kg","Availability":"Abundant","Notes":"It's a Flashlight.","Page":"PG 176 CB"},{"Name":"Field Suture","Weight":"0.5 kg","Availability":"Average","Notes":"Provides +30 to Medicae tests to stop Blood Loss.","Page":"PG 176 CB"},{"Name":"Lascutter","Weight":"4 kg","Availability":"Average","Notes":"Cuts or welds 10 cm of metal and counts as a Heavy weapon on targets within 2 meters.","Page":"PG 176 CB"},{"Name":"Magnoculars","Weight":"0.5 kg","Availability":"Average","Notes":"Telescope.","Page":"PG 176 CB"},{"Name":"Micro-bead","Weight":"0 kg","Availability":"Average","Notes":"Can talk to others up to 1 km away.","Page":"PG 177 CB"},{"Name":"Pict Recorder","Weight":"1 kg","Availability":"Average","Notes":"Camcorder","Page":"PG 177 CB"},{"Name":"Psy Focus","Weight":"0 kg","Availability":"Average","Notes":"Grants +10 to Focus Power Tests","Page":"PG 177 CB"},{"Name":"Stummer","Weight":"2 kg","Availability":"Average","Notes":"Dampens sound and grants +30 to Stealth test. Last for 20 minutes before needing to be recharged.","Page":"PG 178 CB"},{"Name":"Pict Recorder","Weight":"2 kg","Availability":"Common","Notes":"Grants +30 to Climb tests and cannot fall if failed.","Page":"PG 175 CB"},{"Name":"Dataslate","Weight":"0.5 kg","Availability":"Common","Notes":"The iPad's™ of the future.","Page":"PG 175 CB"},{"Name":"Grapnel and Line","Weight":"2 kg","Availability":"Common","Notes":"A Clip-harness and Gas powered pistol to shoot a hook and line 100 m away.","Page":"PG 176 CB"},{"Name":"Inhaler/Injector","Weight":"0.5 kg","Availability":"Common","Notes":"Holds drugs that can be administered as a Half Action.","Page":"PG 176 CB"},{"Name":"Medi-kit","Weight":"2 kg","Availability":"Common","Notes":"Grants +10 bonus to Medicae tests.","Page":"PG 176 CB"},{"Name":"Auspex/Scanner","Weight":"0.5 kg","Availability":"Scarce","Notes":"When used grants +20 to awareness tests and counts as a Free Action once per turn. With a Tech-Use can see through walls less than 50 cm, has a range of 50 meters.","Page":"PG 175 CB"},{"Name":"Auto Quill","Weight":"0 kg","Availability":"Scarce","Notes":"Grants +10 to recording data","Page":"PG 175 CB"},{"Name":"Hand-Held Targeter","Weight":"0.5 kg","Availability":"Scarce","Notes":"Grants another +20 to their next Ballistic Skill when using weapons with Indirect quality.","Page":"PG 176 CB"},{"Name":"Laud Hailer","Weight":"4 kg","Availability":"Scarce","Notes":"Megaphone of space.","Page":"PG 176 CB"},{"Name":"Multikey","Weight":"0 kg","Availability":"Scarce","Notes":"Gains a +30 bonus to Security test when trying to open locks.","Page":"PG 177 CB"},{"Name":"Screamer","Weight":"2 kg","Availability":"Scarce","Notes":"Activate by Tech-use test. It has a perception of 75 for detecting movement and when triggered sounds an alarm.","Page":"PG 177 CB"},{"Name":"Vox-caster","Weight":"4 kg","Availability":"Scarce","Notes":"Offers communication to up to 100 km","Page":"PG 178 CB"},{"Name":"Combi-tool","Weight":"1 kg","Availability":"Rare","Notes":"Grants +10 to Tech-Use","Page":"PG 175 CB"},{"Name":"Diagnostor","Weight":"4 kg","Availability":"Rare","Notes":"Grants +20 to Medicae or Perception  to determine proper treatment.","Page":"PG 175 CB"},{"Name":"Grav Chute","Weight":"15 kg","Availability":"Rare","Notes":"Pass a Challenging (+0) Agility test or Routine (+20) Operate (Aeronautica) test, and allows for a safe, guided fall from any height; otherwise counts as having fallen two metres for each degree of failure","Page":"PG 176 CB"},{"Name":"Magboots","Weight":"2 kg","Availability":"Rare","Notes":"Reduces Agility bonus by 2 but allows to grip to metallic surfaces.","Page":"PG 176 CB"},{"Name":"Monotask Servo-Skull","Weight":"2 kg","Availability":"Rare","Notes":"Floating skulls that have a single function.Auger: Grants benefits of a AuspexIllumination: Lights up a 20 meter area.Land Hailer: Records speech and amplifies voice.Medicae: Counts as a Medi-kit.Utility: Counts as a Combi-tool","Page":"PG 177 CB"},{"Name":"Signal Jammer","Weight":"2 kg","Availability":"Rare","Notes":"Jams other transmissions within 1km.","Page":"PG 178 CB"},{"Name":"Comm Leech","Weight":"1 kg","Availability":"Very Rare","Notes":"Can hack a transmission with Tech-Use. Usable for minutes equal to Degrees of Success","Page":"PG 175 CB"},{"Name":"Demolition Kit","Weight":"4 kg","Availability":"Very Rare","Notes":"Allows for setup of demo devices. Contains: Five demolition charges (count as Krak Grenades), 100 meter det-cord (burns at 10 sec per meter), and pressure detonator.","Page":"PG 175 CB"},{"Name":"Disguise Kit","Weight":"2 kg","Availability":"Very Rare","Notes":"Make you look like someone else. +10 to deceive tests.","Page":"PG 175 CB"},{"Name":"Excruciator Kit","Weight":"2 kg","Availability":"Very Rare","Notes":"Grants +20 to Interrogation tests.","Page":"PG 176 CB"},{"Name":"Holo-Spectus","Weight":"6 kg","Availability":"Very Rare","Notes":"firing a holo-spectus into the air requires a Challenging (+0) Tech-Use test, after which the user gains a visual representation of the area below the hovering pict-recorder out for several kilometres. Can zoom and highlight parts allowing to survey the area around in great detail, and grants a +20 bonus to Navigate (Surface), Survival (Tracking), and Scrutiny tests. The recorder can stay airborne for 5 hours before its power cell is exhausted","Page":"PG 43 EO"},{"Name":"Static Generator","Weight":"3 kg","Availability":"Very Rare","Notes":"Broadcast static to all comm systems within 30 meters","Page":"PG 178 CB"},{"Name":"Adaptive Logis-Engine","Weight":"4 kg","Availability":"Extremely Rare","Notes":"Place it onto the alien computer, lock, or other interface device that he wishes to crack, and make a Hard (-20) Security (Int) test. If successful, the engine accesses the alien device, and treats it like any other electronic lock for the purposes of additional tests. An Adaptive Logis-Engine takes 5 minutes to access a basic alien system, less 30 seconds for each degree of success on the user’s Security test (to a minimum of 30 seconds).","Page":"PG 42 EO"},{"Name":"Stasis Cage.","Weight":"6 kg","Availability":"Extremely Rare","Notes":"Hold anything with a Size trait of 7 or lower that does not possess the Incorporeal trait for five hours (if using the battery pack.  Inside cannot take any actions, and outside of cannot attack or interact with anything inside. Compacts into a flat plate 3 meters across.","Page":"PG 43 EO"},{"Name":"Multi Compass","Weight":"4 kg","Availability":"Near Unique","Notes":"Grants a +20 bonus to all Survival and Navigation (Surface) tests.","Page":"PG 177 CB"},{"Name":"Null Rod","Weight":"1 kg","Availability":"Near Unique","Notes":"Dampen the powers of any psykers within 2d10 metres, causing them to take all tests to use any of their psychic powers with a -30 penalty. Also offer protection from psychic attacks by a +30 bonus to resist any psychic power that directly affects him.","Page":"PG 177 CB"}],"Gear":[{"Name":"Backpack","Weight":"2 kg","Availability":"Abundant","Notes":"Allows 30 kg of extra weight but requires a full action to remove object. Backpack or Combat vest can be worn at the same time.","Page":"PG 170 CB"},{"Name":"Clothing","Weight":"2 kg","Availability":"Abundant","Notes":"Cloths.","Page":"PG 170 CB"},{"Name":"Concealed Holster","Weight":"1 kg","Availability":"Average","Notes":"Attempts to detect weapon suffers -20 penalty and ready actions cost a Half Action more.","Page":"PG 170 CB"},{"Name":"Respirator/Gas Mask","Weight":"0.5 kg","Availability":"Average","Notes":"Grants +30 to resist effects of gas and can re-roll if failed.","Page":"PG 171 CB"},{"Name":"Survival Suit","Weight":"-","Availability":"Average","Notes":"Grants +20 to resist extreme environments.","Page":"PG 172 CB"},{"Name":"Filtration Plugs","Weight":"-","Availability":"Common","Notes":"grants +20 against gas.","Page":"PG 171 CB"},{"Name":"Chrono","Weight":"0 kg","Availability":"Plentiful","Notes":"Keeps time.","Page":"PG 170 CB"},{"Name":"Combat Vest","Weight":"2 kg","Availability":"Scarce","Notes":"Holds 15 kg of items and can draw items in combat as Free Action. Backpack or Combat vest can be worn at the same time.","Page":"PG 170 CB"},{"Name":"Explosive Collar","Weight":"3 kg","Availability":"Scarce","Notes":"Rang of 1 km and if out of range for more than 5 minutes collar detonates and kills the wearer instantly. Removing requires a -20 Tech-Use. If failed by 2 degrees it explodes.","Page":"PG 170 CB"},{"Name":"Photo-Visors/Contacts","Weight":"0.5 kg","Availability":"Scarce","Notes":"Grants Dark-Sight trait.","Page":"PG 171 CB"},{"Name":"Rebreather","Weight":"1 kg","Availability":"Scarce","Notes":"Immune to toxic atmospheres, even allowing him to survive underwater. Last for 1 hour and Full Action to replace.","Page":"PG 171 CB"},{"Name":"Void Suit","Weight":"8 kg","Availability":"Scarce","Notes":"Enclosed suit for space. 12 hours of air and imposes a -10 to Agility tests","Page":"PG 172 CB"},{"Name":"Consecrated Scrolls","Weight":"1 kg","Availability":"Scarce","Notes":"Before making a Focus Power test, a character possessing one of these scrolls may choose to burn a single one as a Free Action; this destroys that scroll. Should the user have to roll on Table 6-2: Psychic Phenomena as a result of the subsequent Focus Power test, he may re-roll the result.","Page":"PG 47 EB"},{"Name":"Chameleoline Cloak","Weight":"0.5 kg","Availability":"Rare","Notes":"Gains +20 to stealth tests.","Page":"PG 170 CB"},{"Name":"Recoil Glove","Weight":"0.5 kg","Availability":"Rare","Notes":"Can fire weapons one-handed without -20 penalty.","Page":"PG 171 CB"},{"Name":"Psyocculum","Weight":"1.5 kg","Availability":"Rare","Notes":"As a Half Action, the wearer may make a Challenging (+10) Awareness test to detect psykers and characters with the Daemonic trait without the need for normal lighting until the end of the encounter. While these targets are illuminated in this way, the wearer gains a +10 bonus to his Ballistic Skill tests against them. The psyocculum distorts standard vision, however, imposing a -20 penalty to all other sight-based tests made while it is used. It also cannot be used at the same time as another piece of headgear, such as a helmet, and requires a Half Action to both put on or take off. Using a psyocculum causes the wearer to gain one level of Fatigue for every 5 minutes of operation beyond the first minute.","Page":"PG 47 EB"},{"Name":"Dead Space Earpiece","Weight":"-","Availability":"Very Rare","Notes":"Grants +20 against Concussive tests","Page":"PG 170 CB"},{"Name":"Preysense Goggles","Weight":"0.5 kg","Availability":"Very Rare","Notes":"Grants +20 to vision in darkness.","Page":"PG 171 CB"},{"Name":"Synskin","Weight":"2 kg","Availability":"Very Rare","Notes":"Grants 2 Armor to all locations not already armoured and +10 to Stealth tests. Also immuned to presysense goggles and Dark-sight trait.","Page":"PG 172 CB"},{"Name":"Banishing Rod","Weight":"8 kg","Availability":"Very Rare","Notes":"Psykers within 5 metres of one or more banishing rods cannot push psychic powers, and reduce the result of any rolls they make on Table 6-2: Psychic Phenomena by -20 (to a minimum of 1). Characters with the Daemonic trait treat this area as a treacherous environment . When used in an exorcism (pg 70 EB), each rod placed around the target of the exorcism grants a +5 bonus to the Daemonic Mastery test.","Page":"PG 47 EB"},{"Name":"Empyrean Brain Mine","Weight":"1 kg","Availability":"Very Rare","Notes":"Must be attached to an enemy through a successful Grapple action in melee combat. At the start of his turn for the following 3 rounds, the target must make a Hard (-20) Agility test. If successful, he can perform a Half Action; otherwise he is unable to perform any actions, including Reactions, that round. The mine deals 1d10+5 Rending damage that is not reduced by armour if forcibly removed, but after 3 rounds, it burns out and dislodges from the target.","Page":"PG 47 EB"}],"Cybernetics":[{"Name":"Bionic Arm","Availability":"Scarce","Benefit":"Common mechanical arm. Craftsmanship determines bonuses.","Page":"PG 180 CB"},{"Name":"Bionic Legs","Availability":"Scarce","Benefit":"Common mechanical leg. Craftsmanship determines bonuses.","Page":"PG 181 CB"},{"Name":"Cranial Armour","Availability":"Scarce","Benefit":"Adds +1 Armour point to the Head.","Page":"PG 182 CB"},{"Name":"Vocal Implant","Availability":"Scarce","Benefit":"Works to amplify the vocal cords to an inhuman range.","Page":"PG 185 CB"},{"Name":"Augur Array","Availability":"Rare","Benefit":"Identically to a auspex and requires concentration and a Half Action.","Page":"PG 181 CB"},{"Name":"Bionic Respiratory System","Availability":"Rare","Benefit":"Gain a +20 bonus to Toughness tests made to resist airborne toxins and gas.","Page":"PG 181 CB"},{"Name":"Bionic Senses","Availability":"Rare","Benefit":"Common mechanical eyes, ears, and noses. Craftsmanship determines bonuses.","Page":"PG 181 CB"},{"Name":"Interface Port","Availability":"Rare","Benefit":"grants a +10 bonus to Common Lore, Inquiry, or Tech-Use tests whilst connected to a relevant mechanism or data spool.","Page":"PG 182 CB"},{"Name":"Internal Reservoir","Availability":"Rare","Benefit":"Acts as a powerful battery. When it is fully charged, no longer gains Fatigue from using Luminen Capacitors either to recharge or attack something, but each use drains the reservoir by half. The battery fully recharges after one day of resting.","Page":"PG 182 CB"},{"Name":"Locator Matrix","Availability":"Rare","Benefit":"Present location to within a few meters but must know planet detail.","Page":"PG 183 CB"},{"Name":"Memorance Implant","Availability":"Rare","Benefit":"Provides a +10 bonus to Trade (Loremancer) tests or other tests in social situations where the recorded information provides leverage or value.","Page":"PG 184 CB"},{"Name":"Mind Impulse Unit","Availability":"Rare","Benefit":"Add a +10 bonus to Tech-Use or Operate tests used in conjunction with devices capable of MIU linking.","Page":"PG 184 CB"},{"Name":"MIU Weapon Interface","Availability":"Rare","Benefit":"Fires the linked ranged weapon as a Free Action during his turn. Note that he can still only take a single Action with the Attack subtype during his turn.","Page":"PG 184 CB"},{"Name":"Respiratory Filter Implant","Availability":"Rare","Benefit":"Grants a +20 bonus to resist inhaled poisons, gas weapons, or atmospheric toxins.","Page":"PG 185 CB"},{"Name":"Scribe-tines","Availability":"Rare","Benefit":"Grants +10 to all Lore skill tests.","Page":"PG 185 CB"},{"Name":"Synth Muscle","Availability":"Rare","Benefit":"Grants the Unnatural Strength (1) trait","Page":"PG 185 CB"},{"Name":"Volitor Implant","Availability":"Rare","Benefit":"Compelled not to reveal a certain item of information, remain within a set area, or perform a specific task. If the subject attempts-or is forced-to counter this compulsion, his brain shuts down into unconsciousness, or even death for some severe volitor patterns.","Page":"PG 185 CB"},{"Name":"Autosanguine","Availability":"Very Rare","Benefit":"Repairs minor injuries and speeds recovery. Always considered Lightly Damaged, and heals at an increased rate, removing 2 points of damage per day instead of 1.","Page":"PG 181 CB"},{"Name":"Bionic Heart","Availability":"Very Rare","Benefit":"Gains +1 Armour point to the Body location and Sprint talent.","Page":"PG 181 CB"},{"Name":"Calculus Logi Upgrade","Availability":"Very Rare","Benefit":"Grants +10 to Literacy, Logic, and Scholastic Lore tests.","Page":"PG 182 CB"},{"Name":"Cerebral Implants","Availability":"Very Rare","Benefit":"Restore paralysed and brain-damaged users to a semblance of normality, but with a permanent loss of 1d10 points from the character’s Weapon Skill, Ballistic Skill, Agility, Intelligence, and Fellowship characteristics. Craftsmanship determines bonuses.","Page":"PG 182 CB"},{"Name":"Ferric Lure Implants","Availability":"Very Rare","Benefit":"After a Willpower test, can call an unsecured metal object into his hand; the object cannot mass more than 1 kg per point of Willpower bonus, and must be within 20 metres. Must have Mechanicus Implants trait.","Page":"PG 182 CB"},{"Name":"Luminen Capacitor","Availability":"Very Rare","Benefit":"With a successful Toughness test, recharges or powers machinery. Difficulty depending on the nature of the powered system.","Page":"PG 183 CB"},{"Name":"Maglev Coils","Availability":"Very Rare","Benefit":"Using a Half Action, the user may hover 20-30 centimetres off the ground for a number of minutes equal to 1d10 plus the character’s Toughness bonus.","Page":"PG 183 CB"},{"Name":"Mechadendrite","Availability":"Very Rare","Benefit":"Standard Mechadendrites","Page":"PG 183 CB"},{"Name":"Subskin Armour","Availability":"Very Rare","Benefit":"Adds +2 armor to Arms, Body, and legs which stacks with armor.","Page":"PG 185 CB"},{"Name":"Blackbone Bracing (Forge World)","Availability":"Very Rare","Benefit":"Some or all of the user’s bones are wrapped with a lattice of plasteel. Fingers, forearms, shins, and ribs to offer a stronger punch as well as grant more protection in combat. A character with this Implant gains the Iron Jaw talent, and gains a +2 bonus to Damage for all unarmed attacks.","Page":"PG 62 MA III"},{"Name":"Concealed Weapon Bionic (Forge World)","Availability":"Very Rare","Benefit":"MUST be applied to a bionic arm. The character suffers a -20 to grappling tests. A pistol or short melee weapon can be readied with a half action. The weapon can only be found with a detailed inspection or auspex scanner.","Page":"PG 62 MA III"},{"Name":"Cortex Controller (Forge World)","Availability":"Extremely Rare","Benefit":"Requirement: Intelligence 60. Uses data-djinn to command up to two combat-automata fitted with a Cybernetica cortex. The user can access the automatas senses, monitor their status and and precisely control their actions. The user can either attack with the automata or attack himself, but not both. When the automata attack, the user may only use a half action, and vice versa. Range is up to one kilometer in open air.","Page":"PG 62 MA III"},{"Name":"Enhanced Potentia Coil (Forge World)","Availability":"Extremely Rare","Benefit":"Replaces standard internal power circuits. Involves difficult and invasive surgery averaging a 3 week span with extended knowledge tech, archeotech, as well as medicae tests. Poor quality leaves the user with a noticable hunched form, permanently reducing their agility by 1d10. - Luminen Blast gains +1d10 damage and penetration equal to the user’s Willpower Bonus.  - Luminen Shock gains penetration value equal to users Willpower Bonus, as well as the tearing quality.- Maintaining Maglev Transcendence is a free action. Maglev Transcendence can be performed twice every 6 hours.- Ferric Summons is a free action once per turn.- Integrated Weapon gains the reliable quality","Page":"PG 62 MA III"},{"Name":"Baleful Eye","Availability":"Near Unique","Benefit":"Counts as a hot-shot laspistol with a range of 10m. It has no clip size, however a jamb result causes to lose sight in the eye for a number of rounds equal to the degrees of failure.","Page":"PG 182 CB"},{"Name":"Ballistic Logis Programming (Forge World)","Availability":"Near Unique","Benefit":"The character's logis circuit has been upgraded to aid in the calculation of trajectories and firing patterns. This gives the adept an additional +10 bonus when making a Full Round Aim Action","Page":"PG 62 MA III"}]},"references":{"Skill Dis":[{"Name":"Acrobatics","Characteristics":"Agility","Alt Characteristics":"Strength","Type Unless Noted":"Full Action","Description":"Used for Keeping balance or avoid falling, jumping up or down from a height, or moving around obsticales without falling.","Special Use":"Jumping: When jumping or leaping, may use the Acrobatics skill in the place of AG and S tests. When determining Falling damage, can make an Acrobatics skill test to reduce the eﬀective distance fallen by a number of metres equal to his AGB."},{"Name":"Athletics","Characteristics":"Strength","Alt Characteristics":"Toughness","Type Unless Noted":"Full Action","Description":"Used to swim across water, pushing beyond their limits, or climbing difficult terran","Special Use":""},{"Name":"Awareness","Characteristics":"Perception","Alt Characteristics":"Fellowship, Intelligence","Type Unless Noted":"Free Action","Description":"Used to spot walking into a ambush, search for clues or hidden items, or evesdrop on a conversation","Special Use":""},{"Name":"Charm","Characteristics":"Fellowship","Alt Characteristics":"Influence","Type Unless Noted":"1 minute","Description":"Used to make someone like him for whatever reason, distract someone by drawing his focus away from others, gathering information from locals or strangers.","Special Use":""},{"Name":"Command","Characteristics":"Fellowship","Alt Characteristics":"Intelligence, Strength, Willpower","Type Unless Noted":"Half for Simple, Full for complex","Description":"Used when wishes to send an NPC ally into an extremely dangerous situation or into open combat, or to rally his allied ﬁghting forces or organise them in the face of a surprise attack.","Special Use":""},{"Name":"Commerce","Characteristics":"Intelligence","Alt Characteristics":"Fellowship","Type Unless Noted":"1 minute, or more for complex deals","Description":"Used to gain a bonus when attempting a Requsition test, wishes to track down a rare item, whats to know how much an item is worth.","Special Use":""},{"Name":"Common Lore","Characteristics":"Intelligence","Alt Characteristics":"Fellowship","Type Unless Noted":"Free Action","Description":"Used when Player might know something about the situatuon, location or individual, or wants to know a specific detail about common subject","Special Use":""},{"Name":"Deceive","Characteristics":"Fellowship","Alt Characteristics":"Intelligence, Tech-Use","Type Unless Noted":"1 minute, or more for complex deceeption","Description":"Used to tell a convincing lie, distract someone with rambling nonsense, or trying to disguise themself.","Special Use":""},{"Name":"Dodge","Characteristics":"Agility","Alt Characteristics":"","Type Unless Noted":"Reaction","Description":"Used to dodge a attack in melee, ranged, or to avoid hazards.","Special Use":""},{"Name":"Forbidden Lore","Characteristics":"Intelligence","Alt Characteristics":"Fellowship","Type Unless Noted":"Free Action","Description":"Used when seeking information about potential cult activity, to learn about the opertions of dreaded Eldar, or the proper procedure to summon a Daemon.","Special Use":""},{"Name":"Inquiry","Characteristics":"Fellowship","Alt Characteristics":"Intellgence, Perception","Type Unless Noted":"One hour or more","Description":"Used when trying to track down a local crime lord, attempting to learn the attidues of the local populace, or information of a specific type of locations of a shop or tavern.","Special Use":""},{"Name":"Interrogation","Characteristics":"Willpower","Alt Characteristics":"Fellowship","Type Unless Noted":"One hour or more","Description":"Used when attempting to learn avout battle plans from a commander, forcing a Imperial Adept to reveal hidden information, or have a cultist reval a hidden meeting place.","Special Use":""},{"Name":"Intimidate","Characteristics":"Strength","Alt Characteristics":"Willpower","Type Unless Noted":"Full Action","Description":"Used when they want someone to get out of the way, to coerce someone into acting a certain way, or trying to make an opponent back down from a fight.","Special Use":""},{"Name":"Linguistics","Characteristics":"Intelligence","Alt Characteristics":"Fellowship","Type Unless Noted":"Free Action","Description":"Used to decipher an archaic verison, wishes to compose a movie piece of prose, or conveying a subtle subtext of a message with a limited vocabulary.","Special Use":""},{"Name":"Logic","Characteristics":"Intelligence","Alt Characteristics":"Agility","Type Unless Noted":"1 minute, or more for complex problem","Description":"Used when solving a riddle, looking for clues in vast amounts of unreleated information, trying to win a game of chance.","Special Use":""},{"Name":"Medicae","Characteristics":"Intelligence","Alt Characteristics":"Intellgence, Perception","Type Unless Noted":"Full Action","Description":"Used to apply first aid to a wounded ally, to diagnose an affliction and work out a treatment, or perform a surgical procedure to removal of a organ or implanting a cybernetic","Special Use":"Diagnose: On individuals, a successful skill test yields the name of the ailment and basic treatments. When used on groups, a successful skill test can prevent the spread of diseaseor mitigate the effects of malnutrition as determined by the Game Master and dependent on the nature (and virulence)"},{"Name":"Navagate (Surface)","Characteristics":"Intelligence","Alt Characteristics":"Perception","Type Unless Noted":"1 minute for simple location; 1d5 hours for plotting courses or routes.","Description":"Used to to make a journey across unfamiliar terrain, lost and needs to get his bearings in a strange place, or wishes to create a map showing the quickest route from one point to another.","Special Use":""},{"Name":"Navagate (Stellar)","Characteristics":"Intelligence","Alt Characteristics":"Perception","Type Unless Noted":"1 minute for simple location; 1d5 hours for plotting courses or routes.","Description":"Used to make a journey within a star system, find a ship stranded in an unknown region of space, or wishes to find the quickest route from one location withina system (such as a planet) to another location in the system, wishes to find the quickest route from one location within a system (such as a planet) to another location in the system.","Special Use":""},{"Name":"Navagate (Warp)","Characteristics":"Intelligence","Alt Characteristics":"Perception","Type Unless Noted":"1 minute for simple location; 1d5 hours for plotting courses or routes.","Description":"Used t
