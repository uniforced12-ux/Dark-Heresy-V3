nd, Common Lore (Imperial Guard), Medicae or Operate (Surface), Navigate (Surface)","Starting Talents":"Weapon Training (Las, Low-Tech)","Starting Equipment":"Lasgun (or laspistol and sword), combat vest, Imperial Guard flak armor, grapnel and line,12 lho sticks, magnoculars","Background Bonus":"Hammer of the Emperor: When attacking a target that an ally attacked since the end of the Guardsman's last turn, the Guardsman can re-roll any results of 1 or 2 damage rolls.","Background Aptitude":"Fieldcraft or Leadership","Page":"PG 56 CB","Name":"Imperial Guard"},{"Backgrounds":"Outcast","Starting Skills":"Acrobatics or Sleight of Hand, Common Lore (Underworld), Deceive, Dodge, Stealth","Starting Talents":"Weapon Training (Chain, and Las or Solid Projectile)","Starting Equipment":"Autopistol or laspistol, chainsword, armored body glove or flak vest, injector, 2 doses of obscura or slaught","Background Bonus":"Never Quit: An Outcast character counts his Toughness bonus as two higher for purposes of determining Fatigue.","Background Aptitude":"Fieldcraft or Social","Page":"PG 58 CB","Name":"Outcast"},{"Backgrounds":"Adepta Sororitas","Starting Skills":"Athletics, Charm or Intimidate, Common Lore (Adepta Sororitas), Linguistics (High Gothic), Medicae or Parry","Starting Talents":"Weapon Training (Flame or Las, Chain)","Starting Equipment":"Hand Flamer or laspistol, chainblade, armoured bodyglove, chrono, dataslate, stab light, micro-bead","Background Bonus":"Incorruptible Devotion: Whenever an Adepta Sororitas Character would gain 1 or more Corruption Points, she gains that many Insanity Points minus 1 (to a minimum of 0) instead.","Background Aptitude":"Offence or Social","Page":"PG 30 EI","Name":"Adepta Sororitas"},{"Backgrounds":"Mutant","Starting Skills":"Acrobatics or Athletics, Awareness, Deceive or Intimidate,Forbidden Lore (Mutants), Survival","Starting Talents":"Weapon Training (Low-Tech, Solid Projectile) Also one of the following: Amphibious, Dark-sight, Natural s he makes against targets at Point-Blank range, at Short range, and with whom he is engaged in melee.","Background Aptitude":"Offence or Tech","Page":"PG 34 EO","Name":"Imperial Navy"},{"Backgrounds":"Rogue Trader","Starting Skills":"Charm or Scrutiny, Commerce, Common Lore (Rogue Traders), Linguistics (pick one alien language), Operate (Surface or Aeronautica)","Starting Talents":"Weapon Training (Las or Solid Projectile, Shock)","Starting Equipment":"Laspistol or autopistol (fitted with Compact weapon upgrade), shock maul, mesh cloak or carapace chestplate, auspex, chrono","Background Bonus":"Inured to the Xenos: A character from a Rogue Trader Fleet gains a +10 bonus to Fear tests caused by aliens and a +20 bonus to Interaction skill tests with alien characters.","Background Aptitude":"Finesse or Social","Page":"PG 36 EO","Name":"Rogue Trader"},{"Backgrounds":"Exorcised","Starting Skills":"Awareness, Deceive or Inquiry, Dodge, Forbidden Lore (Daemonology), Intimidate or Scrutiny","Starting Talents":"Hatred (Daemons), Weapon Training (Solid Projectile, Chain)","Starting Equipment":"Autopistol or stub revolver, shotgun, chainblade, Imperial robes, 3 doses of obscura or tranq, disguise kit or excruciator kit, rebreather, stab light or glow-globe","Background Bonus":"An Exorcised character starts with one Malignancy Chosen from Table 8-15: Malignancies (see pg 290 CB).Touched by a Daemon: An Exorcised character counts his Insanity bonus as 2 higher for purposes of avoiding Fear Tests (pg 289 of the Dark Heresy Core Rulebook).Additionally, he can never again become possessed by the same Daemon that once possessed him.","Background Aptitude":"Defense or Knowledge","Page":"PG 32 EB","Name":"Exorcised"},{"Backgrounds":"Officio Medicae","Starting Skills":"Common Lore (Adeptus Administratum), Linguistics (High Gothic), Logic, Medicae, Scholastic Lore (Bureaucracy or Chymistry).","Starting Talents":"Weapon Training (Low Tech or Las)","Starting Equipment":"Laspistol or knife, Imperial robes, autoquill, chrono, dataslate, advanced medi-kit","Background Bonus":"Medicae Imperialis: An Officio Medicae character counts the state of damage a character is considered as one degree more or less severe (Critically Damaged count as Heavily Damaged, Heavily Damaged count as Lightly Damaged, etc.).","Background Aptitude":"Knowledge or Fieldcraft","Page":"PG 42 TMA v1","Name":"Officio Medicae"},{"Backgrounds":"Planetary Defense Forces","Starting Skills":"Athletics, Command, Common Lore (Planetary Defense Forces), Medicae or Operate (Surface), Navigate (Surface)","Starting Talents":"Weapon Training (SP, Low-Tech)","Starting Equipment":"Autogun (or Autopistol and sword), planetary trappings, flak armor, grapnel and line, 2 doses of obscura, magnoculars","Background Bonus":"Granted Authority: Once per round, the Planetary Defense Force character may use his Influence in place of another characteristic for a single test. If used in narrative time, the effects of this last for one hour","Background Aptitude":"Defense or Fieldcraft","Page":"PG 44 TMA v1","Name":"Planetary Defense Forces"},{"Backgrounds":"Navis Nobilite","Starting Skills":"Charm or Scrutiny, Common Lore (Navis Nobilite), Forbidden Lore (Navigators) or Forbidden Lore (Warp), Navigation (Stellar) or Navigation (Warp), Psyniscience","Starting Talents":"Air of Authority or Weapon Training (Bolt), Weapon Training (Las, Low-tech)","Starting Equipment":"Laspistol or Handcannon,  Metal Staff, Emperor's Tarot deck, Nobilite Robes or Void-Suit, Micro-bead","Background Bonus":"The Constant Vigil: The character may sacrifice all of his Actions for the next Round to switch places with an ally within 2 meters (as long as there is no obstruction in the way). This may be done at any time, even interrupting another action. The character becomes the target of any attacks previously targeting the ally or vice versa. This may not be used more than once per combat.Warp Eye: If the character takes the Navigator elite advance during character creation, he may either select one additional power or improve an existing power","Background Aptitude":"Knowledge or Social","Page":"PG 14 TMA v2","Name":"Navis Nobilite"},{"Backgrounds":"Dynasty Scion","Starting Skills":"Awareness or Scrutiny, Common Lore (Rogue Traders), Scholastic Lore (Astromancy)","Starting Talents":"Air of Authority or Decadence, Light Sleeper or Resistance (Cold), Weapon Training (Las, Low-tech)","Starting Equipment":"Laspistol or Handcannon, Heirloom Item or Staff, Micro-bead, void suit or set of fine clothing","Background Bonus":"Exceptional Leader: As a free action once per round, the character may grant an ally that he can see and who can hear him a +10 bonus to any one testDynastic Warrant: If the character takes the Warrant of Trade elite advance during character creation, he adds an extra +3 Ship Points to those already generated when building the group’s ship.","Background Aptitude":"Leadership or Intelligence","Page":"PG 24 TMA v2","Name":"Dynasty Scion"},{"Backgrounds":"Skitarii","Starting Skills":"Athletics, Awareness, Common Lore (Adeptus Mechanicus), Dodge, Linguistics (Techna-Lingua)","Starting Talents":"Weapon Training (Low-Tech, Solid Projectile) Mechanicus Implants Trait","Starting Equipment":"Mechanicus Robes, Autogun (or Sword and Autopistol), Good Craftsmanship Bionic Replacement","Background Bonus":"Eternal Vigilance: When attacking, the Skitarii Character can replace any results of 1 or 2 on damage rolls with his Intelligence Bonus instead.","Background Aptitude":"Offence or Finesse","Page":"PG 18 TMA v3","Name":"Skitarii"},{"Backgrounds":"Questoris Familia","Starting Skills":"Common Lore (War), Dodge or Parry, Scholastic Lore (Questoris Familia, Heraldry), Operate (Walkers)","Starting Talents":"Ambidextrous, Weapon Training (Las, Chain or Power)","Starting Equipment":"Las Pistol, Noble Attire, Sword and decorative sheath, Mind Impulse Unit","Background Bonus":"Rite of Becoming: A Questoris Familia character may make an additional attack with his Mind Impulse Unit as a Free Action with a secondary MIU Interfaced weapon.","Background Aptitude":"Offense","Page":"PG 19 TMA v3","Name":"Questoris Familia"}],"roles":[{"Rolls":"Assassin","Role Aptitudes":"Agility, Ballistic Skill or Weapon Skill, Fieldcraft, Finesse, Perception","Role Talent":"Jaded or Leap Up","Role Bonus":"Sure Kill: In addition to the normal uses of Fate points(pg 293), when an Assassin successfully hits with an attack, he may spend a Fate point to inflict additional damage equal to his degrees of success on the attack roll on the first hit the attack inflicts.","Page":"PG 62 CB","Name":"Assassin"},{"Rolls":"Chirurgeon","Role Aptitudes":"Fieldcraft, Intelligence, Knowledge, Strength, Toughness","Role Talent":"Resistance (Pick One) or Takedown","Role Bonus":"Dedicated Healer: In addition to the normal uses of Fate points (pg 293), when a Chirurgeon character fails a test to provide First Aid, he can spend a Fate point to automatically succeed instead with the degrees of success equal to his Intelligence bonus.","Page":"PG 64 CB","Name":"Chirurgeon"},{"Rolls":"Desperado","Role Aptitudes":"Agility, Ballistic Skill, Defense, Fellowship, Finesse","Role Talent":"Catfall or Quick Draw","Role Bonus":"Move and Shoot: Once per round, after performing Move action, a Desperado character may perform a single Standard Attack with a Pistol weapon he is currently wielding as a Free Action.","Page":"PG 66 CB","Name":"Desperado"},{"Rolls":"Hierophant","Role Aptitudes":"Fellowship, Offence, Social, Toughness, Willpower","Role Talent":"Double Team or Hatred (Pick One)","Role Bonus":"Sway the Masses: In addition to the normal uses of Fate points (pg 293), a Hierophant character may spend a Fate point to automatically succeed at a Charm, Command, or Intimidate skill test with a number of degrees of success equal to his Willpower bonus.","Page":"PG 68 CB","Name":"Hierophant"},{"Rolls":"Mystic","Role Aptitudes":"Defense, Intelligence, Knowledge, Perception, Willpower","Role Talent":"Resistance (Psychic Powers) or Warp Sense","Role Bonus":"Stare into the Warp: A Mystic character starts the game with the Psyker elite advance (pg 90). It is recommended that a character who wishes to be a Mystic have a Willpower of at least 35.","Page":"PG 70 CB","Name":"Mystic"},{"Rolls":"Sage","Role Aptitudes":"Intelligence, Knowledge, Perception, Tech, Willpower","Role Talent":"Ambidextrous or Clues from the Crowds","Role Bonus":"Quest for Knowledge: In addition to the normal uses of Fate points (pg 293), a Sage character may spend a Fate point to automatically succeed at a Logic or any Lore skill test with a number of degrees of success equal to his Intelligence bonus.","Page":"PG 72 CB","Name":"Sage"},{"Rolls":"Seeker","Role Aptitudes":"Fellowship, Intelligence, Perception, Social, Tech","Role Talent":"Keen Intuition or Disarm","Role Bonus":"Nothing Escapes My Sight: In addition to the normal uses of Fate points (pg 293), a Seeker character may spend a Fate point to automatically succeed at an Awareness or Inquiry skill test with a number of degrees of success equal to his Perception bonus.","Page":"PG 74 CB","Name":"Seeker"},{"Rolls":"Warrior","Role Aptitudes":"Ballistic Skill, Defense, Offence, Strength, Weapon Skill","Role Talent":"Iron Jaw or Rapid Reload","Role Bonus":"Expert at Violence: In addition to the normal uses of Fate points (pg 293), after making a successful attack test, but before determining hits, a Warrior character may spend a Fate point to substitute his Weapon Skill (for melee) or Ballistic Skill (for ranged) bonus for the degrees of success scored on the attack test.","Page":"PG 76 CB","Name":"Warrior"},{"Rolls":"Fanatic","Role Aptitudes":"Leadership, Offence, Toughness, Weapon Skill, Willpower","Role Talent":"Deny the Witch or Jaded","Role Bonus":"Death to All Who Oppose Me!: In addition to the normal uses of Fate points, a Fanatic character may spend a Fate point to count as having the Hatred talent against his current foe for the duration of the encounter. Should he choose to leave combat against a Hated foe in that encounter, however, he gains 1 Insanity point.","Page":"PG 34 EI","Name":"Fanatic"},{"Rolls":"Penitent","Role Aptitudes":"Agility, Fieldcraft, Intelligence, Offence, Toughness","Role Talent":"Die Hard or Flagellant","Role Bonus":"Cleansing Pain: Whenever a Penitent character suffers 1 or more points of damage (after reductions for Toughness bonus and Armour), he gains a +10 bonus to the first test he makes before the end of his next turn.","Page":"PG 36 EI","Name":"Penitent"},{"Rolls":"Ace","Role Aptitudes":"Agility, Finesse, Perception, Tech, Willpower","Role Talent":"Hard Target or Hotshot Pilot","Role Bonus":"Right Stuff: In addition to the normal uses of Fate points , an Ace character may spend a Fate point to automatically succeed at an Operate or Survival skill test involving vehicles or living steeds with a number of degrees of success equal to his Agility bonus.","Page":"PG 38 EO","Name":"Ace"},{"Rolls":"Crusader","Role Aptitudes":"Knowledge, Offence, Strength, Toughness, Willpower","Role Talent":"Bodyguard or Deny the Witch","Role Bonus":"Smite the Unholy: In addition to the normal uses of Fate Points (see pg 293 CB), a Crusader character can also spend a Fate Point to automatically pass a Fear test with a number of degrees of success equal to his Willpower bonus. In addition, whenever he inflicts a hit with a melee attack against a target with the Fear (X) trait, he inflicts X additional damage and counts his weapon’s penetration as being X higher.","Page":"PG 34 EB","Name":"Crusader"},{"Rolls":"Emissary","Role Aptitudes":"Fellowship,Fieldcraft, Perception, Social, Willpower","Role Talent":"Contact Network or Keen Intuition","Role Bonus":"Master Ambassador: In addition to the normal uses of Fate Points, an Emissary character may spend a Fate point to automatically succeed at a Skill Test when determining a Body of Argument (see page 55) with a number of Degrees of Success equal to his Influence bonus.","Page":"PG 46 TMA v1","Name":"Emissary"},{"Rolls":"Politico","Role Aptitudes":"Fellowship, Finesse, Willpower, Social, Intelligence","Role Talent":"Archivator or Lexographer","Role Bonus":"Scandalous Socialite: In addition to the normal uses of Fate Points, a Politico character may spend a Fate point to reduce or increase a target's Influence Characteristic or Disposition score by 50 percent.              This effect lasts for one Skill Test made by the            target. Note this Role Bonus cannot be                        used for Requisition tests.","Page":"PG 47 TMA v1","Name":"Politico"},{"Rolls":"Seneschal","Role Aptitudes":"Social or Knowledge, Fellowship, Perception, Intelligence, Finesse","Role Talent":"Ambassador Imperialis or Contact Network","Role Bonus":"Master of Ceremonies: In addition to the normal use of Fate Points, a Seneschal character may spend a Fate point to automatically succeed at a Linguistics,        Commerce or any Trade skill test with a number              of degrees of success equal to his                                 Intelligence.","Page":"PG 48 TMA v1","Name":"Seneschal"},{"Rolls":"Artisan","Role Aptitudes":"Agility, Perception, Fieldcraft, Tech, Intelligence","Role Talent":"Resistance (Pick One) or Technical Knock","Role Bonus":"Master of Crafts: In addition to the normal use of Fate Points, an Artisan character may spend a Fate point to           automatically succeed at a Crafting test, adding              a number of Degrees of Success equal to                         his Intelligence Bonus.","Page":"PG 49 TMA v1","Name":"Artisan"},{"Rolls":"Trader","Role Aptitudes":"Intelligence, Fellowship, Agility or Ballistic Skill, Social, Fieldcraft","Role Talent":"Clues from the Crowd or Contact Network","Role Bonus":"Merchant Magnate: In addition to the normal uses of Fate points, when a Trader character fails a Commerce, Influence or Requisition test, he can spend a Fate point to automatically succeed with the degrees of  success equal to his Fellowship bonus","Page":"PG 10 TMA v2","Name":"Trader"},{"Rolls":"Secutor","Role Aptitudes":"Toughness, Ballistic Skill, Weapon Skill, Fieldcraft or Finesse, Perception","Role Talent":"Ambidextrous or Jaded","Role Bonus":"Devastating Precision: In addition to the normal uses of Fate Points, when a Secutor successfully hits with an attack, he may spend a Fate Point to decrease an opponent's Toughness Bonus equal to his  degrees of Success on the attack roll on the  first hit the attack inflicts","Page":"PG 20 TMA v3","Name":"Secutor"},{"Rolls":"Reclaimator","Role Aptitudes":"Tech, Knowledge, Fellowship or Agility, Fieldcraft, Social","Role Talent":"Technical Knock or Rapid Reload","Role Bonus":"Mechanical Expertise: In addition to the normal uses of Fate Points, a Reclaimator character may spend a Fate point to automatically succeed at a  Security, Tech-Use, or Trade (Technomat) skill test with a number of degrees of success equal to his  Intelligence bonus.","Page":"PG 21 TMA v3","Name":"Reclaimator"}],"divinations":[{"Rolls":"01","Divination Prophecy":"Mutation without, corruption within.","Divination Effect":"Roll once on the Malignancies table and apply the result."},{"Rolls":"02-05","Divination Prophecy":"Trust in your fear.","Divination Effect":"Increase this character's Perception by 5. He also gains the Phobia Mental Disorder."},{"Rolls":"06-09","Divination Prophecy":"Humans must die so that humanity can endure.","Divination Effect":"This character gains the Jaded talent. If he already possesses this talent, increase his Willpower characteristic by 2 instead."},{"Rolls":"10-13","Divination Prophecy":"The pain of the bullet is ecstasy compared to damnation.","Divination Effect":"Reduce this character's Agility characteristic by 3. The first time this character suffers Critical damage each session, roll a 1d10. On a result of 10, he does not suffer any Critical Effects, though the damage still counts as Critical Damage."},{"Rolls":"14-17","Divination Prophecy":"Be a boon to your allies and the bane of your enemies.","Divination Effect":"The character gains the Hatred (choose any one) talent. If he already possessed this talent, increase his Strength characteristic by 2 instead."},{"Rolls":"18-21","Divination Prophecy":"The wise learn from the deaths of others.","Divination Effect":"Increase this character's Agility or Intelligence Characteristic by 3. Reduce his Weapon Skill of Ballistic skill characteristic by 3."},{"Rolls":"22-25","Divination Prophecy":"Kill the alien before it can speak its lies.","Divination Effect":"This character gains the Quick Draw talent. If he already possesses this talent, increase his Agility characteristic by 2 instead."},{"Rolls":"26-29","Divination Prophecy":"Truth is subjective.","Divination Effect":"Increase this character's Perception by 3. The first time he would gain 1 or more Corruption points each session, he gains that amount plus 1 instead."},{"Rolls":"30-33","Divination Prophecy":"Thought begets Heresy.","Divination Effect":"Reduce this character's Intelligence by 3. The first time he would gain 1 or more Corruption points each session, he reduces that amount by 1 (to a minimum of 0) instead."},{"Rolls":"34-38","Divination Prophecy":"Heresy begets Retribution.","Divination Effect":"Increase this character's Fellowship or Strength characteristic by 3. Reduce his Toughness or Willpower characteristic by 3."},{"Rolls":"39-43","Divination Prophecy":"A mind without purpose wanders in dark places.","Divination Effect":"When gaining Mental Disorders, the character may choose to gain a new Disorder instead of increasing the severity of an existing Disorder."},{"Rolls":"44-49","Divination Prophecy":"If a job is worth doing, it is worth dying for.","Divination Effect":"Increase this character's Toughness or Willpower characteristic by 3. Reduce his Fellowship or Strength characteristic by 3."},{"Rolls":"50-54","Divination Prophecy":"Dark dreams lie upon the heart.","Divination Effect":"Whenever this character would roll on the Malignancies table, he may instead select any one result and gain that Malignancy."},{"Rolls":"55-59","Divination Prophecy":"Violence solves everything.","Divination Effect":"Increase this character's Weapon Skill or Ballistic Skill characteristic by 3. Reduce his Agility or Intelligence characteristic by 3."},{"Rolls":"60-63","Divination Prophecy":"Ignorance is a wisdom of its own.","Divination Effect":"Reduce this character's Perception characteristic by 3. The first time he would gain 1 or more Insanity points each session, he reduces that amount by 1 (to a minimum of 0) instead."},{"Rolls":"64-67","Divination Prophecy":"Only the insane have the strength to prosper.","Divination Effect":"Increase this character's Willpower characteristic by 3. The first time he would gain 1 or more Insanity points each session, he gains that amount plus 1 instead."},{"Rolls":"68-71","Divination Prophecy":"A suspicious mind is a healthy mind.","Divination Effect":"Increase this character's Perception characteristic by 2. Additionally, he may re-roll Awareness tests to avoid being Surprised."},{"Rolls":"72-75","Divination Prophecy":"Suffering is an unrelenting instructor.","Divination Effect":"Reduce this character's Toughness characteristic by 3. The first time that this character suffers any damage each session, he gains a +20 bonus to the next test he makes before the end of his next turn."},{"Rolls":"76-79","Divination Prophecy":"The only true fear is dying without your duty done.","Divination Effect":"This character gains the Resistance (Cold, Heat, or Fear) talent. If he already possesses this Talent, increase his Toughness characteristic by 2 instead."},{"Rolls":"80-83","Divination Prophecy":"Only in death does duty end.","Divination Effect":"The first time this character would suffer Fatigue each session, he suffers that e other weapon’s attack scored 1 or more DoS.","Prerequisites":"Two-Weapon Wielder","Aptitude 1":"Finesse","Aptitude 2":"Offence","Tier":"T2","Page":"PG 125 CB"},{"Name":"Field Vivisection","Talent":"Field Vivisection","Benefit":"When using the Called Shot action with a melee or ranged attack (depending on the Specialisation) against a target for which the character has the appropriate Forbidden Lore (Xenos) skill, he makes a Medicae (WS) or Medicae (BS) test in place of the normal Weapon Skill or Ballistic Skill test.","Prerequisites":"Ballistic Skill or Weapon Skill 40, Forbidden Lore (Xenos-Any), Rank 2 in the Medicae skill","Aptitude 1":"Ballistic Skill/Weapon Skill","Aptitude 2":"Knowledge","Tier":"T2","Page":"PG 62 EO"},{"Name":"Harden Soul","Talent":"Harden Soul","Benefit":"Whenever the character would gain Corruption points, he may reduce the amount gained by half (rounded up) and gain Insanity points equal to the amount reduced.","Prerequisites":"Willpower 35, 10 Corruption points","Aptitude 1":"Defense","Aptitude 2":"Willpower","Tier":"T2","Page":"PG 61 EB"},{"Name":"Hardy","Talent":"Hardy","Benefit":"Character always heals as if Lightly Damaged.","Prerequisites":"T 40","Aptitude 1":"Toughness","Aptitude 2":"Defense","Tier":"T2","Page":"PG 128 CB"},{"Name":"Hatred","Talent":"Hatred","Benefit":"Gain +10 bonus to attack Weapon Skill tests. Must make a Challenging (+0) Willpower test to retreat or surrender.","Prerequisites":"-","Aptitude 1":"Weapon Skill","Aptitude 2":"Social","Tier":"T2","Page":"PG 128 CB"},{"Name":"Hip Shooting","Talent":"Hip Shooting","Benefit":"As a Full Action, can both move up to his Full Move rate and make a single shot attack with a ranged weapon per weapon.","Prerequisites":"BS 40, Ag 40","Aptitude 1":"Ballistic Skill","Aptitude 2":"Finesse","Tier":"T2","Page":"PG 128 CB"},{"Name":"Hotshot Pilot","Talent":"Hotshot Pilot","Benefit":"On an succesful Operate test, he may voluntarily suffer 1 level of Fatigue to add a number of DoS equal to half of his Agility bonus. When failed an Operate test, he may voluntarily suffer 1 level of Fatigue in order to reduce the degrees of failure by an amount equal to his Agility bonus, to a minimum of 1.","Prerequisites":"Rank 2 in Survival or any Operate skill, Agility 35","Aptitude 1":"Agility","Aptitude 2":"Tech","Tier":"T2","Page":"PG 62 EO"},{"Name":"Independent Targeting","Talent":"Independent Targeting","Benefit":"Ignore Psychic Phenomenon once per session. Suﬀers 1d5 Energy damage to the Head location (not reduced by Armour or Toughness) as a result, and cannot make any Focus Power tests or sustain other psychic powers until the beginning of his next turn.","Prerequisites":"Psy Rating, Strong Minded, WP 50","Aptitude 1":"Willpower","Aptitude 2":"Psyker","Tier":"T3","Page":"PG 133 CB"},{"Name":"Inescapable Attack","Talent":"Inescapable Attack","Benefit":"Attacker imposes penalty on all evasion attempts made against this attack equal to 10 times the total degrees of success scored on the attack test.","Prerequisites":"BS 40 or WS 40,Per 35","Aptitude 1":"Weapon Skill /Ballistic Skill","Aptitude 2":"Finesse","Tier":"T2","Page":"PG 128 CB"},{"Name":"Inside The Mind Of The Machine","Talent":"Inside The Mind Of The Machine","Benefit":"Effects: The character can cow the savage battle spirit of enemy war machines. The character may spend a Fate Point to apply the Haywire (X) quality to his melee attacks, where X is equal to his Intelligence Bonus.","Prerequisites":"Intelligence 30, Mechanicus Implants","Aptitude 1":"Weapon Skill","Aptitude 2":"Tech","Tier":"T2","Page":"PG 30 TMA v3"},{"Name":"Iron Resolve","Talent":"Iron Resolve","Benefit":"After failing a Fear or Pinning test, the character can re-roll the test with a -10 modifier.","Prerequisites":"Resistance (Fear), Jaded","Aptitude 1":"Defense","Aptitude 2":"Willpower","Tier":"T2","Page":"PG 61 EB"},{"Name":"Luminen Shield","Talent":"Luminen Shield","Benefit":"As a Full Action, he may activate a Luminen Shield which remains active for a number of Rounds equal to the character’s base Willpower BonusThe shield has a rating equal to the half the character's Willpower Characteristic, rounded up (e.g. an character with a Willpower of 43 would have a Luminen Shield with a Rating of 22).As long as the shield is active, the character may attempt to stop incoming Ranged and Melee attacks by rolling a 1d100 and comparing it to the shield’s Rating. If the roll is equal to or under the Rating, the attack is stopped completely. If the roll is over the Rating, the attack penetrates the shield and causes Damage as normal. This roll is made before reductions for Toughness and Armour. If the 1d100 roll ever results in a 01-04, the shield stops the attack, but is overloaded in the process. It instantly collapses, and the Character must pass a Challenging (+0) Toughness Test or gain 1 level of Fatigue. The character can use Luminen Shield a number of times equal to his Willpower Bonus every 24 hours; however, upon the second activation of the ability within 24 hours, and upon each subsequent activation in that time, he gains 1 level of Fatigue.","Prerequisites":"Luminen Capacitors, Mechanicus Implants","Aptitude 1":"Defense","Aptitude 2":"Tech","Tier":"T2","Page":"PG 31 TMA v3"},{"Name":"Luminen Shock","Talent":"Luminen Shock","Benefit":"Counts as a melee weapon that inflicts 1d10 plus his WPB in Energy damage, with Pen 0 and the Shocking quality. Must pass a Toughness test or suffer 1 level of Fatigue after attack.","Prerequisites":"Luminen Capacitors,Mechanicus Implants","Aptitude 1":"Weapon Skill","Aptitude 2":"Tech","Tier":"T2","Page":"PG 129 CB"},{"Name":"Marksman","Talent":"Marksman","Benefit":"No penalties for firing at long or extreme range.","Prerequisites":"BS 35","Aptitude 1":"Ballistic Skill","Aptitude 2":"Finesse","Tier":"T2","Page":"PG 130 CB"},{"Name":"Nerves Of Steel","Talent":"Nerves Of Steel","Benefit":"The character may re-roll failed Willpower Tests to avoid or recover from Pinning. In addition, he is seldom impressed by the aggressive displays of his enemies and gains a +10 to Willpower Tests when resisting the effects of enemy Intimidation Skill attempts","Prerequisites":"-","Aptitude 1":"Willpower","Aptitude 2":"Defense","Tier":"T2","Page":"PG 33 TMA v3"},{"Name":"One-on-One","Talent":"One-on-One","Benefit":"When fighting a single enemy in melee combat, the character scores extra degrees of success on successful Weapon Skill tests equal to half of his Weapon Skill bonus (rounded down).","Prerequisites":"Weapon Skill 40","Aptitude 1":"Finesse","Aptitude 2":"Weapon Skill","Tier":"T2","Page":"PG 61 EB"},{"Name":"Penitent Psyker","Talent":"Penitent Psyker","Benefit":"psyker or ally within 10 metres target of a psychic power suffer any number of levels of Fatigue, each level grants +10 to opposed test to resist or avoid.","Prerequisites":"Psy rating, Strong Minded, Willpower 40","Aptitude 1":"Psyker","Aptitude 2":"Defense","Tier":"T2","Page":"PG 58 EI"},{"Name":"Precision Killer","Talent":"Precision Killer","Benefit":"No penalty to making Called Shot in either Ranged or Melee Combat.","Prerequisites":"BS 40 or WS 40","Aptitude 1":"Ballistic Skill/Weapon Skill","Aptitude 2":"Finesse","Tier":"T2","Page":"PG 130 CB"},{"Name":"Purity of Hatred","Talent":"Purity of Hatred","Benefit":"Attacks gain the Vengeful (9) quality against opponents of Hatred group.","Prerequisites":"Hatred (Any)","Aptitude 1":"Offence","Aptitude 2":"Willpower","Tier":"T2","Page":"PG 58 EI"},{"Name":"Rites of Banishment","Talent":"Rites of Banishment","Benefit":"Once per round as a Half Action, the character may speak the litanies and invocations to disrupt Daemons. Until the beginning of his next turn, Daemons within a distance equal to twice the character’s Willpower bonus in meters suffer a -10 penalty to Willpower tests.","Prerequisites":"Common Lore (Imperial Creed) +10 or Forbidden Lore (Daemonology)","Aptitude 1":"Offence","Aptitude 2":"Willpower","Tier":"T2","Page":"PG 61 EB"},{"Name":"Strong Minded","Talent":"Strong Minded","Benefit":"May reroll failed WP tests to resist psychic powers.","Prerequisites":"WP 30, Resistance(Psychic Powers)","Aptitude 1":"Willpower","Aptitude 2":"Defense","Tier":"T2","Page":"PG 131 CB"},{"Name":"Swift Attack","Talent":"Swift Attack","Benefit":"Regular melee attacks deal an additional hit for every two DoS.","Prerequisites":"WS 30","Aptitude 1":"Weapon Skill","Aptitude 2":"Finesse","Tier":"T2","Page":"PG 131 CB"},{"Name":"Two-Weapon Wielder","Talent":"Two-Weapon Wielder","Benefit":"Attacks with two weapons count as being part of the same Half Action, and both tests made to attack with the weapons suﬀer a -20 penalty.","Prerequisites":"-","Aptitude 1":"Weapon Skill/Ballistic Skill","Aptitude 2":"Finesse","Tier":"T2","Page":"PG 132 CB"},{"Name":"Whirlwind of Death","Talent":"Whirlwind of Death","Benefit":"As a Half Action, may make one Standard Attack action with a melee weapon against a foe, plus one additional Standard Attack action with the same weapon targeting each other foe also engaged in melee combat with the character beyond the ﬁrst (to a maximum number of attacks up to his Weapon Skill bonus).","Prerequisites":"WS 40","Aptitude 1":"Weapon Skill","Aptitude 2":"Finesse","Tier":"T2","Page":"PG 133 CB"},{"Name":"Adamantium Faith","Talent":"Adamantium Faith","Benefit":"Subtract Willpower bonus from his degrees of failure on a failed Fear or Pinning test. If this reduces the result to zero or less, he counts as having passed the Fear test with 1 degree of success.","Prerequisites":"Jaded, Resistance (Fear), WP 45","Aptitude 1":"Willpower","Aptitude 2":"Defense","Tier":"T3","Page":"PG 123 CB"},{"Name":"Aegis of Contempt","Talent":"Aegis of Contempt","Benefit":"Character or an ally within 10 metres gains Corruption, reduce the amount by 1 to a min of 0.","Prerequisites":"Shared Destiny, Shield of Contempt, Hatred (any)","Aptitude 1":"Defense","Aptitude 2":"Leadership","Tier":"T3","Page":"PG 57 EI"},{"Name":"Blademaster","Talent":"Blademaster","Benefit":"When attacking with any bladed weapon, can re-roll one missed attack per round.","Prerequisites":"WS 30, Weapon Training (any Melee)","Aptitude 1":"Weapon Skill","Aptitude 2":"Finesse","Tier":"T3","Page":"PG 123 CB"},{"Name":"Concealed Cavity","Talent":"Concealed Cavity","Benefit":"Discovering this compartment requires success on a Difficult (-10) Scrutiny Test. If using a medicae scanner or auspex, the Difficulty is reduced to Ordinary (+10).","Prerequisites":"-","Aptitude 1":"Tech","Aptitude 2":"Toughness","Tier":"T1","Page":"PG 26 TMA v3"},{"Name":"Daemonic Disruption","Talent":"Daemonic Disruption","Benefit":"Whenever a creature with the Warp Instability trait makes a successful attack test against this character, it must immediately test for Warp Instability after resolving the attack.","Prerequisites":"Bane of the Daemon, Willpower 50, Untouchable elite advance","Aptitude 1":"Willpower","Aptitude 2":"General","Tier":"T3","Page":"PG 60 EB"},{"Name":"Disturbing Voice","Talent":"Disturbing Voice","Benefit":"The character gains a +10 bonus to all Intimidate Skill Tests, but suffers a -10 penalty to Fellowship Testshen using the Command Terrify Special Skill Use, and adds +10 to his Command Skill Test to counter the effects of Fear.","Prerequisites":"-","Aptitude 1":"Fellowship","Aptitude 2":"Social","Tier":"T1","Page":"PG 28 TMA v3"},{"Name":"Divine Protection","Talent":"Divine Protection","Benefit":"Attacks using Spray quality only effects enemies.","Prerequisites":"Ballistic Skill 45, Willpower 35","Aptitude 1":"General","Aptitude 2":"Finesse","Tier":"T3","Page":"PG 57 EI"},{"Name":"Electro Illumination","Talent":"Electro Illumination","Benefit":"The character may blast his enemies with electricity at a distance by making a ranged attack (requiring a Ballistic Skill test) against a single target within 10 meters, ignoring all range modifiers (the bonus for Aiming still applies, but not for Short or Point-Blank range). The character may also deliver a deadly shock to an opponent in combat by either making a single melee attack, or by grappling to deliver the blast (yes, this Talent may be used while grappling). The attack does 1d10 + Willpower Bonus Energy damage, has a Penetration equal to the character’s Willpower Bonus, and has the Shocking quality. The character may opt to spend wounds to boost the Damage and Penetration of the attack by one point each per wound. If the loss of these wounds cause critical damage, it counts as Energy Damage to the character’s body. The character always counts as having Weapon Training for this weapon and after making an attack with it, he must pass a Toughness test or suffer 1 level of Fatigue.        On a successful Toughness Test, the character may use his bio-electrical field to recharge or power machinery.","Prerequisites":"Luminen Blast, Luminen Charge, Luminen Shock , Luminen Capacitors, Mechanicus Implants","Aptitude 1":"Ballistic Skill","Aptitude 2":"Tech","Tier":"T3","Page":"PG 29 TMA v3"},{"Name":"Elimination Volley","Talent":"Elimination Volley","Benefit":"The character is excellent at marking enemies for his allies to destroy. If the character uses a weapon with the Luminagen quality, and inflicts at least one wound against a target, until the start of his next round, all allies gain a +10 bonus to Ballistic Skill tests against the enemy, and ignore armor points granted by cover to the enemy","Prerequisites":"-","Aptitude 1":"Ballistic Skill","Aptitude 2":"Finesse","Tier":"T3","Page":"PG 29 TMA v3"},{"Name":"Fearless","Talent":"Fearless","Benefit":"The character is immune to the effects of Fear and Pinning, but disengaging from combat or backing down from a fight is difficult for them to stomach, and as such requires a successful Challenging (+0) Willpower Test","Prerequisites":"Nerves of Steel, Adamantium Faith","Aptitude 1":"Willpower","Aptitude 2":"Defense","Tier":"T3","Page":"PG 30 TMA v3"},{"Name":"Feedback Screech","Talent":"Feedback Screech","Benefit":"All unprotected creatures within a 30-metre radius who have the ability to hear must make a Challenging (+0) Willpower Test or lose a Half Action on their next Turn as they involuntarily react to the cacophonous shriek.","Prerequisites":"Mechanicus Implants, Vocal Implants","Aptitude 1":"Tech","Aptitude 2":"Intelligence","Tier":"T1","Page":"PG 30 TMA v3"},{"Name":"Ferric Summons","Talent":"Ferric Summons","Benefit":"Can summon larger metallic objects up to 2 kilograms per point of his Willpower bonus, and can summon such objects up to 40 metres.","Prerequisites":"Ferric Lure Implants,Mechanicus Implants","Aptitude 1":"Willpower","Aptitude 2":"Tech","Tier":"T1","Page":"PG 127 CB"},{"Name":"Instrument of His Will","Talent":"Instrument of His Will","Benefit":"After making a successful attack against a Daemon (this can include striking it with a psychic power), the character may spend a Fate point to increase the damage of the first hit he inflicts as part of that attack by an amount equal to twice his Willpower bonus. This additional damage ignores armour and Toughness bonus.","Prerequisites":"Willpower 50","Aptitude 1":"Offence","Aptitude 2":"Willpower","Tier":"T3","Page":"PG 61 EB"},{"Name":"Iron Faith","Talent":"Iron Faith","Benefit":"The character is immune to the effects of the Baneful Presence trait.","Prerequisites":"Iron Resolve","Aptitude 1":"Defense","Aptitude 2":"Willpower","Tier":"T3","Page":"PG 61 EB"},{"Name":"Keen Intuition","Talent":"Keen Intuition","Benefit":"Can retry Awareness test once with -10 modifier.","Prerequisites":"Int 35","Aptitude 1":"Perception","Aptitude 2":"Social","Tier":"T1","Page":"PG 129 CB"},{"Name":"Lightning Attack","Talent":"Lightning Attack","Benefit":"Character may make many melee attacks with single roll.","Prerequisites":"Swift Attack","Aptitude 1":"Weapon Skill","Aptitude 2":"Finesse","Tier":"T3","Page":"PG 129 CB"},{"Name":"Luminen Blast","Talent":"Luminen Blast","Benefit":"Counts as being equipped with a single shot Pistol weapon with a 10m range and deals 1d10 plus twice his Willpower bonus in Energy damage. Must pass a Toughness test or suffer 1 level of Fatigue after attack.","Prerequisites":"Luminen Shock, Luminen Capacitors, Mechanicus Implants","Aptitude 1":"Ballistic Skill","Aptitude 2":"Tech","Tier":"T3","Page":"PG 129 CB"},{"Name":"Luminen Flare","Talent":"Luminen Flare","Benefit":"On a successful Ballistic Skill Test, he may direct this energy at a single target within 20 meters The attack deals 1d10 plus his Willpower Bonus in Energy Damage, and has the Blast (X) Quality, where X equals the character’s Willpower Bonus. This counts as a Half Action, and each time the Acolyte uses this Talent, he must first pass a Challenging (+0) Toughness Test or gain a level of Fatigue.","Prerequisites":"Luminen Blast, Luminen Capacitors, Mechanicus Implants","Aptitude 1":"Ballistic Skill","Aptitude 2":"Tech","Tier":"T3","Page":"PG 31 TMA v3"},{"Name":"Luminen Surge","Talent":"Luminen Surge","Benefit":"He must touch his enemy for this ability to work. In combat, he must either make a successful Challenging (+0) Weapon Skill Test or be Grappling to deliver the blast. Each Luminen Surge deals 2d10+3 points of Energy Damage. This counts as a Half Action, and each time the character uses this Talent, he must pass a Challenging (+0) Toughness Test or gain a level of Fatigue.","Prerequisites":"Luminen Shock, Luminen Capacitors, Mechanicus Implants","Aptitude 1":"Ballistic Skill","Aptitude 2":"Tech","Tier":"T3","Page":"PG 31 TMA v3"},{"Name":"Masterwork Bionics","Talent":"Masterwork Bionics","Benefit":"The Character may reroll failed Toughness tests granted by the Defensive Alchemistry and Defensive Augmentation talents","Prerequisites":"Defensive Alchemistry, Toughness 50","Aptitude 1":"Defense","Aptitude 2":"Toughness","Tier":"T3","Page":"PG 33 TMA v3"},{"Name":"Never Die","Talent":"Never Die","Benefit":"Ignore penalties from Critical damage by spending Fate point. Once the encounter ends, the effects trigger as normal.","Prerequisites":"WP 50, T 50","Aptitude 1":"Toughness","Aptitude 2":"Defense","Tier":"T3","Page":"PG 130 CB"},{"Name":"Peer","Talent":"Peer","Benefit":"Character has good reputation amongst chosen group with bonus to Fellowship tests increases to +10 times X. Additionally, when the character acquires his talent, also increases his Influence by 1.","Prerequisites":"Fel 30","Aptitude 1":"Fellowship","Aptitude 2":"Social","Tier":"T1","Page":"PG 130 CB"},{"Name":"Rite of Awe","Talent":"Rite of Awe","Benefit":"The Omnissiah has augmetically blessed the Explorator’s voice box, allowing him to recite infrasonic liturgies that trigger awe and fear. All humans, regardless of their ability to hear, within a 50-metre radius feel a sense of dread and take a -10 penalty to their next Skill Test. Characters may ignore these effects with a successful Willpower Test. Whilst incanting the rite, the character may not talk or communicate with others. The rite requires two minutes of litanies, and it is considered very bad form to break off the recitation before completion. Humans without auditory implants cannot hear infrasonic sound, and though still affected, will not know the Explorator is speaking.","Prerequisites":"Mechanicus Implants","Aptitude 1":"Tech","Aptitude 2":"Willpower","Tier":"T1","Page":"PG 34 TMA v3"},{"Name":"Suffer the Flesh","Talent":"Suffer the Flesh","Benefit":"The character can remove an additional 1d5 wounds with a successful First Aid test","Prerequisites":"Medicae, Mechanicus Implants,Medicae Mechadendrite","Aptitude 1":"Tech","Aptitude 2":"Intelligence","Tier":"T1","Page":"PG 34 TMA v3"},{"Name":"Superior Chirurgeon","Talent":"Superior Chirurgeon","Benefit":"Gain +20 to Medicae tests, bonuses to first aid tests and only suffers a -10 penalty for those suffering Critical damage.","Prerequisites":"Rank 2 in Medicae skill","Aptitude 1":"Intelligence","Aptitude 2":"Fieldcraft","Tier":"T3","Page":"PG 131 CB"},{"Name":"Target Selection","Talent":"Target Selection","Benefit":"May shoot into melee without penalty. Also an Aim action beforehand, prevents any chance of hitting friendly targets as well.","Prerequisites":"BS 50","Aptitude 1":"Ballistic Skill","Aptitude 2":"Finesse","Tier":"T3","Page":"PG 132 CB"},{"Name":"Technical Knock","Talent":"Technical Knock","Benefit":"Un-jam gun as Half Action.","Prerequisites":"Int 30","Aptitude 1":"Intelligence","Aptitude 2":"Tech","Tier":"T1","Page":"PG 132 CB"},{"Name":"Total Recall","Talent":"Total Recall","Benefit":"The character can automatically remember trivial facts or pieces of information the character might feasibly have picked up in the past. When dealing with more detailed, complex, or obscure facts, such as the exact layout of a defense network, the GM may require a successful Intelligence Test to recall the information.","Prerequisites":"Intelligence 30","Aptitude 1":"Intelligence","Aptitude 2":"Knowledge","Tier":"T1","Page":"PG 34 TMA v3"},{"Name":"True Grit","Talent":"True Grit","Benefit":"Reduce Critical damage taken.","Prerequisites":"T 40","Aptitude 1":"Toughness","Aptitude 2":"Defense","Tier":"T3","Page":"PG 132 CB"},{"Name":"Two-Weapon Master","Talent":"Two-Weapon Master","Benefit":"No penalties when fighting with two single handed weapons.","Prerequisites":"Ag 45, Ambidextrous, BS 40 or WS 40, Two-Weapon Wielder (Melee, Ranged)","Aptitude 1":"Finesse","Aptitude 2":"Offence","Tier":"T3","Page":"PG 132 CB"},{"Name":"Warp Sense","Talent":"Warp Sense","Benefit":"Allows Psyniscience test as Free Action.","Prerequisites":"Psy Rating,Psyniscience, Per 30","Aptitude 1":"Perception","Aptitude 2":"Psyker","Tier":"T1","Page":"PG 133 CB"},{"Name":"Weapon-Tech","Talent":"Weapon-Tech","Benefit":"May enhance any Melta, Plasma, Power, or Exotic weapon by  increases the weapon’s damage and penetration by an amount equal to the character’s Intelligence bonus until the end of the round once per encounter.","Prerequisites":"Tech Use +10, Int 40","Aptitude 1":"Intelligence","Aptitude 2":"Tech","Tier":"T1","Page":"PG 133 CB"},{"Name":"Ambassador Imperialis","Talent":"Ambassador Imperialis","Benefit":"Any penalty to Interaction skill tests for dealing with xenos or non-Imperial NPCs by 20. In addition, once per encounter, he can reroll a failed Interaction skill test when interacting with such an NPC.","Prerequisites":"Fellowship 35, Intelligence 35","Aptitude 1":"Perception","Aptitude 2":"Social","Tier":"T2","Page":"PG 62 EO"},{"Name":"Archivator","Talent":"Archivator","Benefit":"A Scholastic Lore or Forbidden Lore test utilising sources of recorded information of any sort can re-roll with -10.","Prerequisites":"Intelligence 40","Aptitude 1":"Knowledge","Aptitude 2":"Social","Tier":"T2","Page":"PG 62 EO"},{"Name":"Armor-Monger","Talent":"Armor-Monger","Benefit":"Gains an extra amount of Armor points equal to his Intelligence bonus. Takes an hour each day.","Prerequisites":"Int 35, Tech-Use, Trade (Armourer)","Aptitude 1":"Intelligence","Aptitude 2":"Tech","Tier":"T2","Page":"PG 123 CB"},{"Name":"Conditioned Intellect","Talent":"Conditioned Intellect","Benefit":"By spending ten minutes studying or analyzing a problem, the character gains a +10 bonus to his next Intelligence Test. If the character succeeds, he counts as having passed by an additional degree of success. The character can also automatically remember any piece of information he might feasibly have picked up in the past. When trying to recall more detailed or obscure facts, such as the precise layout of a crime scene or a page he read in an ancient grimoire five years ago, the character must make an Intelligence Test.","Prerequisites":"Intelligence 40","Aptitude 1":"Intelligence","Aptitude 2":"Knowledge","Tier":"T2","Page":"PG 26 TMA v3"},{"Name":"Contact Network","Talent":"Contact Network","Benefit":"Use Fellowship instead of Influence for Requisition tests.","Prerequisites":"Cover-Up, Int 35","Aptitude 1":"Fellowship","Aptitude 2":"Leadership","Tier":"T2","Page":"PG 124 CB"},{"Name":"Coordinated Interrogation","Talent":"Coordinated Interrogation","Benefit":"Has a +10 bonus to all Interrogate tests, additional +5 for others who also have Coordinated Interrogation","Prerequisites":"S 40 or WP 40, Clues from the Crowds, Rank 1 (Known) Interrogation","Aptitude 1":"Intelligence","Aptitude 2":"Social","Tier":"T2","Page":"PG 124 CB"},{"Name":"Cover-Up","Talent":"Cover-Up","Benefit":"Can reduce Influence by 1 to gain 1d5 Subtlety.","Prerequisites":"Int 35","Aptitude 1":"Intelligence","Aptitude 2":"Knowledge","Tier":"T2","Page":"PG 125 CB"},{"Name":"Cybernetic Boost","Talent":"Cybernetic Boost","Benefit":"As a Half Action, this character may spend a Fate Point and make a Challenging (+0) Tech-Use Test. If he succeeds, he gains either the Unnatural Agility (X) or Unnatural Strength (X) Trait, where X is equal to one, plus one for every two additional Degrees of Success he scores on the Test (or increases existing versions of those Traits by X). These Traits persist for a number of Rounds equal to his Intelligence Bonus. The character may end the effect at any time. At the end of each Round in which the character allows it to persist, he gains 1 level of Fatigue.","Prerequisites":"One or more Cybernetic Limbs, Tech-Use","Aptitude 1":"Intelligence","Aptitude 2":"Tech","Tier":"T2","Page":"PG 26 TMA v3"},{"Name":"Daemonologist","Talent":"Daemonologist","Benefit":"When the character takes the Focus Power action and the target of the psychic power is a Daemon, he gains a +10 bonus to the Focus Power test. At the GM’s discretion, this bonus may apply to other tests, such as rituals to summon or bind a Daemon.","Prerequisites":"Psy rating 3, Willpower 45, Forbidden Lore (Daemonology)","Aptitude 1":"Psyker","Aptitude 2":"Willpower","Tier":"T2","Page":"PG 60 EB"},{"Name":"Electrical Succor","Talent":"Electrical Succor","Benefit":"Whilst in contact with a functioning, powered machine, or fully charged battery, the character may make an Ordinary (+10) Toughness Test. If he succeeds, he removes one level of Fatigue plus one additional level of Fatigue for each degree of success","Prerequisites":"Mechanicus Implants","Aptitude 1":"Tech","Aptitude 2":"Toughness","Tier":"T2","Page":"PG 29 TMA v3"},{"Name":"Energy Cache","Talent":"Energy Cache","Benefit":"he character has learned to focus the power stored within his Potentia Coil with greater efficiency. He no longer gains Fatigue from using Luminen Charge, Luminen Shock, and Luminen Blast","Prerequisites":"Mechanicus Implants","Aptitude 1":"Tech","Aptitude 2":"Toughness","Tier":"T2","Page":"PG 29 TMA v3"},{"Name":"Exotic Weapon Training","Talent":"Exotic Weapon Training","Benefit":"Gain proficiency with one exotic weapon type.","Prerequisites":"-","Aptitude 1":"Intelligence","Aptitude 2":"Finesse","Tier":"T2","Page":"PG 127 CB"},{"Name":"Face in a Crowd","Talent":"Face in a Crowd","Benefit":"Can use Fellowship instead of Agility when Shadowing.","Prerequisites":"Fel 35, Cluesfrom the Crowds","Aptitude 1":"Fellowship","Aptitude 2":"Social","Tier":"T2","Page":"PG 127 CB"},{"Name":"Inspiring Aura","Talent":"Inspiring Aura","Benefit":"can affect allies of any kind with the Terrify special use for the Command skill (pg 101 CB). This need not represent threats and intimidation, but might represent inspiring words, encouragement, or sheer steadfastness in the face of terrifying foes.","Prerequisites":"Halo of Command","Aptitude 1":"Leadership","Aptitude 2":"Willpower","Tier":"T2","Page":"PG 61 EB"},{"Name":"Lexographer","Talent":"Lexographer","Benefit":"The character can attempt any Linguistics skill in which he is not trained as an untrained skill test as if it were not a Specialist skill.","Prerequisites":"Rank 3 in Linguistics (Any)","Aptitude 1":"Intelligence","Aptitude 2":"Knowledge","Tier":"T2","Page":"PG 63 EO"},{"Name":"Maglev Transcendence","Talent":"Maglev Transcendence","Benefit":"Can hover for a number of minutes equal to 1d10 plus twice his Toughness bonus. He can move his Run speed when making a Half Move action and suffers no damage from falling if the coils are active. Each use drains half the power stored in the coils (can use the coils twice before recharging them).","Prerequisites":"Maglev Coils,Mechanicus Implants","Aptitude 1":"Intelligence","Aptitude 2":"Tech","Tier":"T2","Page":"PG 129 CB"},{"Name":"Mechadendrite Use (Techsorcist)","Talent":"Mechadendrite Use (Techsorcist)","Benefit":"The Techsorcist has chosen to alter one of his mechadendrites to assist in his duties. This mechadendrite has special electronic wards put in place to resist the effects of corruption from Chaos-infested machine spirits. It also houses a small memory unit for storing proscribed documents and is set to automatically wipe itself upon removal of the mechadendrite or the death of the Techsorcist. When using a mechadendrite the Techsorcist gains a +10 to Forbidden Lore (Tech- Heresy) rolls, and a +10 to all Tech-Use Tests when interfacing with a corrupted machine spirit.","Prerequisites":"Techsorcist, Mechanicus Implants","Aptitude 1":"Tech","Aptitude 2":"Intelligence","Tier":"T2","Page":"PG 33 TMA v3"},{"Name":"Mechadendrite Use","Talent":"Mechadendrite Use","Benefit":"Gain ability to use certain Mechadendrites. Weapon or Utility.","Prerequisites":"Mechanicus Implants","Aptitude 1":"Intelligence","Aptitude 2":"Tech","Tier":"T2","Page":"PG 130 CB"},{"Name":"Numinous Reclamation","Talent":"Numinous Reclamation","Benefit":"Depending on his factional declaration, the Electro- priest can better steal the energy from his unworthy enemies, or bless them with further energy! Against an enemy who was wounded by an Energy based attack in the previous round, the character may either fire an additional shot at the enemy (if wielding electrostatic gauntlets) or reroll damage in melee against the enemy (if wielding electroleech staves).","Prerequisites":"Electro-Priest","Aptitude 1":"Willpower","Aptitude 2":"Offense","Tier":"T2","Page":"PG 33 TMA v3"},{"Name":"Predictive Augury","Talent":"Predictive Augury","Benefit":"When subjected to a Charge action by an enemy, the character may perform the Suppressive Fire action as a reaction against the enemy. If the character’s weapon is incapable of the Suppressive Fire action, they may fire a single shot Ranged attack with a -20 penalty. Spray weapons instead grant a +20 bonus to the Agility test to avoid the shot. This reaction attack may not benefit from Doctrina Imperatives.","Prerequisites":"Willpower 30, Nerves of Steel","Aptitude 1":"Willpower","Aptitude 2":"Offense","Tier":"T2","Page":"PG 33 TMA v3"},{"Name":"Prosanguine","Talent":"Prosanguine","Benefit":"Spend 10 minutes and make a Tech-Use test to heal 1d5 damage. Rolls 96 or higher, loses the ability for one week.","Prerequisites":"Auto Sanguine Implants,Mechanicus Implants","Aptitude 1":"Toughness","Aptitude 2":"Tech","Tier":"T2","Page":"PG 131 CB"},{"Name":"Rite of Fear","Talent":"Rite of Fear","Benefit":"The Explorator’s infrasonic dirges cause terror in the weak. All humans, regardless of their ability to hear, within a 50-metre radius treat the character as if he has a Fear Rating of 1. While incanting the dirge, he may not communicate in any other way. The rite requires two minutes of chanting, and most would not consider halting the incantations prior to their completion. Humans without auditory augmentation cannot hear infrasonic sound, and though still affected, will not know the Explorator is speaking","Prerequisites":"Vocal Implant, Mechanicus Implants","Aptitude 1":"Tech","Aptitude 2":"Willpower","Tier":"T2","Page":"PG 34 TMA v3"},{"Name":"Tainted Psyker","Talent":"Tainted Psyker","Benefit":"When making a Focus Power test, the character may gain a number of Corruption points up to his psy rating. For each point he gains in this way, he gains a +10 bonus but adds +5 to rolls on Table 6-2 Psychic Phenomena","Prerequisites":"Psy rating, Rank 2 (Trained) in Psyniscience Skill, 10 Corruption points","Aptitude 1":"Knowledge","Aptitude 2":"Psyker","Tier":"T2","Page":"PG 58 EI"},{"Name":"Warp Conduit","Talent":"Warp Conduit","Benefit":"Spend Fate point to add 1d5 to psy rating however he adds +30 to rolls on Table 6-2: Psychic Phenomena","Prerequisites":"Psy Rating, StrongMinded, WP 50","Aptitude 1":"Willpower","Aptitude 2":"Psyker","Tier":"T2","Page":"PG 132 CB"},{"Name":"Witch Finder","Talent":"Witch Finder","Benefit":"Counts as possessing the Psyniscience skill at Rank 1 (Known), even though he is not a psyker.","Prerequisites":"Rank 2 (Trained) in the Forbidden Lore (Psykers)skill, Willpower 45","Aptitude 1":"Knowledge","Aptitude 2":"Perception","Tier":"T2","Page":"PG 58 EI"},{"Name":"Xenosavant","Talent":"Xenosavant","Benefit":"The character can attempt any Forbidden Lore (Xenos) test in which he is not trained as an untrained skill test as if it were not a Specialist skill.","Prerequisites":"Rank 3 in Forbidden Lore (Xenos-Any)","Aptitude 1":"Intelligence","Aptitude 2":"Knowledge","Tier":"T2","Page":"PG 63 EO"},{"Name":"Archeotech Specialist","Talent":"Archeotech Specialist","Benefit":"The Character may substitute Forbidden Lore (Archeotech) for Influence when rolling for requisitions.","Prerequisites":"Intelligence 35","Aptitude 1":"Knowledge","Aptitude 2":"Tech","Tier":"T3","Page":"PG 25 TMA v3"},{"Name":"Bastion of Iron Will","Talent":"Bastion of Iron Will","Benefit":"Adds 5 x his psy rating to any Opposed test when defending against psychic powers.","Prerequisites":"Psy Rating, Strong Minded, WP 40","Aptitude 1":"Willpower","Aptitude 2":"Psyker","Tier":"T3","Page":"PG 123 CB"},{"Name":"Cybernetic Calibrations","Talent":"Cybernetic Calibrations","Benefit":"All of this character’s Cybernetics count as being one level of Craftsmanship higher than their base Craftsmanship","Prerequisites":"Two or more Cybernetics, Tech-Use +10, Cybernetic Boost","Aptitude 1":"Intelligence","Aptitude 2":"Tech","Tier":"T3","Page":"PG 26 TMA v3"},{"Name":"Dark Soul","Talent":"Dark Soul","Benefit":"When the character would test to gain a mutation as a result of increasing Corruption, he may choose to automatically pass the test. If he does, he also gains a Malignancy and increases his Corruption total by 1d10.","Prerequisites":"Hardened Soul, 20 Corruption points","Aptitude 1":"Toughness","Aptitude 2":"Willpower","Tier":"T3","Page":"PG 60 EB"},{"Name":"Deathdealer","Talent":"Deathdealer","Benefit":"Selects the Specialisation that matches the prerequisite used in purchase (Melee with Weapon Skill, Ranged with Ballistic Skill). Attack in that combat type inflicts Critical damage, add his Perception bonus to the damage result.","Prerequisites":"BS 45 or WS 45","Aptitude 1":"Perception","Aptitude 2":"Finesse","Tier":"T3","Page":"PG 125 CB"},{"Name":"Delicate Interrogation","Talent":"Delicate Interrogation","Benefit":"Reduce Subtlety loss by 1d5 when conducting an Interrogation. If this results in a negative number increase the warband’s Subtlety by 1.","Prerequisites":"Fel 50, Coordinated Interrogation","Aptitude 1":"Intelligence","Aptitude 2":"Finesse","Tier":"T3","Page":"PG 125 CB"},{"Name":"Emotionless Clarity","Talent":"Emotionless Clarity","Benefit":"When subjected to a Charge action by an enemy, the character may perform the Ranged Standard Attack, Semi Auto Attack, or Full Auto Attack action as a reaction against the enemy with a +20 bonus. Spray weapons grant a -20 penalty to the agility test to avoid the shot.  Note: This reaction attack may not benefit from Doctrina Imperatives","Prerequisites":"Predictive Augury, Willpower 35, Fearless","Aptitude 1":"Willpower","Aptitude 2":"Offense","Tier":"T3","Page":"PG 29 TMA v3"},{"Name":"Favored by the Warp","Talent":"Favored by the Warp","Benefit":"Roll twice for Psychic Phenomena and choose result.","Prerequisites":"WP 35","Aptitude 1":"Willpower","Aptitude 2":"Psyker","Tier":"T3","Page":"PG 127 CB"},{"Name":"Flash of Insight","Talent":"Flash of Insight","Benefit":"Spend 1 Fate point to reveal a clue.","Prerequisites":"Int 40, Contact Network, Coordinated Interrogation","Aptitude 1":"Perception","Aptitude 2":"Knowledge","Tier":"T3","Page":"PG 127 CB"},{"Name":"Gravitic Levitation","Talent":"Gravitic Levitation","Benefit":"The character has mastered the secrets of anti- Gravitic field generation. He floats above the ground and can even raise himself to float through the air in defiance of gravity. The character may hover, at will, 20 to 30 centimeters off the ground, and may move normally while doing so. He may deactivate and reactivate this effect at will as a Free Action. Should the character fall, he takes no damage so long as this rite is active when he reaches the ground. Once every 6 hours, the character may spend a Half Action to gain the Flyer (3) trait, which he may maintain for a number of minutes equal to the character’s Toughness Bonus.","Prerequisites":"Maglev Grace, Maglev Transcendence, Maglev Coils, Mechanicus Implants","Aptitude 1":"Intelligence","Aptitude 2":"Tech","Tier":"T3","Page":"PG 30 TMA v3"},{"Name":"Halo of Command","Talent":"Halo of Command","Benefit":"Affect NPCs within 100xFelB metres with Social skills.","Prerequisites":"Fel 40, WP 40","Aptitude 1":"Fellowship","Aptitude 2":"Leadership","Tier":"T3","Page":"PG 127 CB"},{"Name":"Indomitable Conviction","Talent":"Indomitable Conviction","Benefit":"Character or an ally within 10 metres gains Insanity, reduce the amount by 1 to a min of 0.","Prerequisites":"Shared Destiny, Strength through Conviction, Resistance (Fear), Jaded","Aptitude 1":"Leadership","Aptitude 2":"Willpower","Tier":"T3","Page":"PG 57 EI"},{"Name":"Infused Knowledge","Talent":"Infused Knowledge","Benefit":"counts as having all Common Lore and Scholastic Lore skills at rank 1 (Known).","Prerequisites":"Int 40, Lore (anyone)","Aptitude 1":"Intelligence","Aptitude 2":"Knowledge","Tier":"T3","Page":"PG 128 CB"},{"Name":"Into the Jaws of Hell","Talent":"Into the Jaws of Hell","Benefit":"Subtract the fellowship bonus from DoF for failed Fear or Pinning test.","Prerequisites":"Adamantium Faith, Halo of Command, Will of the Inquisitor","Aptitude 1":"Leadership","Aptitude 2":"Willpower","Tier":"T3","Page":"PG 57 EI"},{"Name":"Luminen Desecration","Talent":"Luminen Desecration","Benefit":"The Explorer’s implants generate a violent techsorcism pulse, allowing him to disable technology in his presence. A single gesture and most sophisticated devices simply cease to function. A successful Challenging (+0) Ballistic Skill Test allows him to direct the energy against a single target within 10 meters. This is a ranged attack and can be Dodged but not blocked by Fields or other protective devices. If the target is carrying any electrical devices— including energy weapons and bionic systems—then they cease to operate for 1d5 rounds, as if their power had run out. If the target is a vehicle, then it immediately suffers a Critical Hit as if the user had scored Righteous Fury, subtracting one to the Critical Hit result (a result of zero results in no Critical Hit).","Prerequisites":"Luminen Capacitors, Mechanicus Implants","Aptitude 1":"Tech","Aptitude 2":"Willpower","Tier":"T3","Page":"PG 31 TMA v3"},{"Name":"Machine Of Flesh","Talent":"Machine Of Flesh","Benefit":"Talent Groups: Brute, Clawed/Fanged, Feels No Pain, Multiple Arms, Nightsider, Regeneration, Sonar Sense, Sturdy, Tough Hide, Venomous, Winged Effects:  Flesh is not a weakness as far as you are concerned, but rather a font of untapped potential. Locked within your genes and your tissues are the secrets to greater power, and though you do not eschew the purity of steel nor your existing implants, you see them only as part of the mechanism by which you can better yourself.      You gain one of the following mutations: Brute, Clawed/Fanged, Feels No Pain, Nightsider, Tough Hide, or Venomous, or one of the following Traits: Regeneration, Sonar Sense or Sturdy. You gain that Trait or the effects of the Mutation (although, as you are either grafting biological systems into your body or manipulating your own genetic structure, whether or not you are actually a mutant is debatable).","Prerequisites":"Medicae, Scholastic Lore (Chymistry) +30","Aptitude 1":"Tech","Aptitude 2":"Knowledge","Tier":"T3","Page":"PG 31 TMA v3"},{"Name":"Master Enginseer","Talent":"Master Enginseer","Benefit":"The character gains a +10 bonus on Tech-Use Skill Tests. The character may spend a Fate Point to automatically succeed on a Tech-Use Skill Test for enhancement, repair, or upgrade of a machine’s system, taking the minimum amount of time possible on the task. In addition, at the GM’s discretion, the character may repair objects without all the parts to hand, jury-rigging a working device as good as the original.","Prerequisites":"Tech Use +20, Mechanicus Implants","Aptitude 1":"Intelligence","Aptitude 2":"Tech","Tier":"T3","Page":"PG 33 TMA v3"},{"Name":"Mastery","Talent":"Mastery","Benefit":"May spend Fate point to succeed on test if the final modifier to his skill test is Challenging (+0) or better, score a number of degrees of success equal to the characteristic bonus.","Prerequisites":"Rank 4 in selected skill","Aptitude 1":"Intelligence","Aptitude 2":"Knowledge","Tier":"T3","Page":"PG 130 CB"},{"Name":"Push the Limit","Talent":"Push the Limit","Benefit":"Once per round, the character may add +20 to an Operate test  however, if he fails the test by 4 or more degrees of failure, immediately roll 1d5 on Table 7-32: Motive Systems Critical Hit effects and apply the result. If he is riding a living mount, roll 1d5 on Table 7-18: Impact Critical effects - Leg","Prerequisites":"Rank 2 in Survival or any Operate skill, Tech-Use","Aptitude 1":"Perception","Aptitude 2":"Tech","Tier":"T3","Page":"PG 63 EO"},{"Name":"Rite of Pure Thought","Talent":"Rite of Pure Thought","Benefit":"The character has replaced the creative half of his brain with sacred cranial circuitry. The character can no longer feel emotion, and instead embraces the crystal purity of logic, making him immune to Fear, Pinning and any effects that stem from emotional disturbance. The GM will remove any Mental Disorders that no longer apply, and grant appropriate new ones of equal severity. The character’s fellow allies may find him somewhat cold, though other followers of the Omnissiah will rejoice in his newfound freedom.","Prerequisites":"Mechanicus Implants","Aptitude 1":"Tech","Aptitude 2":"Intelligence","Tier":"T3","Page":"PG 34 TMA v3"},{"Name":"Sanctic Purity","Talent":"Sanctic Purity","Benefit":"When the character triggers Psychic Phenomena when manifesting a power from the Sanctic Daemonology discipline, he may spend a Fate point in order to negate the result entirely.","Prerequisites":"Daemonologist, Favoured by the Warp, Willpower 50","Aptitude 1":"Psyker","Aptitude 2":"Willpower","Tier":"T3","Page":"PG 61 EB"},{"Name":"The Flesh is Weak (X)","Talent":"The Flesh is Weak (X)","Benefit":"This character gains the Machine (X) Trait, where X is equal to half of the number of Cybernetics he possesses (rounded up), to a maximum of an amount equal to his Toughness Bonus. If he gains a new Cybernetic, the value of the Trait increases to reflect the new Cybernetic. Note that this only applies to Cybernetics such as bionic replacement limbs and organ replacements, sub-systems, and mechadendrites , and not to Traits and Talents that grant similar effects.      Note that the character only benefits from the Armor Points benefit of the Machine Trait until the value of this talent exceeds his Toughness Bonus value.","Prerequisites":"Mechanicus Implants","Aptitude 1":"Tech","Aptitude 2":"Toughness","Tier":"T3","Page":"PG 34 TMA v3"},{"Name":"Warp Lock","Talent":"Warp Lock","Benefit":"Ignore Psychic Phenomenon once per session. Suﬀers 1d5 Energy damage to the Head location (not reduced by Armour or Toughness) as a result, and cannot make any Focus Power tests or sustain other psychic powers until the beginning of his next turn.","Prerequisites":"Psy Rating, Strong Minded, WP 50","Aptitude 1":"Willpower","Aptitude 2":"Psyker","Tier":"T3","Page":"PG 133 CB"},{"Name":"Weapon Intuition","Talent":"Weapon Intuition","Benefit":"The character reduces the penalty for using a weapon without the proper training by 10.","Prerequisites":"Exotic Weapon Training (Any)","Aptitude 1":"Intelligence","Aptitude 2":"Finesse","Tier":"T3","Page":"PG 63 EO"},{"Name":"Inescapable Attack !!!","Talent":"Inescapable Attack !!!","Benefit":"Attacker imposes penalty on all evasion attempts made against this attack equal to 10 times the total degrees of success scored on the attack test.","Prerequisites":"BS 40 or WS 40,Per 35","Aptitude 1":"Weapon Skill /Ballistic Skill","Aptitude 2":"Finesse","Tier":"T2","Page":"PG 128 CB"}],"eliteAdvances":[{"Elite Advance":"Inquisitor","Cost":"1000 XP","Prerequisites":"Fated, Intelligence 50, Perception 50, Willpower 55","Instant Changes":"Gains the Peer (Inquisition) talent, the Forbidden Lore (Pick One) skill, and the Leadership Aptitude.","Unlocked Advances":"Gains access to a special set of talents.","Talents":"Will of the Inquisitor","Tier":"T3","Aptitudes":"Knowledge, Willpower","Detail":"Before rolling the d100 when making a test, may spend one Fate point to count as having rolled a result of 01 on that roll.","Name":"Inquisitor","XP Cost":1000},{"Elite Advance":"Psyker","Cost":"300 XP","Prerequisites":"","Instant Changes":"Gains the Psyker Trait, the Psyker aptitude, and a psy rating of 1.Can not become a Untouchable for any reason.If the character does not have the Sanctioned trait he gains 1d10+3 corruption points.","Unlocked Advances":"Can purchase psychic powers.Can advance psy rating. To do this, the character spends an amount of experience equal to 200 multiplied by his new psy rating value.","Talents":"","Tier":"","Aptitudes":"","Detail":"","Name":"Psyker","XP Cost":300},{"Elite Advance":"Untouchable","Cost":"300 xp","Prerequisites":"","Instant Changes":"Can no longer become a Psyker for any reason. Gains Resistance (Psychic powers) talent.Fellowship characteristic always count as half (rounding up) in value. Anyone with a psy rating or Psyniscience skill, the fellowship counts as 1.Can never gain nor benefit from positive effects of psychic powers or other related unnatural talents, traits, or abilities that call on the warp.Automatically ignores any effects from Psychic Phenomena and gains +30 to resists Perils of the warp.","Unlocked Advances":"Gains access to a special set of talents.","Talents":"","Tier":"","Aptitudes":"","Detail":"","Name":"Untouchable","XP Cost":300},{"Elite Advance":"Sister of Battle","Cost":"750 xp","Prerequisites":"Fellowship 35, Spirit of the Martyr","Instant Changes":"Gain the Peer (Adepta Sororitas) and Weapon Training (Bolt) talents, the Scholastic Lore (Tactica Imperialis) skill, and the Willpower aptitude.","Unlocked Advances":"Gains access to a special set of talents.","Talents":"Zealots Passion","Tier":"T3","Aptitudes":"Fellowship, Offence","Detail":"As a Free Action, this character may spend a Fate point and choose a foe. Until the end of the encounter, she and each of her allies within ten times her Willpower bonus in metres count as possessing the Hatred talent against that kind of enemy.","Name":"Sister of Battle","XP Cost":750},{"Elite Advance":"Astropath","Cost":"300 xp","Prerequisites":"","Instant Changes":"Gains the Soul Bound trait. Rather than choosing a side effect, the character permanently loses his sight.Gains the Unnatural Senses (X) trait, where X equals the Astropath’s Willpower characteristic.","Unlocked Advances":"Gains access to a special set of talents.","Talents":"","Tier":"","Aptitudes":"","Detail":"","Name":"Astropath","XP Cost":300}],"psychicPowers":[{"Power":"Aura of Fear","Source Sheet":"Minor Psychic Powers","Cost":"200 xp","Prerequisite":"Fellowship 35, 5+ Insanity points","Action":"Full Action","Focus Power":"Hard (-20) Willpower test","Range":"Self","Sustained":"Half Action","Subtype":"Concentration","Effect":"The psyker gains the Fear (1) trait as long as he sustains this power but Instead of rolling for Psychic Phenomena should the situation call for it, the psyker instead must take a Fear (4) test and also suffer Warp Shock.","Page":"PG 59 EI","Name":"Aura of Fear","XP Cost":200},{"Power":"Deja Vu","Source Sheet":"Minor Psychic Powers","Cost":"200 xp","Prerequisite":"Willpower 35","Action":"Half Action","Focus Power":"Opposed Difficult (-10) Willpower test","Range":"5 metres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker selects a single target, who opposes the test with an Ordinary (+10) Willpower test. If the psyker succeeds, the target must repeat his last exploit, such as firing a gun at a target who is no longer there or diving for cover from a grenade that has already detonated. This repeated deed counts as the target’s Action for the round. If the action would be obviously harmful to the target (but not to an ally), the target automatically wins the Opposed test (scoring 1 more degree of success than the psyker).","Page":"PG 59 EI","Name":"Deja Vu","XP Cost":200},{"Power":"Foretelling","Source Sheet":"Minor Psychic Powers","Cost":"100 xp","Prerequisite":"Perception 35","Action":"Full Action","Focus Power":"Difficult (-10) Willpower test","Range":"5 metres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker chooses a single character or item within range and receives a brief and unclear image of the future, giving him a rough idea of one thing that will happen to the target within a number of minutes up to the psyker’s PR. The GM decides what information the psyker receives, with additional degrees of success on the Focus Power test yielding more important information. For example, the psyker might learn that the character will be the target of an attack or will himself become violent, or that a cogitator will be accessed by an unknown individual. The psyker cannot select himself as the target of this power.","Page":"PG 59 EI","Name":"Foretelling","XP Cost":100},{"Power":"Ignite","Source Sheet":"Minor Psychic Powers","Cost":"100 xp","Prerequisite":"Willpower 30","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"5 metres x psy rating","Sustained":"Half Action","Subtype":"Attack, Concentration","Effect":"Creates a small flame, approximately a centimetre across, at a point within range and line of sight. The flame is not large or hot enough to inflict damage, but can illuminate roughly a 5 metre radius. It can also ignite combustible materials at the GM’s discretion, with the chance of igniting an object increasing the longer the psyker sustains the power. If the target of this power is a character, he must pass a Challenging (+0) Agility test each round the psyker sustains the power after the first, or catch fire. The target gains a +30 bonus to this test on any round during which he performs an action with the Movement subtype.","Page":"PG 60 EI","Name":"Ignite","XP Cost":100},{"Power":"Ill Omen","Source Sheet":"Minor Psychic Powers","Cost":"200 xp","Prerequisite":"Rank 1 (Known) in the Psyniscience skill","Action":"Full Action","Focus Power":"Difficult (-10) Willpower test","Range":"10 metres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker chooses a single target within range and line of sight, who opposes this power with a Challenging (+0) Logic test. If the power is used during structured time and the target fails to resist, he suffers a -10 penalty to all tests for PR rounds. If used during narrative time, the psyker instead chooses a time within the next PR hours for the target to experience the omen. The GM determines the effects on the target’s behaviour, but a likely result is that the target rethinks his current course of action or direction he is travelling. The GM should use the psyker’s degrees of success and PR, as well as his suggestion for the form of the omen, in determining the outcome.","Page":"PG 60 EI","Name":"Ill Omen","XP Cost":200},{"Power":"Impel","Source Sheet":"Minor Psychic Powers","Cost":"100 xp","Prerequisite":"Willpower 30","Action":"Half Action","Focus Power":"Ordinary (+10) Willpower test","Range":"5 metres x psy rating","Sustained":"No","Subtype":"Attack, Concentration","Effect":"The psyker chooses a target, which can be an object or character, and pushes it directly away from him a number of metres equal to his psy rating substituting the psyker’s PR and WPB for SB and TB. If the target is a character, he opposes the power with a Challenging (+0) Strength test. If the target fails with two or more degrees of failure, he is also knocked Prone. If the psyker wins by 3 or more degrees of success, the target suffers 1d5+PR damage and 1 level of Fatigue.","Page":"PG 60 EI","Name":"Impel","XP Cost":100},{"Power":"Luck","Source Sheet":"Minor Psychic Powers","Cost":"100 xp","Prerequisite":"Perception 30","Action":"Half Action","Focus Power":"Challenging (+0) Awareness test","Range":"Self","Sustained":"No","Subtype":"Concentration","Effect":"If the Focus Power test is successful, the psyker gains a bonus of 5 plus his psy rating on the next test he attempts this round. If the psyker fails the Focus Power test by 2 or more degrees of failure, his misguided attempt to call on the Warp backfires, and the resultant psychic ripples inflict a penalty equal to twice his psy rating on his next test this round.","Page":"PG 60 EI","Name":"Luck","XP Cost":100},{"Power":"Suggestion","Source Sheet":"Minor Psychic Powers","Cost":"200 xp","Prerequisite":"Rank 1 (Known) in the Deceive skill","Action":"Full Action","Focus Power":"Difficult (-10) Opposed Willpower test","Range":"1 metres x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"The psyker convinces the target of a small, but potentially important lie. The target opposes this with a Challenging (+0) Willpower test, which the GM should modify based on the credibility and scope of the lie. In the case of clearly impossible lies, the target succeeds automatically (scoring 1 more degree of success than the psyker). For instance, a human psyker might suggest that a guard has already checked his identification, but would have no possibility of convincing that same guard that the psyker is a Space Marine.","Page":"PG 61 EI","Name":"Suggestion","XP Cost":200,"School":"Minor Power","Summary School":"Minor Power"},{"Power":"Summon Vermin","Source Sheet":"Minor Psychic Powers","Cost":"100 xp","Prerequisite":"Fellowship 30","Action":"Full Action","Focus Power":"Challenging (+0) Willpower test","Range":"1 kilometre x psy rating","Sustained":"No","Subtype":"Concentration","Effect":"A number of small animals-such as rats, snakes, and similar small creatures-up to the psyker’s PR within range come to the psyker’s current location as quickly as possible. The time until the creatures appear depends on their speed and proximity, and they are likely to arrive over the course of several rounds or minutes. Once the creatures arrive, they behave normally and are not compelled to obey the psyker.","Page":"PG 61 EI","Name":"Summon Vermin","XP Cost":100},{"Power":"Weapon Jinx","Source Sheet":"Minor Psychic Powers","Cost":"100 xp","Prerequisite":"Fellowship 35","Action":"Half Action","Focus Power":"Difficult (-10) Willpower test","Range":"10 meters","Sustained":"No","Subtype":"Concentration","Effect":"The psyker chooses a number of ranged weapons within range up to the psyker’s psy rating, with each Best craftsmanship weapon counting as two weapons for the purposes of this power. Affected weapons count as Poor craftsmanship until repaired. If the psyker’s degrees of success on the Focus Power test exceed the psy rating of the power, then the affected weapons also jam immediately. Should the psyker fail the test with 2 or more degrees of failure, his own ranged weapons jam immediately.","Page":"PG 61 EI","Name":"Weapon Jinx","XP Cost":100,"School":"Minor Power","Summary School":"Minor Power"},{"Power":"Word of Beasts","Source Sheet":"Minor Psychic Powers","Cost":"100 xp","Prerequisite":"Fellowship 35","Action":"Half Action","Focus Power":"Difficult (-10) Opposed Willpower test","Range":"10 meters","Sustained":"No","Subtype":"Concentration","Effect":"The psyker opens a limited telepathic link with an animal, which resists the power with a Challenging (+0) Willpower test. If the psyker succeeds, he chooses one of the following effects: Impression Reading: The psyker receives a mental impression of the animal’s recent experiences. These are not thoughts in the sense of a sentient being, but merely vague impressions and unclear images. The GM determines the level of detail and form of the information received based on the intelligence and senses of the animal, as well as the PR of the psyker. The amount of information is based on the psyker’s degrees of success on the Focus Power test. Empathic Link: The psyker establishes a bond with the animal that persists after the telepathic link ends. The animal follows the psyker and obeys his commands to the best of its ability, exactly as if he had tamed and trained it with the Wrangling special use of the Survival skill.","Page":"PG 61 EI","Name":"Word of Beasts","XP Cost":100},{"Power":"Invigourate","Source Sheet":"PP Biomancy","Cost":"100 xp","Prerequisite":"Toughness 30","Action":"Half Action","Focus Power":"Challenging (+0) Willpower test","Range":"1 m","Sustained":"No","Subtype":"Concentration","Effect":"Remove a number of levels of Fatigue from himself and allies within range. Can remove up to psy rating and requires 12 hours of recovery after use.","Page":"Page 200 CB","Name":"Invigourate","XP Cost":100,"School":"Biomancy","Summary School":"Biomancy"},{"Power":"Smite","Source Sheet":"PP Biomancy","Cost":"200 xp","Prerequisite":"Willpower 40","Action":"Half Action","Focus Powe
