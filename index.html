o Guide a starship through the Warp, or Convert a journey into a Warp route Chart","Special Use":""},{"Name":"Operate (Surface)","Characteristics":"Agility","Alt Characteristics":"Intelligence","Type Unless Noted":"Half Action","Description":"Used to drive a vehicle in combat, wishes to push vehicle beyond its normal limits, or attempting to manoeuvre though a crowed highway.","Special Use":""},{"Name":"Operate (Aeronautica)","Characteristics":"Agility","Alt Characteristics":"Intelligence","Type Unless Noted":"Half Action","Description":"Used to piloting a vehicle in a combat situation, fly beyond its limit, or trying to land in diffcult terran.","Special Use":""},{"Name":"Operate (Voidship)","Characteristics":"Agility","Alt Characteristics":"Intelligence","Type Unless Noted":"Half Action","Description":"Used for manoeuving or overseeing the use of a macrobattery, orbital laser, or ship's weaponry.","Special Use":""},{"Name":"Parry","Characteristics":"Weapon Skill","Alt Characteristics":"","Type Unless Noted":"Reaction","Description":"Used to deflect blows in melee","Special Use":""},{"Name":"Psyniscience","Characteristics":"Perception","Alt Characteristics":"Willpower","Type Unless Noted":"Half Action","Description":"Used for hunting for the location of daemons, determining weather a psyker has used his power recentlym or trying to find a weak point between realspace and the Warp.","Special Use":""},{"Name":"Scholastic Lore","Characteristics":"Intelligence","Alt Characteristics":"Fellowship","Type Unless Noted":"Free Action","Description":"Used to recount legends from the past, to understand a obscure law, or being able to identify a rare beast.","Special Use":""},{"Name":"Scrutiny","Characteristics":"Intelligence","Alt Characteristics":"Fellowship","Type Unless Noted":"Half Action","Description":"Used to tell if someone is lying, to collate information and conclusions from a report, or able to interpert augur or auspex reading and knowing the results of them.","Special Use":""},{"Name":"Security","Characteristics":"Intelligence","Alt Characteristics":"Agility","Type Unless Noted":"1 minute, reduced by 10 seconds for each degree of success.","Description":"Used to open a locked door, break into a cogiator and discover and its secrets, or lay traps for a ambush.","Special Use":""},{"Name":"Sleight of Hand","Characteristics":"Agility","Alt Characteristics":"Intelligence","Type Unless Noted":"Half Action, or can be performed as a Free Action withan additional -10 penalty.","Description":"Used to attempt to steal something from the target's pocket, to seek to palm ecidence at a crime scene, or tries to plant illegal narcotics into a suspects robes.","Special Use":""},{"Name":"Stealth","Characteristics":"Agility","Alt Characteristics":"Intelligence","Type Unless Noted":"Free Action","Description":"Used to scout an enmy force without being detected, wants to sneak up on a foe and kill him quietly, or wishes to follow someone without arousing suspicion.","Special Use":""},{"Name":"Survial","Characteristics":"Perception","Alt Characteristics":"Agility, Intelligence","Type Unless Noted":"Full Action","Description":"Used to find food or water in a hostile environment, to start a fire with homemade tools, or trying to track a foe across a hive.","Special Use":"Wrangling: Characters can tame, train, and potentially ride animals theyencounter in their travels, from wild grox to noble Warhorse breeds. Both taming and training beasts are Extended tests, the duration of which is determined by the nature and temperamentof the creature involved. Wrangling is of no use against cyber or psy-bonded animals, nor against any creatures with true sentience."},{"Name":"Tech Use","Characteristics":"Intelligence","Alt Characteristics":"Agility","Type Unless Noted":"1 minute, or more for more complex systems.","Description":"Used to repair a broken weapon or vehicle, to push a piece of technology beyond its normal limits, or trying to detrmine how to use unknow technology.","Special Use":""},{"Name":"Trade","Characteristics":"Intelligence","Alt Characteristics":"Agility, Fellowship","Type Unless Noted":"Variable depending on task and complexity.","Description":"Used to prepare a meal for high ranking officers, wishes to carve his sigil on a chainsword, or seeks to uncover the remains of a lost colony.","Special Use":""}],"Combat Actions":[{"Action":"Aim","Type":"Varies","Subtype":"Concentration","Description":"Grants +10 (Half) or +20 (Full) bonus to character’s next attack."},{"Action":"All Out Attack","Type":"Full","Subtype":"Attack, Melee","Description":"Give up that round’s Evasion reaction to gain +30 WS."},{"Action":"Brace Heavy Weapon","Type":"Half","Subtype":"Miscellaneous","Description":"Support a Heavy weapon for proper firing."},{"Action":"Called Shot","Type":"Full","Subtype":"Attack, Concentration, Melee or Ranged","Description":"Attack a specific location on a target with a -20 to WS or BS."},{"Action":"Charge","Type":"Full","Subtype":"Attack, Melee, Movement","Description":"Move up to 3x AgB (last 4m in straight line at enemy), +20 to WS."},{"Action":"Defensive Stance","Type":"Full","Subtype":"Concentration, Melee","Description":"Gain an additional Reaction. Opponents suffer -20 WS."},{"Action":"Delay","Type":"Full","Subtype":"Miscellaneous","Description":"May take any Half Action before character’s next turn."},{"Action":"Disengage","Type":"Full","Subtype":"Movement","Description":"Break from melee without incurring a free attack."},{"Action":"Evasion","Type":"Reaction","Subtype":"Movement/Melee","Description":"Used with Dodge (Movement) or Parry (Melee) skill to avoid attacks."},{"Action":"Feint","Type":"Half","Subtype":"Melee","Description":"Opposed WS test; if character wins, his next Melee attack cannot be Evaded."},{"Action":"Focus Power","Type":"Varies","Subtype":"Varies","Description":"Use a Psychic Power."},{"Action":"Full Auto Burst","Type":"Half","Subtype":"Attack, Ranged","Description":"Grants -10 BS, one hit for every DoS; Jam on 94+ result; 2m spread."},{"Action":"Grapple","Type":"Varies","Subtype":"Attack, Melee","Description":"Affect a Grappled opponent or escape from a Grapple."},{"Action":"Guarded Action","Type":"Half","Subtype":"Concentration, Melee/Ranged","Description":"Grants -10 to WS or BS, +10 to all Evasion tests until start of next turn."},{"Action":"Jump or Leap","Type":"Full","Subtype":"Movement","Description":"Jump vertically or leap horizontally."},{"Action":"Knock Down","Type":"Half","Subtype":"Attack, Melee","Description":"Try to knock an opponent to the ground. Opposed Strength, +10 if charging. If 2 DoS you can inflict 1d5-3+SB impact damage and one level of fatigue."},{"Action":"Lightning Attack","Type":"Half","Subtype":"Attack, Melee","Description":"Grants -10 WS, one hit for every DoS."},{"Action":"Manoeuvre","Type":"Half","Subtype":"Melee, Movement","Description":"Opposed WS test; if character wins, move enemy 1 metre."},{"Action":"Move","Type":"Varies","Subtype":"Movement","Description":"Move up to Agility bonus (Half Action) or 2x Agility bonus (Full Action)."},{"Action":"Overwatch","Type":"Full","Subtype":"Attack, Concentration, Ranged","Description":"Shoot targets coming into a set 45° kill zone, also forces Pinning tests."},{"Action":"Ready","Type":"Half","Subtype":"Miscellaneous","Description":"Ready a weapon or an item."},{"Action":"Reload","Type":"Varies","Subtype":"Miscellaneous","Description":"Reload a ranged weapon."},{"Action":"Run","Type":"Full","Subtype":"Movement","Description":"Move 6x Agility bonus, enemies get -20 BS and +20 WS to hit character"},{"Action":"Semi-Auto Burst","Type":"Half","Subtype":"Attack, Ranged","Description":"Grants +0 BS, additional hit for every two additional DoS; jam on 94+; 2m spread."},{"Action":"Stand/Mount/ Dismount","Type":"Half","Subtype":"Movement","Description":"Stand up from being Prone, mount or dismount a riding beast, enter or leave a vehicle, or move within a vehicle."},{"Action":"Standard Attack","Type":"Half","Subtype":"Attack, Melee or Ranged","Description":"Grants +10 to WS or BS, make one melee or ranged attack; jam on 96+ result."},{"Action":"Stun","Type":"Full","Subtype":"Attack, Melee","Description":"Try to Stun an opponent."},{"Action":"Suppressing Fire","Type":"Full","Subtype":"Attack, Ranged","Description":"Set 30° or 45° arc at 1/2 range, target must make Pinning willpower +0 test or get -20 BS and not be able to advance."},{"Action":"Swift Attack","Type":"Half","Subtype":"Attack, Melee","Description":"Grants +0 WS, additional hit for every two additional DoS."},{"Action":"Tactical Advance","Type":"Full","Subtype":"Concentration, Movement","Description":"Move from cover to cover."},{"Action":"Use a Skill","Type":"Varies","Subtype":"Concentration, Miscellaneous","Description":"Character may use a skill."}],"Shock":[{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"Roll","Column 2":"Result"},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"01-20","Column 2":"The character is badly startled. He can only take a single Half Action during his next turn, but afterward he acts normally."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"21-40","Column 2":"Fear grips the character and he begins to shake and tremble. He suffers a -10 penalty on all tests for the rest of the encounter unless he can recover his wits (see Shock and Snapping Out of It, page 286)."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"41-60","Column 2":"Reeling with shock, the character backs away from the source of his Fear. He cannot willingly approach the object of his Fear, but can otherwise act normally, with a -10 penalty on all tests until the end of the encounter."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"61-80","Column 2":"The character is frozen by terror. He can take no actions until he recovers himself (see Shock and Snapping Out of It, page 286). After snapping out of it, he makes all tests with a -10 penalty for the rest of the encounter."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"81-100","Column 2":"Panic grips the character. He must flee the source of his fear, if able, as fast as he can, and if prevented from doing so, can only take Half Actions and is at a -20 penalty to all tests. Once away from the danger, he must successfully Snap Out of It (see Shock and Snapping Out of It, page 286) to regain control."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"101-120","Column 2":"Fainting dead away, the character keels over and remains Unconscious for 1d5 rounds. Once he regains consciousness, he is still shaken and takes all tests with a -10 penalty until the end of the encounter."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"121-130","Column 2":"Totally overcome, the character screams and vomits uncontrollably for 1d5 rounds. During this time he can do nothing, and drops anything he is holding. Afterward, until the end of the encounter, the character can only take a single Half Action each turn."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"131-140","Column 2":"The character laughs hysterically and randomly attacks anything near him in a manic frenzy, firing wildly or attacking with whatever he has at hand. This effect lasts until the character Snaps Out of It (see Shock and Snapping Out of It, page 286), or until he is knocked Unconscious or otherwise incapacitated."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"141-160","Column 2":"The character crumples to the ground for 1d5+1 rounds and begins sobbing, babbling, and tearing at his own flesh, and can do nothing else. Even after he returns to his senses, he is a complete mess, and suffers a -20 penalty on all tests until the end of the encounter."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"160-170","Column 2":"The character’s mind snaps. He becomes catatonic for 1d5 hours; for that time, he is Unconscious and cannot be roused."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Fear test":"171+","Column 2":"The character is so overcome with terror that his heart stops: he must make a Challenging (+0) Toughness test or die. If he succeeds, the character still falls Unconscious for 1d5 hours, and cannot be roused for that time."}],"Mental Traumas":[{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"Roll","Column 2":"Result"},{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"01-40","Column 2":"The character becomes withdrawn and quiet. He suffers a -10 penalty to all Fellowship based tests for 3d10 hours."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"41-70","Column 2":"The character must compulsively perform an action (such as fevered praying, frantically cleaning a weapon, etc.) and pays little attention to anything else. He suffers a -10 penalty toall test based on Intelligence, Fellowship, and Perception. This effect lasts for 3d10 hours."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"71-100","Column 2":"The character is constantly fearful, seeing danger everywhere, and is extremely jumpy. The character gains a +10 bonus to all Perception-based tests and is at a -10 penalty to Willpower tests for the next 1d5 days."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"101-120","Column 2":"The character suffers from a temporary Severe phobia (see Gaining Mental Disorders, page 287). This effect lasts for 1d5 days."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"121-130","Column 2":"The character reacts to the slightest stressor pressure by becoming extremely agitated. When performing any task that involves a test, the character must first pass a Willpower testor suffer a -10 modifier to the test. During combat encounters, he suffers a -10 penalty on all tests. This effect lasts for 1d5 days."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"131-140","Column 2":"The character suffers vivid and extreme nightmares whenever he tries to sleep. The next day, and for a further 1d10 days, the character is exhausted by a lack of sleep and gains 1 levelof Fatigue."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"141-150","Column 2":"The character is struck dumb and is unable to speak. This lasts for 1d5 days."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"151-160","Column 2":"Extremely distressed and unfocused, the character refuses to eat or drink, and looks to be in a terrible state. Reduce all of the character’s characteristics by 10 (to a minimumof 1) for 1d10 days."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"161-170","Column 2":"The character suffers a fit of hysterics, and becomes temporarily blind or deaf for 1d10 days."},{"Roll 1d100 and add +10 for every degree of failure after the first on the Trauma test":"171+","Column 2":"The character becomes completely traumatised and virtually unresponsive. He cannot initiate actions, but can be gently led. This effect lasts for 1d10 days."}],"Malignancies":[{"Roll":"01-10","Effect":"Palsy: The character suffers from numerous minor tics, shakes, and tremors with no medical cause. Reduce his Agility by 1d10."},{"Roll":"11-15","Effect":"Dark-hearted: The character grows increasingly cruel, callous, and vindictive. Reduce his Fellowship by 1d10."},{"Roll":"16-20","Effect":"Ill-fortuned: Chance seems to mock this Acolyte at the most crucial of opportunities. Whenever this character uses a Fate point, roll 1d10. On a result of 7-10, the Fate point has no effect but is spent anyway."},{"Roll":"21-25","Effect":"Skin Afflictions: The character is plagued by boils, scabs, weeping sores and other disgusting features across his body. He suffers a -20 penalty to all Charm tests."},{"Roll":"26-30","Effect":"Night Eyes: Light pains the character, echoing the growing stain on his soul. Unless he shields his eyes, he suffers a -10 penalty on all tests made in an area of bright light."},{"Roll":"31-33","Effect":"Morbid: The character finds it hard to concentrate as his mind turns increasingly macabre and he becomes prone to tortured, gloom filled trains of thought. Reduce his Intelligence by 1d10."},{"Roll":"34-45","Effect":"Witch Mark: The character develops some minor physical deformity or easily concealable mutation. It is small, but perhaps enough to consign him to death if found out by a fanatical witch hunter."},{"Roll":"46-50","Effect":"Fell Obsession: This functions like the Obsession Disorder on page 288, but in this case the character is obsessed by something sinister or malign (such as collecting finger-bone trophies, etc.)."},{"Roll":"51-55","Effect":"Irrational Nausea: The character feels sick at the sight, sound, or smell of something otherwise innocuous (such as prayer books and holy items, bare flesh, human laughter, fresh food, etc.). When he encounters an object of his revulsion he must make a Toughnesstest or suffer a -10 penalty to all tests as long as he remains in its presence."},{"Roll":"56-60","Effect":"Wasted Frame: The character’s pallor becomes corpse-like and his muscles waste away. Reduce his Strength by 1d10."},{"Roll":"61-63","Effect":"Night Terrors: The character is plagued by daemonic visions in his sleep. This functions identically to the Horrific Nightmares Disorder on page 289."},{"Roll":"64-70","Effect":"Poor Health: The character constantly suffers petty illnesses and phantom pains, and his wounds never seem to fully heal. Reduce the character’s Toughness by 1d10."},{"Roll":"71-75","Effect":"Distrustful: The character cannot conceal the distrust and antipathy he has for others. He suffers a -10 penalty to Fellowship tests when dealing with strangers."},{"Roll":"76-80","Effect":"Malign Sight: The world seems to darken, tarnish, and rot if the character looks at anything too long. Reduce the character’s Perception by 1d10."},{"Roll":"81-83","Effect":"Ashen Taste: Food and drink taste foul and provide little sustenance to the character, and he can barely stomach eating. Recovering levels of Fatigue takes twice as long for him than normal (see page 233)."},{"Roll":"84-90","Effect":"Bloodlust: Murderous rage is never far from the character’s mind. After suffering damage (after Armour and Toughness bonus) in combat, he must succeed at a Willpower test to allow his enemies to flee, be captured, or incapacitated, rather than killing them outright, even if his intent is otherwise."},{"Roll":"91-93","Effect":"Blackout: The character suffers from inexplicable blackouts. When they occur and what happens during them is up to the GM, who should inform the player the details of what (if anything) he remembers on awakening."},{"Roll":"94-100","Effect":"Strange Addiction: The character has a near-uncontrollable craving for some bizarre and unnatural substance (such as rose petals, fresh blood, widows’ tears, etc.). This acts like a Minor Disorder for Compulsion (see page 288), but is freakish enough to cause serious suspicion if discovered."}],"Mutations":[{"Roll":"01-06","Effect":"Bestial Hide: The character’s skin becomes toughened with layers of thick scales or chitin, and he gains the Natural Armour (2) trait."},{"Roll":"07-11","Effect":"Unnatural Arms: Twisted appendages (shrivelled arms, hooked talons, or fleshy tendrils) emerge from this character’s spine or torso. He gains the Multiple Arms (CB) trait."},{"Roll":"12-17","Effect":"Sightless Orbs: This character’s eyes become sightless, cracked windows into a soul afflicted with a growing corruption. He gains Blind and Unnatural Senses (CBx10) traits."},{"Roll":"18-25","Effect":"Swollen Brute: This character becomes bloated, his muscles expanding and his form becoming excessively corpulent or disturbingl ymuscular (or perhaps both). This character’s Toughness and Strength characteristics are permanently increased by 10, but his Agility bonus is reduced by 1 for purposes of movement."},{"Roll":"26-30","Effect":"Deathsight: This character’s mind becomes twisted, his eyes showing him countless possible annihilations of anything or anyone hegazes upon for more than a few moments. Once per game session, this character may increase the damage of one attack he has madeby his Corruption bonus. If he does so, he gains 1 Corruption point."},{"Roll":"31-36","Effect":"Cursed Fleshmetal: This character’s armour and cybernetic implants become fused with his flesh, and even regenerate. Removing any of these items requires a Challenging (+0) Medicae test; if the test fails, he suffers 1d5 Rending damage to a randomly selected limb that ignores Armour. He can make an Ordinary (+10) Toughness test to repair items merged with him, in the same manner as a Tech-Use test to repair the same equipment, but suffers 1 Corruption point."},{"Roll":"37-43","Effect":"Razor Fangs: This character’s teeth grow long, turning into tearing fangs. This character gains an unarmed attack that inflicts 1d5+CB Rending damage, pen 2. He permanently reduces his Fellowship characteristic by 1d5."},{"Roll":"44-49","Effect":"Excessive Legs: This character develops extra legs that support his form, suspending his upper torso above a centauroid lower body. This character gains the Quadruped trait with a number of extra legs equal half to his Corruption bonus (rounded up)."},{"Roll":"50-54","Effect":"Wings: Massive feathered or leathery wings erupt from this character’s spine, and he gains the Flyer (CBx2) trait."},{"Roll":"55-60","Effect":"Serpentine Tail: This character’s legs wither while his spine elongates into a serpentine tail that supports his body. He gains the Crawler trait and gains an unarmed attack that can strike for 1d10 Impact damage, Pen 0."},{"Roll":"61-69","Effect":"Searing Blood: This character’s veins are filled with searing acids in place of blood, though somehow the corrosive effects do not burn his own flesh. Whenever he suffers Blood Loss, the foul liquid erupts and inflicts 1d5+CB Energy damage, Pen 0, to each other character within 1d5 metres."},{"Roll":"70-77","Effect":"Witch-Curse: A small stigma in the shape of a maddening rune appears on this character’s body, marking him as touched by Chaos. He gains the Psyker trait (or adds 1 to an existing psy rating) and freely learns any 1 psychic power that costs 100 xp or less. Whenever he attempts to use this power, he gains 1d5 Corruption points."},{"Roll":"78-84","Effect":"Bone-Blades: This character’s bones grow long, twisted spurs that sprout painfully from his flesh on his command. This character gains an unarmed attack that inflicts 1d10+CB Rending damage, Pen 0. Whenever he makes an attack with this weapon, this character suffers Blood Loss unless he passes a Challenging (+0) Toughness test."},{"Roll":"85-89","Effect":"Cannibalistic Urge: Blood and marrow become as wine and bread to this character, and normal food no longer sates the hunger of his soul. Once per game session, he can remove 1d5 damage by consuming human flesh. Each time he does so, he gains 1 Corruption point."},{"Roll":"90-92","Effect":"Corrupted Flesh: Instead of blood, when this character’s flesh is torn asunder, horrific insects, worms, or flitting creatures spill forth. Whenever he suffers damage, this character gains the Fear (1) trait for 1d5 rounds."},{"Roll":"93-94","Effect":"It Will Not Die!: This character is touched by the power of the Warp, and fortune twists to keep him alive regardless of the terrible wounds he suffers, as if it is the will of some dark being that resides beyond the veil of reality. He can no longer burn a Fate point to survive lethal injuries. Whenever this character would die, he instead survives by the narrowest margin as if he had burned a Fate point and gains 1d10+5 Corruption points."},{"Roll":"95-97","Effect":"Warp Gaze: Whatever this character looks upon burns with the fire of the Warp, and all who see his eyes despair. This character gainsa 20m ranged attack that strikes with 1d10+CB Energy damage and the Spray quality. Each time he uses this attack, he gains 1d5Corruption points. Characters struck with this attack must make a Challenging (+0) Fear (1) test."},{"Roll":"98-99","Effect":"Warp Regeneration: Corruption seethes through this character’s flesh, sewing his body back together time and time again whether he wills it or not. Whenever this character suffers damage, he makes a Challenging (+0) Toughness test. If he succeeds, he gains the Regeneration (CB) trait for 1 round and gains 1d5 Corruption points."},{"Roll":100,"Effect":"The Warp Made Manifest: This character becomes a Daemon-like creature, capable of reshaping reality itself at his whim. He gains the Daemonic (CB), Fear (2), From Beyond, and Warp Instability traits. He can also use his Willpower characteristic in place of anyother characteristic for any test he is called upon to take."}],"Hallucinogenic Effects":[{"Roll 1d10":"Roll","Column 2":"Result"},{"Roll 1d10":1,"Column 2":"Bugsbugsbugsbugs! The character drops to the floor, flailing and screaming as he tries to claw off imaginary insects devouring his skin and flesh. The character gains the Prone and Stunned conditions"},{"Roll 1d10":2,"Column 2":"My hands...! The character believes his hands have turned into slimy tentacles, or perhaps the flesh has begun to strip off the bone in bloody lumps. Regardless of the particulars, the character drops everything he is carrying and spends the duration staring at his hands and screaming. The character is Stunned."},{"Roll 1d10":3,"Column 2":"They're coming through the walls! The character sees gruesome aliens bursting through the walls/ceiling/floor/bushes and opens fire. The character must spend each turn firing at a random piece of terrain within his line of sight. Any creatures caught in the line of fire are subject to attacks as normal. Each round, choose a new target at random (use the Scatter Diagram on page 230) to determine which direction that is, with a \"7\" meaning he shoots the ground, and a \"10\" meaning he fires wildly into the air."},{"Roll 1d10":4,"Column 2":"Nobody can see me! The character believes he is invisible and wanders aimlessly, making faces at those around him. He waddles about in random directions each round (use the Scatter Diagram on page 230), using a Full Action to move. The character retains his Reactions"},{"Roll 1d10":5,"Column 2":"The sky looks so big and inviting, the character flaps his arms trying to imitate a pterasquirrel. He might do nothing but jump up and down on the spot. If he is standing above ground level, he may throw himself off in a random direction, with the usual consequences for falling—appalling injury or death being the likely outcomes"},{"Roll 1d10":6,"Column 2":"They've got it in for me...! The character is overcome with paranoia, believing even his own comrades are out to get him. On the character's turn, he must move to a position of cover, getting out of line of sight from any other characters. He remains hidden until the effect ends, moving to new cover as needed to stay as hidden as possible"},{"Roll 1d10":7,"Column 2":"They got me! The character believes that the gas is toxic and collapses to the floor as if dead; he counts as being Helpless. Other characters who sees him \"die\" must pass a Challenging (+0) Intelligence test; should they fail then they also think the character is dead"},{"Roll 1d10":8,"Column 2":"I'll take you all on! The character is filled with a burning rage and a desire for violence. The character becomes Frenzied (see page 127) for the duration of the effects, and must attack the closest opponent"},{"Roll 1d10":9,"Column 2":"I'm only little! The character believes he has shrunk to half his normal size and everything else is big and frightening now. All other characters count as having the Fear (3) trait to the character"},{"Roll 1d10":10,"Column 2":"The worms! The character desperately tries to remove a massive fanged worm he thinks is slowly winding its way up his leg. If holding a gun, he shoots himself with it or, if not, he hits himself in the leg with whatever melee weapon he is holding. If the character is currently holding no weapon, he draws a random weapon from those he carries and attacks himself with it. Randomly determine which leg the character believes to be trapped by the worm. The attack automatically inflicts a single hit with 1d5 degrees of success that deals damage normally"}],"Traits":[{"TRAITS":"Amorphous","BENEFIT":"May increase or decrease its Size trait value by 1 as a Free Action. Also has the Crawler trait.","Page":"PG 134 CB"},{"TRAITS":"Amphibious","BENEFIT":"Creature can breathe underwater.","Page":"PG 134 CB"},{"TRAITS":"Auto-stabilized","BENEFIT":"Always counts as braced.","Page":"PG 134 CB"},{"TRAITS":"Baneful Presence","BENEFIT":"All suﬀer a -10 penalty to Willpower tests taken while within X metres of the creature.","Page":"PG 134 CB"},{"TRAITS":"Bestial","BENEFIT":"Automatically passes Survival skill tests, test a Challenging (+0) Willpower test when frightened, startled, or injured. If it fails, the creature ﬂees.","Page":"PG 134 CB"},{"TRAITS":"Blind","BENEFIT":"Cannot see. The Blind Fighting talent reduces the penalty to Weapon Skill tests as normal for Blind creatures, from -30 to -15.","Page":"PG 134 CB"},{"TRAITS":"Brutal Charge (X)","BENEFIT":"When charging, deals an extra (X) points of damage on each hit.","Page":"PG 134 CB"},{"TRAITS":"Burrower","BENEFIT":"The number in parentheses (X) indicates its speed when burrowing. Can burrow through soil, rock, sand. When burrows, it leaves behind a tunnel. Characters with a Size trait value lower than the borrower can enter these areas without impediment. At the end of each round after the borrower passes, roll 1d10; on a result of 5 or lower, the tunnel collapses behind.","Page":"PG 134 CB"},{"TRAITS":"Crawler","BENEFIT":"The base move for a creature with this trait is half its normal movement rate (roundup) as determined by its Agility bonus, but it does not take penalties for moving over diﬃcult terrain.","Page":"PG 134 CB"},{"TRAITS":"Daemonic","BENEFIT":"With this trait increase their Toughness bonus against all damage by the number indicated in the parentheses (X), in the same manner as an Unnatural Characteristic, and stack if the latter also increases Toughness. This increase is negated by damage inﬂicted from force weapons, psychic powers, holy attacks, or other creatures with this trait. Daemonic creatures also have the Undying trait, and gain beneﬁts when using psychic powers.","Page":"PG 135 CB"},{"TRAITS":"Dark-sight","BENEFIT":"Can see in darkness and never takes a penalty for ﬁghting in areas of dim or no lighting.","Page":"PG 135 CB"},{"TRAITS":"Deadly Natural Weapons","BENEFIT":"Gains all the beneﬁts of the Natural Weapons trait, except that its attacks no longer have the Primitive weapon quality.","Page":"PG 135 CB"},{"TRAITS":"Fear","BENEFIT":"Always has an associated rating (1-4). This is indicated by the number in parentheses (X). When a character encounters a creature with this trait, must make a Willpower test with a penalty based on the creature’s Fear rating. If he succeeds, the character suﬀers no ill eﬀects; if he fails, he must roll on Table 8-11: Shock, adding +10 to the roll for every degree of failure on the test.","Page":"PG 136 CB"},{"TRAITS":"Flyer","BENEFIT":"Fly and enter any altitude. (X) indicates its speed when ﬂying. This number replaces the creature’s Agility bonus for movement actions while airborne.","Page":"PG 136 CB"},{"TRAITS":"From Beyond","BENEFIT":"Their minds are beyond the petty frailties and precarious sanity of a mortal mind. Such a creature is immune to Fear, Pinning, Insanity points, and psychic powers used to cloud, control, or delude its mind.","Page":"PG 136 CB"},{"TRAITS":"Hoverer","BENEFIT":"Fly and enter the hover altitude ﬂying no higher than two metres. The number in parentheses (X) indicates its speed when hovering; this number replaces its Agility bonus for purposes of calculating Movement while airborne.","Page":"PG 136 CB"},{"TRAITS":"Incorporeal","BENEFIT":"Insubstantial and weightless, cannot be affected by mundane weaponry. Gain the Hoverer (6) trait and a +30 bonus on Stealth tests due to their ability to merge with objects and nearly silent movement. Also immune to normal weapons, which simply pass ineﬀectually through its body. Daemons, psychic powers, Warp creatures, other Incorporeal creatures, and opponents armed with force weapons can all injure an Incorporeal creature normally. An Incorporeal creature cannot usually aﬀect the mortal world, and thus cannot damage normal opponents unless it has a suitable special ability or talent.","Page":"PG 136 CB"},{"TRAITS":"Machine","BENEFIT":"Machines do not breathe, are immune to vacuum, extremes of cold, and mind-inﬂuencing psychic eﬀects. Machines have a certain number of Armour points (indicated by the number in parentheses). This armour stacks with worn armour, but not with the Natural Armour trait, and can damage from Fire","Page":"PG 136 CB"},{"TRAITS":"Mechanicus Implants","BENEFIT":"Character has mechanical augmentations. Cranial circuitry, Cyber-mantle, Electro-Graft, Electoo Inductors, and Potenia Coil.","Page":"PG 137 CB"},{"TRAITS":"Mind Lock","BENEFIT":"If faced with a situation outside of its programming and with no recognised master to issue orders, the creature must pass a Routine (+20) Intelligence test or be Stunned for 1 round.","Page":"PG 137 CB"},{"TRAITS":"Multiple Arms","BENEFIT":"exact number of arms is indicated in parentheses (X), so with Multiple Arms (4) has four arms total. It gains a +10 bonus on Athletics tests involving climbing and swimming. In addition, for each full pair of arms it has (the Multiple Arms value divided by 2) it can make an additional attack as if wielding multiple melee weapons. In this case, the creature must either have natural weapons or actual melee weapons to wield for this to take eﬀect. Note that a creature still requires the Two-Weapon Wielder talent to make multiple attacks in the same turn.","Page":"PG 137 CB"},{"TRAITS":"Natural Armor","BENEFIT":"Gain additional Armor points to all locations and stacks with worn armour, but not with the Machine trait.","Page":"PG 137 CB"},{"TRAITS":"Natural Weapons","BENEFIT":"Counts as being armed even when not wielding weapons, with attacks deal 1d10 points of damage plus its SB. Can make attacks with its Natural Weapons using its Weapon Skill, though it cannot Parry with its natural weapons, nor can it be disarmed unless, of course, its limbs are hacked oﬀ. In general, creatures with Natural Weapons are immune to the Power Field quality, as it is assumed they have enough teeth, claws, or spines to ignore a few being removed. Natural weapons have the Primitive (7) weapon quality unless stated otherwise in the proﬁle.","Page":"PG 137 CB"},{"TRAITS":"Phase","BENEFIT":"Switch between incorporeal and corporeal as a Half Action.","Page":"PG 137 CB"},{"TRAITS":"Psyker","BENEFIT":"Creature has a psy rating of 1 or more.","Page":"PG 138 CB"},{"TRAITS":"Quadruped","BENEFIT":"Movement equals AB×2. With more than four legs may gain this trait as well, increasing their movement as indicated above but adding an additional 2","Page":"PG 138 CB"},{"TRAITS":"Regeneration","BENEFIT":"Each round, at the start of its turn, the creature can make a Toughness test to remove an amount of damage indicated in the parentheses after the trait.","Page":"PG 138 CB"},{"TRAITS":"Sanctioned","BENEFIT":"Avoid Corruption from Psyker elite advance; start at psy rating 2.","Page":"PG 138 CB"},{"TRAITS":"Size","BENEFIT":"Determines creature size and benefits.","Page":"PG 138 CB"},{"TRAITS":"Sonar Sense","BENEFIT":"Perceive surroundings flawlessly within 30 meters. Other within this 30 metre range that succeed on a Diﬃcult (-10) Awareness skill can detect the echoing.","Page":"PG 138 CB"},{"TRAITS":"Soul Bound","BENEFIT":"Bound to a particular group or creatures in exchange for certain benefits. Upon becoming soul-bound, the psyker must choose one of the following eﬀects: 3d10 Insanity points, the permanent loss of his sight, permanent loss of 1d10 points from one characteristic, or a random mutation.","Page":"PG 138 CB"},{"TRAITS":"Stampede","BENEFIT":"Failed Willpower test causes creature to flee, trampling anything in its path. Anyone in the way suﬀers a single hit from the creature’s Natural Weapons (or 1d5+SB Impact damage if it does not have that trait). One stampeding creature automatically causes all other creatures with the same trait within sight to stampede as well. The stampede lasts until the source of danger is no longer visible or for 1d10 minutes, whichever occurs last.","Page":"PG 138 CB"},{"TRAITS":"Stuff of Nightmares","BENEFIT":"Become immune to most conditions that would harm normal creatures. Count as having the Undying trait, and are completely immune to most environmental hazards, Blood Loss, and Stunning. They also ignore any Critical Eﬀect other than one that would destroy them outright, unless it was caused by a psychic power, force weapon, or holy attack.","Page":"PG 138 CB"},{"TRAITS":"Sturdy","BENEFIT":"+20 bonus to resist grapple, Knock Down, and Takedown.","Page":"PG 139 CB"},{"TRAITS":"Touched by the Fates","BENEFIT":"NPC has Fate points.","Page":"PG 139 CB"},{"TRAITS":"Toxic","BENEFIT":"Gain poisonous attack. When damaged must make a Toughness test at the end of his turn with a penalty equal to 10 times the number in parentheses (X), or suﬀer 1d10 points of Energy damage not reduced by Armour or Toughness.","Page":"PG 139 CB"},{"TRAITS":"Undying","BENEFIT":"It cannot be harmed by diseases, poisons, or toxic eﬀects. It also has no need to breathe, and thus can survive unaided in a vacuum.","Page":"PG 139 CB"},{"TRAITS":"Unnatural Characteristic","BENEFIT":"Increases one characteristic bonus.","Page":"PG 139 CB"},{"TRAITS":"Unnatural Senses","BENEFIT":"Perceive surroundings by uncanny means. Includes a range in metres indicated by the number in parentheses (X).","Page":"PG 139 CB"},{"TRAITS":"Warp Instability","BENEFIT":"If a creature with this trait takes damage and does not deal any damage or Insanity points to another creature by the end of its next turn, it must make a Willpower test. The creature suﬀers 1 point of damage for failing, plus 1 additional point of damage for each degree of failure. If this would deal damage equal to (or in excess of) the creature’s wounds, it is cast back into the Warp.","Page":"PG 139 CB"},{"TRAITS":"Warp Weapons","BENEFIT":"Creature's attacks ignore armor, unless the armour is created from psychoactive materials or is somehow warded against the Warp. Force ﬁelds still work against these attacks normally.","Page":"PG 139 CB"}],"Weapon Quality":[{"Weapon Quality":"Accurate","Effect":"Grants +10 Bonus to hit if used with Aim, Basic weapons add +1d10 damage per two extra DoS (max +2d10) when firing a single shot (pg 145)."},{"Weapon Quality":"Balanced","Effect":"Grants +10 Bonus to Parry skill when using this weapon."},{"Weapon Quality":"Blast (X)","Effect":"All within the weapon’s blast radius in metres are hit. Roll Hit Location and damage individually for each character affected."},{"Weapon Quality":"Concussive (X)","Effect":"Target must pass Toughness test with penalty equal to 10 times (X) or be Stunned. Target is possibly knocked Prone."},{"Weapon Quality":"Corrosive","Effect":"Permanently reduces Armour points in Hit Location by 1d10. Excess AP damage is dealt as damage to character."},{"Weapon Quality":"Crippling (X)","Effect":"Cripples the target until the end of the encounter. Crippled characters take (X) damage when performing more than a Half Action."},{"Weapon Quality":"Daemonbane","Effect":"Weapon gain the Vengeful (8) quality and their damage is not reduced by the target’s Toughness bonus."},{"Weapon Quality":"Defensive","Effect":"Grants +15 bonus to Parry and -10 penalty to hit when using this weapon."},{"Weapon Quality":"Felling (X)","Effect":"Weapon reduces a target’s Unnatural Toughness bonus by (X) when calculating damage from this weapon."},{"Weapon Quality":"Flame","Effect":"Target must make an Agility test or be set on fire (pg 145). Target takes 1d10 energy damage ignoring armor, and suffers 1 level of fatigue each turn. Target must take a Willpower (+0) test each turn to act normally. To extinguish flames, drop prone and succeed an Agility (-20) test."},{"Weapon Quality":"Flexible","Effect":"This weapon cannot be parried, but can be used to parry attacks."},{"Weapon Quality":"Force","Effect":"Normal weapon unless wielded by a psyker (pg 145). Force weapons deal damage and penetration equal to the Psy rating of the wielder (Psy rating 3 means +3 penetration and +3 damage). On a successful hit, do an opposed Willpower test, and if you win, each DoS on your test deals an additional 1d10 energy damage to the target, ignoring toughness and armor."},{"Weapon Quality":"Graviton","Effect":"Weapon inflicts additional damage equal to the AP of the location being hit (pg 146)."},{"Weapon Quality":"Hallucinogenic (X)","Effect":"Toughness test at -10 for each (1). This weapon induces hallucinations (pg 146). Sealed targets get +20"},{"Weapon Quality":"Haywire (X)","Effect":"Weapon generates a Haywire field (pg 147)."},{"Weapon Quality":"Inaccurate","Effect":"Weapon gains no bonus from Aiming."},{"Weapon Quality":"Indirect (X)","Effect":"Weapon can fire at targets out of line of sight. Shots scatter Xd10 metres (pg 147)."},{"Weapon Quality":"Lance","Effect":"Weapon increases its penetration based on DoS from attack."},{"Weapon Quality":"Maximal","Effect":"Weapon has a second, more powerful, fire setting. Add 1d10 damage, 10 meters, +2 penetration, and 2 more blast if it has blast, gains Recharge."},{"Weapon Quality":"Melta","Effect":"Weapon doubles its Pen when firing at Short range."},{"Weapon Quality":"Overheats","Effect":"Attack roll of 91 or more to hit causes Overheat (pg 148)."},{"Weapon Quality":"Power Field","Effect":"When Parrying (or being Parried by) a weapon that lacks this quality, there is a 75% chance of destroying the opponent’s weapon."},{"Weapon Quality":"Primitive (X)","Effect":"Weapon’s damage dice never count as rolling higher than (X)."},{"Weapon Quality":"Proven (X)","Effect":"Weapon’s damage dice never count as rolling lower than (X)."},{"Weapon Quality":"Razor Sharp","Effect":"If the attack results in three or more DoS, double weapon Pen."},{"Weapon Quality":"Recharge","Effect":"When fired, cannot be fired again in the next round."},{"Weapon Quality":"Reliable","Effect":"Weapon only jams on unmodified roll of 100. Weapons that do not roll to hit do not jam."},{"Weapon Quality":"Sanctified","Effect":"This weapon deals Holy damage to Daemonic and Warp creatures."},{"Weapon Quality":"Scatter","Effect":"At Point Blank range, weapon gains +10 to hit and +3 damage. At Short Range, weapon gains +10 to hit. Any longer ranges, weapon suffers -3 damage."},{"Weapon Quality":"Shocking","Effect":"If weapon causes damage, the target must make a Challenging (+0) Toughness test or be Stunned for rounds equal to DoF."},{"Weapon Quality":"Smoke (X)","Effect":"Creates cloud with radius of (X) metres lasting 1d10+10 rounds."},{"Weapon Quality":"Snare (X)","Effect":"Target must make an Agility test with penalty equal to 10 times (X) or be immobilised. An immobilised target can attempt no other actions except to try to escape the bonds. He can make a Full Action to burst the bonds (a Strength test) or wriggle free (an Agility test) in his turn. He is considered Helpless until he escapes."},{"Weapon Quality":"Spray","Effect":"Weapon projects a 30° arc cone out to the weapon’s range. No roll to hit; all creatures in path must make a Challenging (+0) Agility test or be struck."},{"Weapon Quality":"Storm","Effect":"Double number of hits inflicted on target (and ammo expended)."},{"Weapon Quality":"Tainted","Effect":"Weapons inflict additional damage equal to the value of the user’s Corruption bonus or Daemonic (X) trait value (whichever is higher)."},{"Weapon Quality":"Tearing","Effect":"Roll one extra dice for damage, take the best results."},{"Weapon Quality":"Toxic (X)","Effect":"Targets damaged by weapon must make a Toughness test with penalty of X times 10 or suffer an extra 1d10 damage of same type of first Toxic damage that round (not reduced by Armour or Toughness)."},{"Weapon Quality":"Twin-linked","Effect":"Grants +20 Bonus to hit and uses twice as much ammunition. Two or more DoS inflicts 1 additional hit; reload time is doubled."},{"Weapon Quality":"Unbalanced","Effect":"Grants -10 Penalty to Parry skill when using this weapon."},{"Weapon Quality":"Unreliable","Effect":"Weapon jams on roll of 91 or higher."},{"Weapon Quality":"Unwieldy","Effect":"Cannot be used to Parry or make Lightning Attacks."},{"Weapon Quality":"Vengeful (X)","Effect":"Inflicts Righteous Fury on damage rolls of X or higher."}],"Energy Critical":[{"Head1 A grazing blow to the head disorientates the target. He suffers a -10 penalty to all tests (except Toughness tests) for 1 round.2 The blast of energy dazzles the target. He is Blinded for 1 round.3 The attack cooks off the target’s ear, leaving him with a partially burned stump of cartilage. He is Deafened for 1d5 hours (oruntil he receives medical attention).4 The energy attack burns away all of the hairs on the target’s head, as well as leaving him reeling from the injury. The target suffers2 levels of Fatigue and the target is Blinded for 1d5 rounds.5 A blast of energy envelops the target’s head, burning his face and hair, crisping his skin, and causing him to scream like a stuckgrox. In addition to losing all hair on his scalp and face, he is Blinded for 1d10 rounds and Stunned for 1 round. Permanently reducethe target’s Fellowship characteristic by 1.6 The attack cooks the target’s face, melting his features and damaging his eyes. The target suffers 1d5 levels of Fatigue and isBlinded for 1d10 hours. Permanently reduce his Fellowship and Perception characteristics by 1d5.7 In a gruesome display, the flesh is burned from the target’s head, exposing charred bone and muscle underneath. The targetsuffers 1d10 levels of Fatigue. He is Blinded permanently. Roll 1d10; this is the target’s new Fellowship characteristic value. If hisFellowship value is already 10 or lower, this can be skipped as no one would notice any difference in his behaviour and demeanour.8 The target’s head is destroyed in a conflagration of fiery death. He does not survive.9 Superheated by the attack, the target’s brain explodes, tearing apart his skull and sending flaming chunks of meat flying at thosenearby. The target is very, very dead.10+ As above, except the target’s entire body catches fire and runs off headless 2d10 metres in a random direction (use the ScatterDiagram on page 230). Anything flammable it passes, including characters, must make a Challenging (+0) Agility test or catchfire (see page 243).":"Arm1 The attack grazes the target’s arm, causing it to spasm uncontrollably with pain. All tests involving that arm suffer a -30 penaltyfor 1d5 rounds.2 The attack smashes into the arm, sending currents of energy crackling down to the fingers and up to the shoulder. The targetsuffers 1 level of Fatigue, and that arm is Useless for 1d5 rounds.3 The arm suffers superficial burns inflicting no small amount of pain on the target. The target suffers 1d5 levels of Fatigue, andcan take only a Half Action during his next turn.4 The shock of the attack causes the character to temporarily lose control of his autonomous functions. He is Stunned for 1 roundand is knocked Prone. The arm is Useless for 1d10 rounds.5 The attack causes energy to course through the target’s arm. He is Stunned for 1 round, and the arm is Useless until the targetreceives medical treatment.6 The attack wreathes the arm in flame, scorching clothing and armour, and temporarily fusing together the target’s fingers. Thetarget suffers 1d5 levels of Fatigue and 1d5 Weapon Skill and Ballistic Skill damage, and he must make a Challenging (+0)Toughness test or suffer the Lost Hand condition (see page 242).7 With a terrible snapping sound, the heat of the attack boils the marrow in the target’s arm, causing it to crack or even shatter. Thetarget suffers 1d5 levels of Fatigue and is Stunned for 1 round. His arm is Useless until it is repaired.8 Energy ripples across the target’s arm, causing skin and muscle to slough disgustingly from the target’s limb, revealing a stickyred mess of sinew and bone. The target suffers 1d10 levels of Fatigue and must make a Challenging (+0) Toughness test or beStunned for 1d5 rounds. He now suffers from the Lost Arm condition (see page 242).9 Fire consumes the target’s arm, burning the flesh to a crisp right down to the bone. The target must make an immediateChallenging (+0) Toughness test or die from shock. If he survives, the target suffers 1d10 levels of Fatigue and is Stunned for 1round. The target now suffers from the Lost Arm condition (see page 242).10+ The attack reduces the arm to a cloud of crimson ash and sends the target crumbling to the ground. He immediately dies fromshock, clutching his smoking stump."},{"Head1 A grazing blow to the head disorientates the target. He suffer  single hit for 1d10+5 Explosive damage to a randomly determined Hit Location. If the target carried any grenades or missiles, these detonate on the character’s corpse with their normal effects one round after his demise"},{"Head1 A grazing blow to the head disorientates the target. He suffers a -10 penalty to all tests (except Toughness tests) for 1 round.2 The blast of energy dazzles the target. He is Blinded for 1 round.3 The attack cooks off the target’s ear, leaving him with a partially burned stump of cartilage. He is Deafened for 1d5 hours (oruntil he receives medical attention).4 The energy attack burns away all of the hairs on the target’s head, as well as leaving him reeling from the injury. The target suffers2 levels of Fatigue and the target is Blinded for 1d5 rounds.5 A blast of energy envelops the target’s head, burning his face and hair, crisping his skin, and causing him to scream like a stuckgrox. In addition to losing all hair on his scalp and face, he is Blinded for 1d10 rounds and Stunned for 1 round. Permanently reducethe target’s Fellowship characteristic by 1.6 The attack cooks the target’s face, melting his features and damaging his eyes. The target suffers 1d5 levels of Fatigue and isBlinded for 1d10 hours. Permanently reduce his Fellowship and Perception characteristics by 1d5.7 In a gruesome display, the flesh is burned from the target’s head, exposing charred bone and muscle underneath. The targetsuffers 1d10 levels of Fatigue. He is Blinded permanently. Roll 1d10; this is the target’s new Fellowship characteristic value. If hisFellowship value is already 10 or lower, this can be skipped as no one would notice any difference in his behaviour and demeanour.8 The target’s head is destroyed in a conflagration of fiery death. He does not survive.9 Superheated by the attack, the target’s brain explodes, tearing apart his skull and sending flaming chunks of meat flying at thosenearby. The target is very, very dead.10+ As above, except the target’s entire body catches fire and runs off headless 2d10 metres in a random direction (use the ScatterDiagram on page 230). Anything flammable it passes, including characters, must make a Challenging (+0) Agility test or catchfire (see page 243).":"Leg1 The blast of energy sears the flesh and bone of the target’s leg, leaving a nasty burn scar. The target cannot use the Run or Chargeactions for 2 rounds.2 The attack flash-fries the target’s leg, cooking chunks of flesh into char. The target must pass a Challenging (+0) Toughness testor suffer 1 level of Fatigue.3 A solid blow to the leg sends currents of agony coursing through the target. The target suffers 1 level of Fatigue and is knockedProne. Reduce his Movement by half (rounding up) for 1d10 rounds.4 The blast causes a nasty compound fracture in the target’s leg. Until the target receives medical attention, reduce his Movementby half (rounding up), and he cannot use the Run or Charge actions.5 The target’s leg endures horrific burn damage, fusing clothing and armour with flesh and bone. The target suffers 1 level ofFatigue and is knocked Prone. Reduce his Movement by half (rounding up) for 2d10 rounds.6 The attack burns the target’s foot, charring the flesh and emitting a foul aroma. The target suffers 2 levels of Fatigue. He mustalso make a Challenging (+0) Toughness test. If he succeeds, reduce his Movement by half (rounding up) until he receivesmedical attention; if he fails, he suffers the Lost Foot condition (see page 243).7 The energy attack fries the leg, leaving it a mess of blackened flesh. The leg is broken and until repaired, the target counts ashaving lost the leg. He suffers 1d5 levels of Fatigue. He must also make a Challenging (+0) Toughness test or be Stunned for 1round. He now suffers the Lost Leg condition (see page 243).8 Energy sears through the bone, causing the leg to be severed. The target suffers 1d10 levels of Fatigue and suffers Blood Loss.He must also make a Challenging (+0) Toughness fers 1d10 Toughness damage.7 The attack cuts open the target’s abdomen, threatening to expose his entrails. The target suffers Blood Loss. Permanently reducehis Toughness characteristic by 1d5. Until he receives medical attention, at the end of each round, if he took any actions (besidesholding his guts in and waiting for a medic), roll 1d10. On a result of 1 or 2, he suffers an additional 2d10 Rending damage.8 With a vile tearing noise, the skin on the target’s chest comes away revealing a red ruin of muscle. He must succeed on a Challenging(+0) Toughness test or perish. If he survives, he is Stunned for 1 round and suffers Blood Loss. Permanently reduce his Toughnesscharacteristic by 1d10.9 The powerful blow cleaves the target from gullet to groin, revealing his internal organs and spilling them on to the ground beforehim. The target is now quite dead.10+ As above, except that the area and the target are awash with slippery gore. For the rest of the fight, any character who moveswithin four metres of the target’s corpse must make a Challenging (+0) Agility test or fall Prone."},{"Arm1 The slashing attack tears free whatever the target was carrying. He drops anything he was holding in that hand.2 Deep cuts cause the target to drop his arm. He suffers 1 level of Fatigue and releases anything he was holding in that hand.3 The attack shreds the target’s arm into ribbons, causing the target to scream in pain. He drops anything he was holding in thathand, and must make a successful Challenging (+0) Toughness test or suffer Blood Loss.4 The attack flays the skin from the limb, filling the air with blood and the sounds of his screaming. The target suffers 2 levels ofFatigue and falls Prone. The arm is Useless for 1d10 rounds.5 A bloody and very painful-looking furrow is opened up in the target’s arm. He suffers Blood Loss and drops anything he washolding in that hand. The arm is Useless until the target receives medical attention.6 The blow mangles flesh and muscle as it tack slices across one of the target’s eye sockets, possibly scooping out the eye. The target suffers 1d10 Perception damage. Hemust make a Routine (+20) Toughness; test if he fails, he suffers the Lost Eye condition (see page 242).5 The attack tears the target’s helmet from his head. If he is not wearing a helmet, the target instead loses an ear and is Deafeneduntil he receives medical attention. If he loses an ear, he must also must pass a Challenging (+0) Toughness test or have hisFellowship characteristic permanently reduced by 1. The target is Stunned for 1d5 rounds.6 The blow rips violently across the target’s face, taking with it an important feature. He suffers 1d5 levels of Fatigue and suffersBlood Loss. Roll 1d10 to see what the target has lost. 1-3: Eye (see the Lost Eye condition on page 242), 4-7: Nose (permanentlyreduce his Fellowship characteristic by 1d10), 8-10: Ear (the target is Deafened until he receives medical attention).7 In a splatter of skin and teeth, the attack removes most of the target’s face. The strike might not have slain him, but the target’swords are forever slurred as a result of this vicious injury. The target is Stunned for 1 round and suffers Blood Loss. He ispermanently Blinded. Permanently reduce his Fellowship characteristic by 1d10.8 The blow slices into the side of the target’s head causing his eyes to pop out and his brain to ooze down his cheek like spilledjelly. He is dead before he hits the ground.9 With a sound not unlike a wet sponge being torn in half, the target’s head flies free of its body and sails through the air, landingharmlessly 2d10 metres away with a soggy thud. The target is instantly slain.10+ As above, except the target’s neck spews blood in a torrent, drenching all those within 1d5 metres and forcing each effected targetto make a Challenging (+0) Agility test. Each character who fails the Test suffers a -10 penalty to Weapon Skill and BallisticSkill tests for 1 round, as gore fills his eyes or fouls his round its fingers spasm uncontrollably, pulling the trigger of any held weapon. If the targetwas carrying a ranged weapon, roll 1d100. On a result of 96 or higher, a single randomly determined target within 2d10 metres is hitstruck by a single hit from that weapon on a randomly determined Hit Location.":"Leg1 The attack knocks the limb backwards, painfully twisting it awkwardly. The target suffers 1 level of Fatigue.2 The target’s kneecap splits open. He must make a Challenging (+0) Agility test or fall Prone and suffer Blood Loss as the injuredextremity hits the ground.3 The attack rips a length of flesh from the leg. The target suffers Blood Loss and suffers 1d5 Agility damage.4 The attack rips the kneecap free from the target’s leg, and he collapses to the ground. The target is knocked Prone and suffers 1d10Agility Damage. His Movement values are halved (rounding up) until he receives medical attention.5 In a spray of blood, the target’s leg is deeply slashed, exposing bone, sinew, and muscle. The target suffers Blood Loss. He mustmake a Challenging (+0) Toughness test; if he fails, permanently reduce his Agility characteristic by 1.6 The blow slices a couple of centimetres off the end of the target’s foot. The target suffers Blood Loss. He must make aChallenging (+0) Toughness test. If he succeeds, his Movement is halved (rounding up) until he receives medical attention. If hefails, he suffers the Lost Foot condition (see page 243).7 The force of the blow cuts deep into the leg, grinding against bone and tearing ligaments apart. The target is Stunned for 1 round,is knocked Prone, and suffers Blood Loss. The leg is Useless until the target receives medical attention.8 In a single bloody hack the target’s leg is lopped off, spurting its vital fluids across the ground. The target must immediately makea Challenging (+0) Toughness test or die from shock. If he survives, he is Stunned for 1d10 rounds and suffers Blood Loss. Hesuffers the Lost Leg condition (see page 2  rounds, and suffers Blood Loss. He also now suffers from the Lost Arm condition (see page 242).9 In a rain of blood, gore, and meat, the target’s arm is removed from his body. Screaming incoherently, he twists about in agonyfor a few seconds before collapsing to the ground and dying.10+ As per the effect directly above, except as the arm is removed by the force of the attack, bone, chunks of flesh, clothing, andarmour fragments fly about like blood-soaked shrapnel. Each target within 2 metres suffers a single hit for 1d5-3 Impact damageto a randomly determined Hit Location.":"Body1 A blow to the target’s body steals the breath from his lungs. The target can take only a Half Action on his next turn.2 The impact punches the air from the target’s body. He suffers 1 level of Fatigue and is knocked Prone.3 The attack breaks a rib with a resounding crunch. The target is Stunned for 1 round and knocked Prone.4 The blow batters the target, shattering a rib. The target suffers 1d10 Toughness damage and must make a Challenging (+0)Agility test or be knocked Prone.5 A solid blow to the chest pulverises the target’s innards, and he momentarily doubles over in pain, clutching himself and cryinin agony. The target is Stunned for 2 rounds and must make a Challenging (+0) Toughness test or suffer 1d5 levels of Fatigue.6 The attack knocks the target sprawling on the ground. The target suffers 1d5 levels of Fatigue, is flung 1d5 metres away from theattacker (stopping if he hits a solid object), and falls Prone. He is Stunned for 2 rounds.7 With an audible crack, 1d5 of the target’s ribs break. Permanently reduce the target’s Toughness characteristic by 1d5. Until hereceives medical attention, at the end of each round in which this character took an action, roll 1d10. On a result of 1 or 2, thecharacter dies instantly as a shattered rib pierces a vital organ.8 The force of the attack ruptures several of the target’s organs and knocks him down, gasping in wretched pain. The target suf
