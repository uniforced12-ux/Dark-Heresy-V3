p) for 1d10 rounds.5 Explosive force removes part of the target’s foot and scatters the ragged remnants over a wide area. The target must make a Difficult(-10) Toughness test or suffer 1d5 levels of Fatigue. Permanently reduce his Agility characteristic by 1d5.6 The concussive force of the blast shatters the target’s leg bones and splits apart flesh. The target suffers 1d10 levels of Fatigue.The leg is Useless until he receives medical attention. The target must make a Challenging (+0) Toughness test; if he fails, he suffers the Lost Foot condition (see page 198).7 The explosion reduces the target’s leg into a hunk of smoking meat. The target must immediately make a Challenging (+0)Toughness test or die from shock. If he survives, he suffers 1d10 levels of Fatigue, is Stunned for 1d10 rounds, and suffers BloodLoss. He now suffers the Lost Leg condition (see page 198).8 The blast tears the leg from the body in a geyser of gore, sending him crashing to the ground, blood pumping from the raggedstump. This grievous wound is instantly fatal.9 The leg explodes in an eruption of blood, killing the target immediately and sending tiny fragments of bone, clothing, and armourhurtling off in all directions. Each target within 2 metres suffers a single hit for 1d10+2 Impact damage to a randomly determinedHit Location.10+ As above, but if the target is carrying any ammunition it detonates, inflicting a single hit for 1d10+5 Impact damage to a randomlydetermined Hit Location upon each target within 1d10 metres (in addition to the hit noted above). If the target is carrying anygrenades or missiles, these detonate immediately with their normal effects."}],"Vehicle Critical":[{"Vehicle Hit Locations D100":"01-20 Engine    21-60 Body/Hull    61-80 Weapon    81-100 Largest Turret"},{"Vehicle Hit Locations D100":"Motive Systems (Engine/Wheels)"},{"Vehicle Hit Locations D100":1},{"Vehicle Hit Locations D100":"A savage blow to the vehicle’s drive mechanism or legs forces the operator to fight to maintain control. He suffers 1 level of Fatigue and must make a Challenging (+0) Operate test; if he fails, use the Scatter Diagram (see page 230) to determine the vehicle’s new facing."},{"Vehicle Hit Locations D100":2},{"Vehicle Hit Locations D100":"The vehicle is knocked violently from its current position, but otherwise does not take any major damage. It cannot move further than its Full Move distance until the end of the next round under its own power. Note it can still go Out of Control or otherwise be forced by alternate effects to move further than this would allow."},{"Vehicle Hit Locations D100":3},{"Vehicle Hit Locations D100":"One of the vehicle’s tracks, legs, or axles has taken a major hit, and now one side of the vehicle’s drive mechanism is responding more slowly than the other. The vehicle gains the Motive Systems Impaired damage condition (see page 261)."},{"Vehicle Hit Locations D100":4},{"Vehicle Hit Locations D100":"The vehicle’s fuel or drive power systems have taken a glancing hit. The vehicle is in no danger of exploding, but coaxing speed out of the engine is far more difficult now. If the operator attempts to take an action that would move the vehicle further than its Full Move distance, he must make a Difficulty (-10) Operate test. If he fails by three or more degrees of failure, the vehicle’s engine stalls, and it suddenly stops; if it is a Skimmer, the vehicle Crashes immediately (see page 256)."},{"Vehicle Hit Locations D100":5},{"Vehicle Hit Locations D100":"The driver finds that the vehicle’s control systems are completely unresponsive…but the vehicle is still moving! Tracked and Wheeled vehicles go Out of Control (page 255), Skimmers Crash (page 256), and Walkers move forward half their Tactical Speed or Full Movement before Falling Over (page 257). If the vehicle was stationary during the previous round, this result has no effect (though a Skimmer in midair still Crashes)."},{"Vehicle Hit Locations D100":6},{"Vehicle Hit Locations D100":"The hit tears off a tread, damages a knee joint, or tears into the grav-generator, doing severe damage. The vehicle gains the Motive Systems Crippled damage condition (see page 261). If this brings the Tactical Speed to 0, the vehicle is treated as having suffered the Motive Systems Destroyed damage condition instead. It grinds to a halt; if midair, a Skimmer Crashes as per page 256."},{"Vehicle Hit Locations D100":7},{"Vehicle Hit Locations D100":"The small internal explosion causes loose bolts to ricochet around the driver’s controls, or perhaps a control panel explodes in the driver’s face. He suffers 1 level of Fatigue, suffers 1d10 Impact damage to the head location, and must make a Difficult (-10) Operate test before he can move the vehicle next turn. If the vehicle was already moving when this result occurred and the vehicle’s operator is unable to regain control, then the vehicle goes Out of Control if it is a Tracked or Wheeled Vehicle, Crashes if it is a Skimmer, or moves forward half its Tactical Speed or Full Move distance before Falling over if it is a Walker."},{"Vehicle Hit Locations D100":8},{"Vehicle Hit Locations D100":"The vehicle’s motive systems are ripped apart in an explosion that immediately stops the vehicle from moving. The vehicle suffers the Motive Systems Destroyed damage condition (see page 261). Skimmers that suffer this result Crash (see page 256)."},{"Vehicle Hit Locations D100":9},{"Vehicle Hit Locations D100":"The vehicle’s power systems or fuel tanks are penetrated. The vehicle grinds to a halt and immediately catches alight. The vehicle gains the Motive Systems Destroyed damage condition (see page 261) and is now aflame (see On Fire! the sidebar on page 263). Skimmers that suffer this result Crash into the ground as per page 256."},{"Vehicle Hit Locations D100":10},{"Vehicle Hit Locations D100":"The hit smashes the vehicle’s drive shaft or sends a surge through its power systems. The vehicle immediately lurches forward before flipping over completely! Tracked Vehicles, Wheeled Vehicles, and Skimmers immediately move forward half their Tactical Speed and then flip over in a Crash (see page 256). Walkers move forward half their Tactical Speed before Falling Over. Anything mounted on the top of the vehicle (turrets, equipment, and especially pintle mounted weapons) is destroyed. Exposed crew and passengers are thrown or crushed. Other weapons mounted on a vehicle’s hull can still be used, assuming there are any crew left to use them. The vehicle is completely Immobilised (and also upside down), and cannot move under its own power until recovered and repaired. It suffers the Motive Systems Destroyed damage condition (see page 261); this cannot be repaired until the vehicle has first been turned ride-side up again."},{"Vehicle Hit Locations D100":"Body/Hull"},{"Vehicle Hit Locations D100":1},{"Vehicle Hit Locations D100":"The vehicle jolts to one side with the force of a strong hit, forcing all aboard to grab onto something to stay in their seats. Any crewmember who is not strapped in or otherwise secured must make an Ordinary (+10) Toughness test or be Stunned for 1 round."},{"Vehicle Hit Locations D100":2},{"Vehicle Hit Locations D100":"An internal gas line bursts, unleashing an opaque but non-lethal cloud within the crew compartment. Until the leak is sealed, the crew suffers a -20 penalty on all tests to take actions in the vehicle. Anyone inside the vehicle can spend a Full Action on his turn to close the leak without a test."},{"Vehicle Hit Locations D100":3},{"Vehicle Hit Locations D100":"A jarring blow tosses the vehicle around, throwing things about the interior. Any crewmember who is not strapped in or otherwise secured must make an Ordinary (+10) Toughness test or be Stunned for 1d5 rounds. Anyone aboard the vehicle suffers a -10 penalty to ranged attacks until the end of the next round."},{"Vehicle Hit Locations D100":4},{"Vehicle Hit Locations D100":"Some electrical cabling or power coupling is blasted loose by the impact, raining a sudden shower of sparks down on a member of the crew. A randomly selected member of the crew suffers 1 level of Fatigue and a single hit for 1d10+6 Impact damage to the Body location."},{"Vehicle Hit Locations D100":5},{"Vehicle Hit Locations D100":"Several hull plates buckle and fall away, weakening the vehicle. Reduce the Armour points of the facing struck by the attack by 1d10 until the vehicle is repaired."},{"Vehicle Hit Locations D100":6},{"Vehicle Hit Locations D100":"A small explosion rips through the crew compartment, damaging internal systems and wounding the crew. Each character in the affected section of the vehicle (as determined by the GM) suffers 1 level of Fatigue, suffers a single hit for 1d10+6 Explosive damage to the Body location, and must make a Challenging (+0) Agility test or catch fire (see page 198). If this occurs, refer to the On Fire! sidebar on page 263."},{"Vehicle Hit Locations D100":7},{"Vehicle Hit Locations D100":"The hit tears through the vehicle’s armour, leaving only useless shards of metal. Reduce the Armour points of the facing struck by the attack by half (rounding up) until the vehicle is repaired. If the hit came from a ranged attack, roll 1d10 for each crewmember. For each result of 1 or 2, the affected crewmember is hit by a single hit with the same damage type as the hit that caused this effect, for an amount of damage equal to one quarter of the original damage (rounded up). In addition, the vehicle suddenly gains the Open Topped Vehicle trait, which could be a problem if the vehicle is in a poisonous atmosphere, underwater, or in a vacuum. 8 As per the effect directly above, but the vehicle also catches fire! Refer to the On Fire! sidebar on page 263."},{"Vehicle Hit Locations D100":8},{"Vehicle Hit Locations D100":"A short, sharp explosion flares outward from the vehicle. Armour panels fall off, weapons are blasted free, and the vehicle’s drive mechanisms are ruined, causing it to stop dead. The vehicle is now a shattered hulk and suffers the Vehicle Destroyed damage condition (see page 262). Roll 1d10 for each remaining weapon on the vehicle; on a result of 5 or lower, the weapon in question suffers the Weapon Destroyed damage condition (see page 263). Each character inside of the vehicle suffers 1d10+6 Explosive damage to a randomly determined Hit Location, and must make a Difficult (-10) Toughness test or become Stunned for 1d10 rounds. Skimmers automatically crash as per page 256."},{"Vehicle Hit Locations D100":9},{"Vehicle Hit Locations D100":"The vehicle’s ammo supply, reactor or fuel supply takes a direct hit, and the vehicle erupts from within. Shards of molten metal are sent flying in every direction as the vehicle is reduced to a smoking crater. The vehicle is destroyed and cannot be repaired. No equipment from within the vehicle can be salvaged. Each character inside suffers 2d10+18 Explosive damage to a randomly determined Hit Location. Anyone within 2d10 metres of the vehicle suffers 1d10+6 Explosive damage from the blast. If the Vehicle has the Open-Topped or Bike vehicle trait, passengers or crew may make a Challenging (+0) Dodge test to bail out at the last second. Anyone who succeeds at this test instead suffers the 1d10+6 damage from the vehicle’s explosion."},{"Vehicle Hit Locations D100":10},{"Vehicle Hit Locations D100":"A colossal explosion tears the turret away from the vehicle, the twisted wreckage flying into the air as the vehicle itself is ripped apart by secondary explosions. The vehicle is destroyed. It cannot be repaired and no equipment from within the vehicle can be salvaged. Each character inside the turret is instantly killed. Each other character embarked in the vehicle takes 2d10+18 Explosive damage. Characters within 2d10 metres of the vehicle suffer 1d10+6 Explosive damage from the blast. If the Vehicle has the Open-Topped or Bike vehicle trait, each character inside may make a Challenging (+0) Dodge test to bail out at the last second. Anyone who succeeds at this test survives, but suffers 1d10+6 E Damage from the vehicle’s explosion. The turret itself flies 3d10 metres in a random direction, and inflicts a hit on anything it strikes as if the vehicle had used the Ram! action on that target after having moved its Tactical Speed (see page 252)."},{"Vehicle Hit Locations D100":"Weapon"},{"Vehicle Hit Locations D100":1},{"Vehicle Hit Locations D100":"A strong concussive hit leaves the gun intact, but knocks the gunner away from his station. The gunner is Stunned for 1 round."},{"Vehicle Hit Locations D100":2},{"Vehicle Hit Locations D100":"A glancing blow knocks the gun about, dislodging an ammo linkage, buckling a breach door, or shorting out a power system. It is a minor issue, but will take time to fix. The weapon immediately jams. The jam can be cleared via the normal method."},{"Vehicle Hit Locations D100":3},{"Vehicle Hit Locations D100":"The hit frazzles the gun’s targeting system, blocks a vision slit or causes internal armour to flake away and strike the gunner in the eyes. All attacks made with the weapon suffer a -10 penalty for 1d5 rounds."},{"Vehicle Hit Locations D100":4},{"Vehicle Hit Locations D100":"With the sound of grinding metal, the gun locks in place. The gun suffers the Weapon/Turret Locked damage condition (see page 262). The weapon is now only capable of firing in a direct straight line in whatever direction it happened to fire last (or directly forward if it had not fired yet). If the weapon was a Fixed weapon, treat this as the result 5 on this table."},{"Vehicle Hit Locations D100":5},{"Vehicle Hit Locations D100":"The gun’s ammo-hopper or power control system is destroyed, leaving the weapon incapable of loading ammunition. The weapon suffers the Weapon Disabled damage condition (see page 263) until it has been repaired."},{"Vehicle Hit Locations D100":6},{"Vehicle Hit Locations D100":"The weapon’s targeting systems are annihilated by the blast. The weapon gains the Targeting Systems Destroyed damage condition (see page 262)."},{"Vehicle Hit Locations D100":7},{"Vehicle Hit Locations D100":"The gun’s ammo-hopper or power control systems are severely damaged, or perhaps the weapon’s barrel is cracked from a heavy impact. The weapon can still fire, but with a risk of causing an ammunition explosion. Every time the weapon is discharged, roll 1d10. On a result of 3 or higher, roll damage against the vehicle and any gunners manning the weapon as if the destroyed weapon had hit them, halving all damage rolled. If this happens, the weapon gains the Weapon Destroyed damage condition (see page 263), and all the remaining ammunition in that clip is destroyed."},{"Vehicle Hit Locations D100":8},{"Vehicle Hit Locations D100":"The weapon explodes and is torn from its housing. Damage from the explosion rips further into the vehicle’s hull, possibly injuring the weapon’s gunner. For each gunner operating that weapon, roll 1d10; on a result of 1 or 2, that character is struck by a single hit with the same damage type as the hit that caused this effect and damage equal to one quarter (rounding up) of the damage the hit inflicted on the vehicle."},{"Vehicle Hit Locations D100":9},{"Vehicle Hit Locations D100":"As above, except the explosion rips through the entire crew compartment. Each character inside suffers 1 level of Fatigue, suffers 1d10+6 Explosive damage to his Body location, and must make a Challenging (+0) Agility test or catch on fire. If this occurs, refer to the On Fire! sidebar on page 263. Anyone who catches fire can attempt to put themselves out as described in the rules for fire on page 243."},{"Vehicle Hit Locations D100":10},{"Vehicle Hit Locations D100":"The force of the attack destroys the weapon and continues through into the vehicle’s hull, detonating the ammunition store or power supply for the weapon. The vehicle explodes immediately. It cannot be repaired and no equipment from within the vehicle can be salvaged. Each character inside suffers 2d10+18 Explosive damage to a randomly determined Hit Location. Each character within 2d10 metres of the vehicle suffers a single hit for 1d10+6 Explosive damage to a randomly determined Hit Location. If the Vehicle has the Open-Topped or Bike vehicle trait, each character inside may make a Challenging (+0) Dodge test to bail out at the last second, avoiding the damage for being inside. Each character who succeeds at the Evasion Test suffers 1d10+6 damage from the vehicle’s explosion."},{"Vehicle Hit Locations D100":"Largest Turret"},{"Vehicle Hit Locations D100":1},{"Vehicle Hit Locations D100":"A strong concussive hit leaves the gun intact, but rattles those manning the location. Each character within the vehicle’s turret is Stunned for 1 round."},{"Vehicle Hit Locations D100":2},{"Vehicle Hit Locations D100":"A heavy blow knocks the turret aside, but it is not immediately apparent how much damage the gun has taken. The weapon is now jammed (see page 224)."},{"Vehicle Hit Locations D100":3},{"Vehicle Hit Locations D100":"The hit frazzles the gun’s targeting system, blocks a vision slit or causes internal armour to flake away and strike the gunner in the eyes. All ranged attacks made with the weapon suffer a -10 penalty for 1d5 rounds."},{"Vehicle Hit Locations D100":4},{"Vehicle Hit Locations D100":"With the sound of grinding metal, the turret locks in place. The gun gains Weapon/Turret Locked damage condition (see page 262). The weapon is now only capable of firing in a direct straight line in whatever direction it happened to fire at last (or directly forward if it had not fired yet). Pintle Weapons maintain their Fire Arcs even if a turret has jammed in place."},{"Vehicle Hit Locations D100":5},{"Vehicle Hit Locations D100":"The turret loses power, and everything stops working. The turret and the weapons contained within are undamaged, but nothing has any power and thus no weapons other than pintle weapons can be fired; the turret itself cannot rotate until the power systems are repaired. If the turret had any other equipment linked to it (such as additional searchlights, communications equipment and so on), these cease to operate. For the purposes of repairing damage, treat this as a Weapon Destroyed damage condition, but the weapons within the turret do not need to be replaced before a character can make the Repair test (see page 258)."},{"Vehicle Hit Locations D100":6},{"Vehicle Hit Locations D100":"The turret’s targeting systems are annihilated by the blast. Each non-pintle weapon mounted on the turret suffers the Targeting Systems Destroyed damage condition (see page 262)."},{"Vehicle Hit Locations D100":7},{"Vehicle Hit Locations D100":"The hit tears through the turret’s armour, leaving only useless shards of metal. All further hits to the vehicle’s turret now roll against the vehicle’s Rear facing Armour rather than the Front facing Armour, regardless of which direction the shot strikes the turret from. Treat the vehicle has having lost 2d10 AP for the purposes of repairing the Armour (see Reduced Armour, page 262). If hit came from a ranged attack, roll 1d10 for each crewmember. For each result of 1 or 2, the affected character is struck by a single hit with the same damage type as the hit that caused this effect, for an amount of damage equal to one quarter of the original damage (rounded up). The vehicle abruptly gains the Open Topped vehicle trait, which could be a problem if the vehicle is in a poisonous atmosphere, underwater, or in a vacuum."},{"Vehicle Hit Locations D100":8},{"Vehicle Hit Locations D100":"Several areas of the turret are blasted away and the entire turret catches fire. Any weapons mounted in or on the turret suffers the Weapon Destroyed damage condition. Any equipment on or in the turret is destroyed, and the turret itself gains the Weapon/ Turret Locked damage condition. Additionally, the turret is set alight (see the On Fire! sidebar on page 263)."},{"Vehicle Hit Locations D100":9},{"Vehicle Hit Locations D100":"As above, except the fire pours into the main hull of the vehicle, setting everything ablaze. Each character inside the affected portions of the vehicle, as determined by the GM, must make a Challenging (+0) Agility test or catch on fire (see the On Fire! sidebar on page 263). Anyone who catches fire can attempt to put himself out as described in the rules for Fire on page 243."},{"Vehicle Hit Locations D100":10},{"Vehicle Hit Locations D100":"A colossal explosion tears the turret away from the vehicle, the twisted wreckage flying into the air as the vehicle itself is ripped apart by secondary explosions. The vehicle is destroyed. It cannot be repaired and no equipment from within the vehicle can be salvaged. Each character inside the turret is instantly killed. Each other character embarked in the vehicle takes 2d10+18 Explosive damage. Characters within 2d10 metres of the vehicle suffer 1d10+6 Explosive damage from the blast. If the Vehicle has the Open-Topped or Bike vehicle trait, each character inside may make a Challenging (+0) Dodge test to bail out at the last second. Anyone who succeeds at this test survives, but suffers 1d10+6 E Damage from the vehicle’s explosion. The turret itself flies 3d10 metres in a random direction, and inflicts a hit on anything it strikes as if the vehicle had used the Ram! action on that target after having moved its Tactical Speed (see page 252)."}],"Psychic Phenomena":[{"Roll 1d100":"Roll","Column 2":"Result"},{"Roll 1d100":"1-3","Column 2":"Dark Foreboding: A faint breeze blows past the psyker and those near him, and everyone gets the feeling that somewhere in the galaxy something unfortunate just happened."},{"Roll 1d100":"4-5","Column 2":"Warp Echo: For a few moments, all noises cause echoes, regardless of the surroundings."},{"Roll 1d100":"6-8","Column 2":"Unholy Stench: The air around the psyker becomes permeated with a bizarre and foul smell"},{"Roll 1d100":"9-11","Column 2":"Mind Warp: The psyker suffers a -5 penalty to Willpower tests until the start of his next turn as his own inherent phobias, suspicions, and hatreds surge to the surface of his mind in a wave of unbound emotion."},{"Roll 1d100":"12-14","Column 2":"Hoarfrost: The temperature plummets for an instant, and a thin coating of frost forms to cover everything within 3d10 metres."},{"Roll 1d100":"15-17","Column 2":"Aura of Taint: All animals within 1d100 metres become spooked and agitated; characters can use the Psyniscience skill to pinpoint the psyker as the cause."},{"Roll 1d100":"18-20","Column 2":"Memory Worm: All people within line of sight of the psyker forget some trivial fact or minor personal memory."},{"Roll 1d100":"21-23","Column 2":"Spoilage: Food and drink go bad in a 5d10 metre radius."},{"Roll 1d100":"24-26","Column 2":"Haunting Breeze: Winds whip up around the psyker for a few moments, blowing light objects around and guttering fires within 3d10 metres."},{"Roll 1d100":"27-29","Column 2":"Veil of Darkness: For a brief moment (effectively, until the end of the round), the area within 3d10 metres is plunged into immediate and impenetrable darkness"},{"Roll 1d100":"30-32","Column 2":"Veil of Darkness: For a brief moment (effectively, until the end of the round), the area within 3d10 metres is plunged into immediate and impenetrable darkness"},{"Roll 1d100":"33-35","Column 2":"Breath Leech: Each character (including the psyker) within a 3d10 metre radius becomes short of breath for one round and cannot make any Run or Charge actions."},{"Roll 1d100":"36-38","Column 2":"Daemonic Mask: For a fleeting moment, the psyker takes on a daemonic appearance and gains the Fear (1) trait until the start of the next turn. However, he also gains 1 Corruption point"},{"Roll 1d100":"39-41","Column 2":"Unnatural Decay: All plant life within 3d10 metres of the psyker withers and dies"},{"Roll 1d100":"42-44","Column 2":"Spectral Gale: Howling winds erupt around the psyker, requiring each character (including the psyker) within 4d10 metres to make an Easy (+30) Agility or Strength test to avoid being knocked Prone."},{"Roll 1d100":"45-47","Column 2":"Bloody Tears: Blood weeps from stone and wood within 3d10 metres of the psyker. If there are any paintings, pict-displays, statues, or other representations of people inside this area, they appear to be crying blood."},{"Roll 1d100":"48-50","Column 2":"The Earth Protests: The ground suddenly shakes, and each character (including the psyker) within a 5d10 metre radius must make an Ordinary (+10) Agility test or be knocked down"},{"Roll 1d100":"51-53","Column 2":"Actinic Discharge: Static electricity fills the air within 5d10 metres causing hair to stand on end and unprotected electronics to short out, while the psyker is wreathed in eldritch lightning. The GM is free to resolve the specifics as needed, perhaps using Table 5-4: Haywire Field Effects (see page 147) to provide guidance."},{"Roll 1d100":"54-56","Column 2":"Warp Ghosts: Ghostly apparitions fill the air within 3d10 metres around the psyker, flying about and howling in pain for a few brief moments. Each character in the radius (except the psyker himself) must test against Fear (1)"},{"Roll 1d100":"57-59","Column 2":"Falling Upwards: Everything within 2d10 metres of the psyker (including the psyker himself) rises 1d10 metres into the air as gravity briefly ceases. Almost immediately, everything crashes back to earth, suffering falling damage as appropriate for the distances fallen."},{"Roll 1d100":"60-62","Column 2":"Banshee Howl: A shrill keening rings out across the immediate area, shattering glass and forcing each living creature able to hear it (including the psyker) to pass a Challenging (+0) Toughness test or be deafened for 1d10 rounds."},{"Roll 1d100":"63-65","Column 2":"The Furies: The Psyker is assailed by unseen horrors. He is slammed to the ground and suffers 1d5 Impact damage (ignoring Armour, but not Toughness bonus) and he must test against Fear (2)"},{"Roll 1d100":"66-68","Column 2":"Shadow of the Warp: For a split second, the world changes in appearance, and everyone within 1d100 metres has a brief but horrific glimpse of the shadow of the Warp. Each character in the area (including the psyker) must make a Difficult (-10) Willpower test or gain 1d5 Corruption points."},{"Roll 1d100":"69-71","Column 2":"Tech Scorn: The machine spirits reject these unnatural ways. All un-warded technology within 5d10 metres malfunctions momentarily, and all ranged weapons jam (see page 224). Each character (including the psyker) withing that range with cybernetic implants must pass an Ordinary (+10) Toughness test or suffer 1d5 Rending damage, ignoring Toughness bonus and Armour."},{"Roll 1d100":"72-74","Column 2":"Warp Madness: A violent ripple of tainted discord causes all characters (except the psyker) within 2d10 metres to make a Difficult (-10) Willpower test; each character who fails gains 1d5 Corruption points and becomes Frenzied for 1 round (see page 127)."},{"Roll 1d100":"75++","Column 2":"ROLL ON PERILS OF THE WARP TABLE"}],"Perils of the Warp":[{"Roll 1d100":"Roll","Column 2":"Result"},{"Roll 1d100":"1-5","Column 2":"The Gibbering: The psyker screams in pain as uncontrolled Warp energies surge through his unprepared mind. He must make a Challenging (+0) Willpower test or be Stunned for 1d5 rounds."},{"Roll 1d100":"6-9","Column 2":"Warp Burn: A violent burst of energy from the Warp smashes into the psyker’s mind, sending him reeling. He suffers 2d5 Energy damage, ignoring Toughness bonus and Armour, and is Stunned for 1d5 rounds."},{"Roll 1d100":"10-13","Column 2":"Psychic Concussion: With a crack of energy, the psyker is knocked unconscious for 1d5 rounds, and everyone within 3d10 metres must make an Ordinary (+10) Willpower test or be Stunned for one round."},{"Roll 1d100":"14-18","Column 2":"Psy Blast: There is an explosion of power and the psyker is thrown 3d10 metres into the air, plummeting to the ground moments later (see page 243 for rules concerning falling damage)"},{"Roll 1d100":"19-24","Column 2":"Soul Sear: Warp power courses through the psyker’s body, scorching his soul. The psyker cannot use any psychic powers for the next hour, and gains 2d5 Corruption points."},{"Roll 1d100":"25-30","Column 2":"Locked In: The power cages the psyker’s mind in an ethereal prison, tormented by visions of the Warp. The psyker falls to the ground Prone and Unconscious. At the beginning of each of his turns until he breaks free, he must spend a Full Action to make a Difficult (-10) Willpower test. If he succeeds, his mind is freed and restored to his body, haunted by his experiences but otherwise unharmed."},{"Roll 1d100":"31-38","Column 2":"Chronological Incontinence: Time warps around the psyker. He winks out of existence and reappears in 1d10 rounds (or one minute in narrative time) in the exact location. He suffers one point of permanent Toughness and Intelligence damage as his body and mind rebel against the experience, and gains 1d5 Corruption points."},{"Roll 1d100":"39-46","Column 2":"Psychic Mirror: The psyker’s power is turned back on him. Resolve the power’s effects, but the power targets the psyker instead. If the power is beneficial, it deals 1d10+5 Energy damage (ignoring Armour) to the psyker’s Body instead of having its normal effect."},{"Roll 1d100":"47-55","Column 2":"Warp Whispers: The voices of Daemons fill the air within 4d10 metres of the psyker, whispering terrible secrets and shocking truths. Each character in range (including the psyker) must make a Hard (-20) Willpower test or gain 1d5 Corruption points and suffer an equal amount of Willpower damage. Whether or not the psyker passes the Willpower test, he suffers an additional 1d5+5 Willpower damage."},{"Roll 1d100":"56-58","Column 2":"Vice Versa: The psyker’s mind is thrown out of his body and into another nearby creature or person. The psyker and a random living creature (friend or foe, but not a Daemon, machine, or other “soulless” entity) within 50 metres swap consciousness for 1d10 rounds. Each creature retains its Weapon Skill, Ballistic Skill, Intelligence, Perception, Willpower, and Fellowship during the swap, but uses the other characteristics of the host body. If either body is slain, the effect ends immediately and both parties return to their original bodies. Both suffer 1d5 Intelligence damage from the experience. If there are no creatures within range, the psyker becomes catatonic for 1d5 rounds while his mind wanders the Warp. This journey inflicts 1d10 Willpower damage, 1d10 Intelligence damage, and 1d10 Corruption points"},{"Roll 1d100":"59-67","Column 2":"Dark Summoning: The Empyrean buckles and tears at the arrogance of the psyker, and a Plaguebearer (see page 415) or another lesser Daemon at the GM’s discretion rips its way into existence. The pestilent fiend appears within 3d10 metres of the psyker, for a number of rounds equal to 1d5 plus the psyker’s Toughness bonus. The psyker’s turn immediately ends, and the Daemon takes its turn immediately. It detests the psyker and focuses all of its attacks upon the fool who unwittingly summoned it. It does not attack anyone else, even if others attack it; if the psyker is slain, it returns back to the Warp, satisfied with its kill."},{"Roll 1d100":"68-72","Column 2":"Rending the Veil: The air vibrates with images of cackling Daemons and the kaleidoscopic fabric of the Warp is rendered visible to mortal eyes. All sentient creatures within 1d100 metres must test against Fear (2). The psyker must test against Fear (4) instead. This effect lasts for 1d5 rounds."},{"Roll 1d100":"73-78","Column 2":"Blood Rain: A psychic storm erupts, covering an area of 5d10 metres. Each character in range (including the psyker) must make a Challenging (+0) Strength test or be knocked Prone. In addition to howling winds and rains of blood, any psychic powers used in the area for 1d5 rounds automatically invoke Perils of the Warp, in addition to any Psychic Phenomena caused. The psyker gains 1d5+1 Corruption points."},{"Roll 1d100":"79-82","Column 2":"Cataclysmic Blast: The psyker’s power overloads, arcing out in great bolts of Warp energy. Each character within 1d10 metres (including the psyker) takes 1d10 Energy damage with a Pen of 5. The psyker may not Dodge this, or stop the attack with a force field (see page 168). In addition, all of the psyker’s clothing, armour, and gear is destroyed, leaving him naked and smoking on the ground, and he cannot use further powers for 1d5 hours after the event"},{"Roll 1d100":"83-86","Column 2":"Mass Incursion: Chaos Furies (page 417) emerge from the Warp, hungry for souls. Each character within 1d100 metres of the psyker (including himself) must make a Hard (-20) Willpower test or gain 1d10 Corruption and Insanity points, and suffer 1d10 Willpower damage. Each character who succeeds is attacked physically by a Fury, which departs after 1d5 rounds."},{"Roll 1d100":"87-90","Column 2":"Reality Quake: Reality buckles around the psyker, and an area radiating out 3d10 metres from him is sundered: solid objects alternately rot, burn, and freeze, and everyone and everything in the area suffers a single hit for 2d10 Rending damage that ignores Armour and cannot be Dodged. Warded objects, Daemons, and Untouchables halve the damage they would suffer."},{"Roll 1d100":"91-99","Column 2":"Grand Incursion: A great and terrible Warp entity takes an interest in the psyker's flesh. Use the profile for Putricifex, Herald of Nurgle from page 416 (or another suitably powerful Daemon) to represent the attacker, who instantly makes an Opposed Very Hard (-20) Willpower test against the psyker. If the Daemon wins, it possesses the psyker's body for 1 hour per degree by which it won the test. The psyker gains 2d10 Insanity and Corruption points and is controlled by the Daemon until the effect ends. If he dies while possessed, the Daemon physically manifests for the remainder of the effect's duration. If the psyker wins the test, he suffers 2d10 Toughness damage, and forever adds +10 to all rolls on Table 6-2: Psychic Phenomena and Table 6-3: Perils of the Warp, as his polluted body now serves as a Warp conduit"},{"Roll 1d100":"100++","Column 2":"Annihilation: The psyker is immediately burned to ashes by the screaming fires of the Immaterium or dragged into the deepest maelstrom of the Warp. He cannot burn Fate to avert this death and is irrevocably destroyed. There is a chance that a daemonic entity of some sort appears in his place—the type of Daemon is determined by the GM, based on how powerful the psyker was, as more powerful psykers draw more powerful Daemons. The percentage chance that the Daemon appears is equal to the psyker’s Willpower characteristic (roll a 1d100, if the result is equal to or under the characteristic, the Daemon appears)."}],"Psychic Attacks":[{"Name":"Smite","Family":"Biomancy","Type":"Barrage","Focus Power":"Challenging (+0) Willpower test","Range":"20 x PR","Damage":"1d10+PR Energy","Pen":4,"Special":"","Column 9":""},{"Name":"Dark Flame","Family":"Malefic","Type":"Bolt","Focus Power":"Challenging (+0) Willpower test","Range":"5 m x PR","Damage":"1d10+PR+CB Energy","Pen":"CB","Special":"Flame, Spray","Column 9":"Psychic Attack. Any character who suffers damage from Dark Flame must succeed at an Easy (+30) Willpower test or gain 1 Corruption point for each degree of failure."},{"Name":"Fiery Form","Family":"Pyromancy","Type":"Blast","Focus Power":"Difficult (-10) Willpower test","Range":"Self","Damage":"1d10+PR Energy","Pen":0,"Special":"Blast (PR), Flame","Column 9":"All melee attacks gain PR damage and Flame quality. End of turn emit a Blast (PR) effect, all enemies in (PR) radius are stuck!"},{"Name":"Fire Shield","Family":"Pyromancy","Type":"Bolt","Focus Power":"Challenging (+0) Willpower test","Range":"20 x PR","Damage":"PR Energy","Pen":0,"Special":"Flame","Column 9":"Anyone attacking the psyker suffer PR energy damage not reduced by tough or armor."},{"Name":"Flame Breath","Family":"Pyromancy","Type":"Barrage","Focus Power":"Challenging (+0) Willpower test","Range":"20 x PR","Damage":"1d10+2+2xPR Energy","Pen":0,"Special":"Flame","Column 9":"Psychic Attack. Shoot flames from breath and eyes."},{"Name":"Inferno","Family":"Pyromancy","Type":"Blast","Focus Power":"Difficult (-10) Willpower test","Range":"10m x PR","Damage":"2d10+3xPR Energy","Pen":0,"Special":"Blast (PR), Flame","Column 9":""},{"Name":"Molten Beam","Family":"Pyromancy","Type":"Bolt","Focus Power":"Challenging (+0) Willpower test","Range":"5m x PR","Damage":"1d10+5+3xPR Energy","Pen":"2xPR","Special":"Melta","Column 9":""},{"Name":"Spontaneous Combustion","Family":"Pyromancy","Type":"Bolt","Focus Power":"Ordinary (+10) Willpower test","Range":"20 x PR","Damage":"1d10+2+2xPR Energy","Pen":0,"Special":"Flame","Column 9":"Burst into flames."},{"Name":"Sunburst","Family":"Pyromancy","Type":"Storm","Focus Power":"Challenging (+0) Willpower test","Range":"20 x PR","Damage":"1d10+2+2xPR Energy","Pen":0,"Special":"Flame","Column 9":"Nova of fire."},{"Name":"Cleansing Flame","Family":"Sanctic","Type":"Bolt","Focus Power":"Challenging (+0) Willpower test","Range":"5M x PR","Damage":"1d10+PR+WPB Energy","Pen":0,"Special":"Flame, Sanctifies, Spray","Column 9":""},{"Name":"Holocaust","Family":"Sanctic","Type":"Blast","Focus Power":"Hard (-20) Willpower test","Range":"Self","Damage":"1d10xPR Energy","Pen":0,"Special":"Blast (PR), Flame, Warp Weapon","Column 9":"Blast Attack, Blast (PR), Flame, Warp Weapon, Self, Deal 1d10xPR Energy damage to all in PR radius ignoring armor, no test to sustain."},{"Name":"Assail","Family":"Telekinesis","Type":"Bolt","Focus Power":"Ordinary (+10) Willpower test","Range":"20 x PR","Damage":"1d10+PR Impact","Pen":2,"Special":"","Column 9":"Psychic Attack. If the psyker scores at least three degrees of success on the Focus Power test for this attack, the target is also thrown 1d5 metres away and knocked Prone."},{"Name":"Crush","Family":"Telekinesis","Type":"Bolt","Focus Power":"Challenging (+0) Willpower test","Range":"10m x PR","Damage":"1d10+PR Impact","Pen":2,"Special":"Snare (PR/2)","Column 9":"Psychic Attack. The psyker nominates a single target in range and line of sight who opposes this power with a Toughness test. If the target fails to resist the power, it suffers the attack below."},{"Name":"Shockwave","Family":"Telekinesis","Type":"Blast","Focus Power":"Challenging (+0) Willpower test","Range":"Self","Damage":"1d10+PR Explosive","Pen":0,"Special":"Blast (PR)","Column 9":"Psychic Attack. Each character in the area of effect (other than the psyker) suffers the damage. He is also pushed directly away from the psyker a number of metres equal to the psyker"},{"Name":"Vortex Explosion (is below)","Family":"Telekinesis","Type":"Blast","Focus Power":"Difficult (-10) Willpower test","Range":"","Damage":"2d10+4xPR Explosive","Pen":"†","Special":"Blast (2xPR), †Pen=current vortex radius","Column 9":""},{"Name":"Vortex of Doom","Family":"Telekinesis","Type":"Blast","Focus Power":"Difficult (-10) Willpower test","Range":"5 m x PR","Damage":"2d10+2xPR Explosive","Pen":"†","Special":"Blast (2), †Pen=current vortex radius","Column 9":"Psychic Attack. The psyker chooses a point in range and line of sight, and creates a vortex of energy centred on that point that starts with a radius of 2 metres. Each character who is touching the vortex at the end of the psyker's turn suffers damage. The psyker cannot voluntarily stop sustaining this power. Instead, at the beginning of each turn the psyker is sustaining the vortex, he must make a Challenging (+0) Willpower test with -5 per meter of the vortex's current radius. If passed, he may: Increase or decrease the radius by a meter or move it meters equal to psy rating. If the psyker fails the Willpower test to sustain the vortex,its radius increases by one metre and it moves a number of metres equal to the psyker's psy rating in a random direction. If the vortex ends and the vortex disappears. If the vortex larger than the psyker's psy rating, it explodes and destroys the vortex. The psyker is hit by this damage regardless of his proximity"},{"Name":"Psychic Shriek","Family":"Telepathy","Type":"Bolt","Focus Power":"Challenging (+0) Willpower test","Range":"10m x PR","Damage":"1d10+2+2xPR Explosive","Pen":0,"Special":"Concussive (1)","Column 9":"Loud Noises."}]},"costTables":{"skill":{"2":[100,200,300,400],"1":[200,400,600,800],"0":[300,600,900,1200]},"characteristic":{"2":[100,250,500,750,1250],"1":[250,500,750,1000,1500],"0":[500,750,1000,1500,2500]},"talent":{"T1":{"2":200,"1":300,"0":600},"T2":{"2":300,"1":450,"0":900},"T3":{"2":400,"1":600,"0":1200}}}}</script>
<script>
'use strict';
const DATA = JSON.parse(document.getElementById('dh-data').textContent);
const APT_CANON = {'defense':'Defence','defence':'Defence','offense':'Offence','offence':'Offence'};
const CHAR_ABBR = {'WS':'Weapon Skill','BS':'Ballistic Skill','S':'Strength','T':'Toughness','Ag':'Agility','Agi':'Agility','Int':'Intelligence','Per':'Perception','WP':'Willpower','Fel':'Fellowship','Inf':'Influence','Influence':'Influence'};
const CHAR_NAMES = ['Weapon Skill','Ballistic Skill','Strength','Toughness','Agility','Intelligence','Perception','Willpower','Fellowship','Influence'];
const APTITUDES = [...new Set(DATA.aptitudes.map(normApt).filter(Boolean))].filter(x=>x!=='Defense');
const state = {
  basics:{name:'',player:'',xpBudget:10000,notes:''},
  origin:{homeworld:'',background:'',role:'',divination:'',aptChoices:{},duplicateReplacements:{},manualAptitudes:[],freeText:''},
  characteristics:{base:{},misc:{},advances:{}},
  purchases:[],
  inventory:[],
  settings:{enforceReqs:true,enforceReqsUserTouched:false}
};
CHAR_NAMES.forEach(c=>{state.characteristics.base[c]=25;state.characteristics.misc[c]=0;state.characteristics.advances[c]=0});
let activeTab='setupTab';
const tabs=[['setupTab','Setup & Origins'],['charTab','Characteristics'],['skillsTab','Skills'],['talentsTab','Talents'],['psyTab','Psyker & Elite'],['armouryTab','Armoury / Gear'],['referenceTab','Reference'],['finalTab','Final Sheet']];
function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function normApt(a){let s=String(a??'').replace(/†/g,'').trim(); if(!s||s==='-'||s==='–')return ''; s=s.replace(/\s+/g,' '); return APT_CANON[s.toLowerCase()]||s;}
function xp(n){return (Number(n)||0).toLocaleString('en-US')+' XP'}
function csvParts(s){return String(s||'').split(',').map(x=>x.trim()).filter(Boolean)}
function splitOptions(phrase){
  phrase=String(phrase||'').replace(/\s+or\s+/ig,' OR ').trim();
  if(!phrase)return [];
  if(/ OR /i.test(phrase)) return phrase.split(/\s+OR\s+/i).map(normApt).filter(Boolean);
  return [normApt(phrase)];
}
function parseAptitudePhrase(text, prefix){
  const out=[]; let idx=0;
  csvParts(text).forEach(part=>{
    let opts=splitOptions(part);
    if(opts.length>1){out.push({id:prefix+'_'+idx++, options:opts, label:part, chosen:state.origin.aptChoices[prefix+'_'+(idx-1)]||opts[0]});}
    else if(opts[0]) out.push({id:null, options:opts, chosen:opts[0], label:part});
  });
  return out;
}
function byName(arr,nameField='Name'){let m={}; arr.forEach(x=>{let n=String(x[nameField]||x.Name||''); if(n)m[n]=x}); return m;}
const SECTION_ART={
  setupTab:{file:'homeworld.png',title:'Acolyte Origin',sub:'Select homeworld, background, role, divination, starting grants, and sanctioned XP budget.'},
  charTab:{file:'characteristics.png',title:'Characteristics',sub:'Roll, tune, and advance the raw traits of an Imperial servant.'},
  skillsTab:{file:'skills.png',title:'Skills',sub:'Build the investigative, social, technical, and survival profile of the cell.'},
  talentsTab:{file:'talents.png',title:'Talents',sub:'Purchase combat doctrines, specialist abilities, and hard-earned advantages with prerequisite control.'},
  psyTab:{file:'psyker.png',title:'Psyker & Elite Advances',sub:'Unlock forbidden potential, track Psy Rating, and bind powers to a character state.'},
  armouryTab:{file:'armory.png',title:'Armoury & Gear',sub:'Weapons, ammo, armour, upgrades, tools, drugs, cybernetics, and field equipment.'},
  referenceTab:{file:'reference.png',title:'Reference Archive',sub:'Rules tables, traits, weapon qualities, phenomena, perils, mutations, and critical results.'},
  finalTab:{file:'summary.png',title:'Final Dossier',sub:'A printable Inquisition file with full XP audit and character detail.'}
};
function sectionArt(id){const a=SECTION_ART[id]; if(!a)return ''; return `<div class="assetHero noPrint"><img src="${escAttr(a.file)}" alt="${escAttr(a.title)}" onerror="this.closest('.assetHero').style.display='none'"><div class="assetOverlay"></div><div class="assetText"><div class="assetTitle">${esc(a.title)}</div><div class="assetSub">${esc(a.sub)}</div></div></div>`}
function itemRarity(it){return String((it&& (it.Availability||it.Rarity||it['Availability/Rarity']||it['Rarity/Availability']))||'').trim()||'—'}
function secondHighestPsyAfterRemoving(p){let vals=state.purchases.filter(x=>x.kind==='psyRating' && x!==p && x.id!==p.id).map(x=>Number(x.to)||0); return Math.min(10, Math.max(basePsyRating(), ...vals));}
function startMusic(){const bgm=$('bgm'); if(!bgm)return; bgm.volume=.22; bgm.play().then(()=>{$('musicBtn')?.classList.add('hidden'); window.__dhMusicStarted=true;}).catch(()=>{$('musicBtn')?.classList.remove('hidden')});}
window.addEventListener('load',()=>{const bgm=$('bgm'); if(!bgm)return; bgm.volume=.22; bgm.play().then(()=>{window.__dhMusicStarted=true;}).catch(()=>{$('musicBtn')?.classList.remove('hidden')});});
['click','keydown','touchstart'].forEach(ev=>window.addEventListener(ev,()=>{if(!window.__dhMusicStarted) startMusic();},{once:false,passive:true}));
const homeBy=byName(DATA.homeworlds), bgBy=byName(DATA.backgrounds), roleBy=byName(DATA.roles), talentBy=byName(DATA.talents), skillBy=byName(DATA.skills), charBy=byName(DATA.characteristics);
function initDefaults(){
  if(!state.origin.homeworld && DATA.homeworlds[0]) state.origin.homeworld=DATA.homeworlds[0].Name;
  if(!state.origin.background && DATA.backgrounds[0]) state.origin.background=DATA.backgrounds[0].Name;
  if(!state.origin.role && DATA.roles[0]) state.origin.role=DATA.roles[0].Name;
  if(!state.origin.divination && DATA.divinations[0]) state.origin.divination=DATA.divinations[0].Rolls;
}
function rollD10(){return Math.floor(Math.random()*10)+1}
function rollCharacteristic(){return 20+rollD10()+rollD10()}
function homeworldMods(){
  const h=homeBy[state.origin.homeworld]||{}; const mods={};
  [h['Bonus Characteristic 1'],h['Bonus Characteristic 2']].forEach(c=>{c=String(c||'').trim(); if(c)mods[c]=(mods[c]||0)+5});
  let neg=String(h['Negative Characteristic']||'').trim(); if(neg)mods[neg]=(mods[neg]||0)-5;
  return mods;
}
function finalCharacteristic(c){return (Number(state.characteristics.base[c])||0)+(homeworldMods()[c]||0)+5*(Number(state.characteristics.advances[c])||0)+(Number(state.characteristics.misc[c])||0)}
function charBonus(c){return Math.floor(finalCharacteristic(c)/10)}
function rawAptitudes(){
  let raw=[];
  const h=homeBy[state.origin.homeworld]||{}; const b=bgBy[state.origin.background]||{}; const r=roleBy[state.origin.role]||{};
  if(h['Home World Aptitude']) raw.push(normApt(h['Home World Aptitude']));
  parseAptitudePhrase(b['Background Aptitude'],'bg').forEach(x=>raw.push(normApt(x.chosen)));
  parseAptitudePhrase(r['Role Aptitudes'],'role').forEach(x=>raw.push(normApt(x.chosen)));
  return raw.filter(Boolean);
}
function computedAptitudes(){
  const raw=rawAptitudes();
  const count={}; raw.forEach(a=>count[a]=(count[a]||0)+1);
  let unique=[...new Set(raw)];
  let dupSlots=raw.length-unique.length;
  for(let i=0;i<dupSlots;i++){
    let rep=state.origin.duplicateReplacements['dup_'+i];
    if(rep && !unique.includes(rep)) unique.push(rep);
  }
  state.origin.manualAptitudes.forEach(a=>{a=normApt(a); if(a&&!unique.includes(a)) unique.push(a)});
  return unique;
}
function duplicateSlots(){const r=rawAptitudes(); return r.length - new Set(r).size;}
function aptCountFor(a1,a2){
  const owned=computedAptitudes().map(normApt);
  function anyMatch(s){
    s=String(s||'').replace(/†/g,'');
    if(!s || s==='-' || s==='–') return false;
    return s.split(/[\/]| or |,| and /i).map(normApt).some(x=>owned.includes(x));
  }
  return (anyMatch(a1)?1:0)+(anyMatch(a2)?1:0);
}
function skillRankLabel(n){return ['Untrained','Known','Trained','Experienced','Veteran'][Number(n)||0]||'Veteran'}
function charRankLabel(n){return ['None','Simple','Intermediate','Trained','Proficient','Expert'][Number(n)||0]||'Expert'}
function getSkillRank(name,spec=''){
  let max=0;
  state.purchases.forEach(p=>{if(p.kind==='skill'&&p.name===name&&(p.spec||'')===(spec||''))max=Math.max(max,Number(p.rank)||0)});
  return max;
}
function hasTalent(name){name=String(name||'').toLowerCase().replace(/†/g,'').trim(); return state.purchases.some(p=>p.kind==='talent' && String(p.name).toLowerCase().replace(/†/g,'').trim()===name)}
function hasElite(name){name=String(name||'').toLowerCase().trim(); return state.purchases.some(p=>p.kind==='elite' && String(p.name).toLowerCase().trim()===name)}
function hasOriginPsyRating(){
  const bgName=String((bgBy[state.origin.background]||{}).Name||state.origin.background||'').trim();
  const roleName=String((roleBy[state.origin.role]||{}).Name||state.origin.role||'').trim();
  // DH2e starting psyker sources. This is dynamic: changing away from Astra Telepathica/Mystic immediately removes the free floor.
  return bgName==='Adeptus Astra Telepathica' || roleName==='Mystic';
}
function basePsyRating(){
  return (hasOriginPsyRating() || hasElite('Psyker')) ? 1 : 0;
}
function cleanupPsyRatingState(){
  if(!Array.isArray(state.purchases)) state.purchases=[];
  const base=basePsyRating();
  // Remove impossible/corrupt PR entries and old legacy free PR 1 entries once the origin no longer grants it.
  state.purchases=state.purchases.filter(p=>{
    if(p.kind!=='psyRating') return true;
    const to=Number(p.to)||0;
    if(to<1 || to>10) return false;
    const isLegacyFree=(Number(p.xp)||0)===0 || /free|starting|origin|background|astra/i.test(String(p.detail||p.label||''));
    if(base===0 && to<=1 && isLegacyFree) return false;
    return true;
  });
}
function psyRatingIgnoring(ignoreId){
  let pr=basePsyRating();
  state.purchases.forEach(p=>{if(p.kind==='psyRating' && p.id!==ignoreId) pr=Math.max(pr,Number(p.to)||0)});
  return Math.min(10, pr);
}
function psyRating(){return psyRatingIgnoring(null);}
function powerRequiredPRByName(name){
  const p=DATA.psychicPowers.find(x=>x.Name===name)||{};
  const text=String((p.Prerequisite||'')+' '+(p.Effect||''));
  const m=text.match(/Psy\s*Rating\s*(\d+)/i);
  return m?Number(m[1]):1;
}
function highestOwnedPowerPR(){
  let need=0;
  state.purchases.forEach(p=>{if(p.kind==='psychicPower') need=Math.max(need,powerRequiredPRByName(p.name));});
  return need;
}
function latestPsyPurchase(){
  return state.purchases.filter(p=>p.kind==='psyRating').sort((a,b)=>(Number(b.to)||0)-(Number(a.to)||0))[0]||null;
}
function skillCost(name,nextRank){
  const s=skillBy[name]||{}; const c=aptCountFor(s['APTITUDE 1'],s['APTITUDE 2']); return DATA.costTables.skill[String(c)]?.[nextRank-1]||0;
}
function charCost(name,nextRank){
  const c=charBy[name]||{}; const n=aptCountFor(c['APTITUDE 1'],c['APTITUDE 2']); return DATA.costTables.characteristic[String(n)]?.[nextRank-1]||0;
}
function charAdvanceTotal(name,rank){
  rank=Number(rank)||0; let total=0;
  for(let i=1;i<=rank;i++) total+=charCost(name,i);
  return total;
}
function allCharAdvanceTotal(){
  return CHAR_NAMES.reduce((sum,c)=>sum+(c==='Influence'?0:charAdvanceTotal(c,state.characteristics.advances[c])),0);
}
function setCharAdv(c,delta){
  if(c==='Influence') return;
  let cur=Number(state.characteristics.advances[c])||0;
  let next=Math.max(0,Math.min(5,cur+delta));
  state.characteristics.advances[c]=next;
  // Remove legacy per-click characteristic purchases so old browser saves cannot double-charge XP.
  state.purchases=state.purchases.filter(p=>p.kind!=='characteristic');
  saveAuto(); renderAll();
}
function talentCost(t){let tier=String(t.Tier||'').toUpperCase().replace(/\s/g,''); const c=aptCountFor(t['Aptitude 1'],t['Aptitude 2']); return DATA.costTables.talent[tier]?.[String(c)]||0;}
function purchaseTotal(){return allCharAdvanceTotal()+state.purchases.filter(p=>p.kind!=='characteristic').reduce((a,p)=>a+(Number(p.xp)||0),0)}
function remainingXP(){return (Number(state.basics.xpBudget)||0)-purchaseTotal()}
function makeId(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function addPurchase(p){p.id=makeId(); state.purchases.push(p); saveAuto(); renderAll();}
function canRemovePurchase(p){
  if(!p) return false;
  if(p.kind==='skill'){
    return !state.purchases.some(x=>x.kind==='skill' && x.name===p.name && (x.spec||'')===(p.spec||'') && Number(x.rank)>Number(p.rank));
  }
  if(p.kind==='psyRating'){
    const latest=latestPsyPurchase();
    if(!latest || latest.id!==p.id) return false;
    return secondHighestPsyAfterRemoving(p) >= Math.max(basePsyRating(), highestOwnedPowerPR());
  }
  return true;
}

function requirementReport(text){
  text=String(text||'').replace(/†/g,'').replace(/\u00a0/g,' ').trim();
  if(!text || text==='-' || text==='–') return [{ok:true,msg:'No prerequisites'}];
  let reports=[];
  const charRegex=/(Weapon Skill|Ballistic Skill|Strength|Toughness|Agility|Intelligence|Perception|Willpower|Fellowship|Influence|WS|BS|Ag|Int|Per|WP|Fel|Inf|S|T)\s*(?:characteristic)?\s*(\d{2})/gi;
  let m, found=false;
  while((m=charRegex.exec(text))){found=true; let ch=CHAR_ABBR[m[1]]||m[1]; let need=Number(m[2]); reports.push({ok:finalCharacteristic(ch)>=need,msg:`${ch} ${need} (${finalCharacteristic(ch)})`});}
  const rankRegex=/Rank\s*(\d)\s*(?:\([^)]*\))?\s*(?:in|of)?\s*(?:the)?\s*([A-Za-z\- ]+?)(?: skill|$|,)/gi;
  while((m=rankRegex.exec(text))){found=true; let need=Number(m[1]); let sk=canonicalSkillName(m[2].trim()); let have=maxSkillRankByBase(sk); reports.push({ok:have>=need,msg:`${sk} rank ${need} (${skillRankLabel(have)})`});}
  const skillPlusRegex=/([A-Za-z\- ]+)\s*\+\s*(10|20|30)/gi;
  while((m=skillPlusRegex.exec(text))){let sk=canonicalSkillName(m[1].trim()); if(skillBy[sk]){found=true; let need=Number(m[2])/10+1; let have=maxSkillRankByBase(sk); reports.push({ok:have>=need,msg:`${sk} +${m[2]} (${skillRankLabel(have)})`});}}
  if(/Psy\s*Rating|Psy rating|Psyker/i.test(text)){found=true; let prMatch=text.match(/Psy\s*rating\s*(\d)/i); let need=prMatch?Number(prMatch[1]):1; reports.push({ok:psyRating()>=need,msg:`Psy Rating ${need} (${psyRating()})`});}
  // Talent name requirements: if a known talent appears as a phrase in prerequisites and is not just the current name.
  DATA.talents.forEach(t=>{let n=String(t.Name||''); if(n.length>3 && new RegExp('(^|[^A-Za-z])'+escapeRegExp(n)+'([^A-Za-z]|$)','i').test(text)){found=true; reports.push({ok:hasTalent(n),msg:`Talent: ${n}`});}});
  if(!found) reports.push({ok:null,msg:'Manual check: '+text});
  return reports;
}
function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function canonicalSkillName(s){
  s=String(s||'').replace(/the /i,'').replace(/skill/i,'').replace(/\([^)]*\)/g,'').replace(/Any/i,'').trim();
  const low=s.toLowerCase();
  let exact=DATA.skills.find(k=>String(k.Name).toLowerCase()===low); if(exact)return exact.Name;
  let fuzzy=DATA.skills.find(k=>low.includes(String(k.Name).toLowerCase()) || String(k.Name).toLowerCase().includes(low));
  return fuzzy?fuzzy.Name:s;
}
function maxSkillRankByBase(base){let max=0; state.purchases.forEach(p=>{if(p.kind==='skill' && p.name===base) max=Math.max(max,Number(p.rank)||0)}); return max;}

  $('armouryTab').innerHTML=`${sectionArt('armouryTab')}<div class="grid"><div class="card span12"><h2>Armoury, Mods, Tools, Cybernetics, Gear</h2><div class="row noPrint"><select id="armouryCat" onchange="window.armouryCat=this.value; renderArmouryTable()">${cats.map(c=>`<option ${cur===c?'selected':''}>${esc(c)}</option>`).join('')}</select><input id="armourySearch" placeholder="Search item..." oninput="renderArmouryTable()" style="max-width:420px"><input id="itemQty" type="number" value="1" min="1" style="max-width:90px"><select id="craft" style="max-width:150px"><option>Common</option><option>Poor</option><option>Good</option><option>Best</option></select><input id="itemNote" placeholder="inventory note / attached to weapon" style="max-width:360px"></div><div id="armouryTable" class="tablewrap"></div></div><div class="card span12"><h2>Inventory</h2>${inventoryTable()}</div></div>`; renderArmouryTable();
}
function renderArmouryTable(){const cat=$('armouryCat')?.value||Object.keys(DATA.categories)[0]; const q=($('armourySearch')?.value||'').toLowerCase(); const rows=(DATA.categories[cat]||[]).filter(it=>!q||JSON.stringify(it).toLowerCase().includes(q)).map((it,idx)=>{let priority=['Class','Family','Family - Class','Type','Damage','Pen','Range','RoF','Clip','Reload','Special Qualities','AP','Location','Max Ag','Weight','Used With','Used with','Upgrades','Effect','Benefit','Notes','Note','Description']; let cols=[...priority.filter(k=>k in it && it[k]!=='' && it[k]!=null), ...Object.keys(it).filter(k=>!['Name','Availability','Rarity','Availability/Rarity','Rarity/Availability','Page','Page #',...priority].includes(k) && it[k]!=='' && it[k]!=null)].slice(0,12); const rarity=itemRarity(it); return `<tr><td><strong>${esc(it.Name||it[Object.keys(it)[0]])}</strong><div class="muted tiny">${esc(it.Page||it['Page #']||'')}</div></td><td><span class="rarityBadge">${esc(rarity)}</span></td>${cols.map(c=>`<td><span class="tiny muted">${esc(c)}</span><br>${esc(it[c])}</td>`).join('')}<td><button onclick="addItemFromCat('${escAttr(cat)}',${idx})">Add</button></td></tr>`}).join(''); if($('armouryTable')) $('armouryTable').innerHTML=`<table><thead><tr><th>Name</th><th>Rarity</th><th colspan="12">Stats / Notes</th><th>Add</th></tr></thead><tbody>${rows}</tbody></table>`}
function addItemFromCat(cat,idx){const q=($('armourySearch')?.value||'').toLowerCase(); const list=(DATA.categories[cat]||[]).filter(it=>!q||JSON.stringify(it).toLowerCase().includes(q)); const it=list[idx]; if(!it)return; addInventory({category:cat,name:it.Name||it[Object.keys(it)[0]],rarity:itemRarity(it),qty:Number($('itemQty')?.value)||1,craft:$('craft')?.value||'Common',note:$('itemNote')?.value||'',data:it})}
function inventoryTable(){return `<div class="tablewrap"><table><thead><tr><th>Item</th><th>Cat</th><th>Rarity</th><th>Qty</th><th>Craft</th><th>Stats</th><th>Note</th><th></th></tr></thead><tbody>${state.inventory.map(i=>`<tr><td><strong>${esc(i.name)}</strong></td><td>${esc(i.category)}</td><td><span class="rarityBadge">${esc(i.rarity||itemRarity(i.data))}</span></td><td>${esc(i.qty)}</td><td>${esc(i.craft)}</td><td>${esc(shortStats(i.data))}</td><td>${esc(i.note)}</td><td><button class="bad" onclick="removeInventory('${i.id}')">Remove</button></td></tr>`).join('')}</tbody></table></div>`}
function shortStats(d){if(!d)return ''; return Object.entries(d).filter(([k,v])=>v && !['Name','Description','Notes','Note','Availability','Rarity','Availability/Rarity','Rarity/Availability'].includes(k)).slice(0,10).map(([k,v])=>`${k}: ${v}`).join(' | ')}
function renderReference(){
  const cats=Object.keys(DATA.references); const cur=window.refCat||cats[0];
  $('referenceTab').innerHTML=`${sectionArt('referenceTab')}<div class="grid"><div class="card span12"><h2>Full Reference Tables</h2><div class="row noPrint"><select id="refCat" onchange="window.refCat=this.value; renderRefTable()">${cats.map(c=>`<option ${cur===c?'selected':''}>${esc(c)}</option>`).join('')}</select><input id="refSearch" placeholder="Search reference..." oninput="renderRefTable()" style="max-width:420px"></div><div id="refTable" class="tablewrap"></div><p class="source">${DATA.meta.note}</p></div></div>`; renderRefTable();
}
function renderRefTable(){const cat=$('refCat')?.value||Object.keys(DATA.references)[0]; const q=($('refSearch')?.value||'').toLowerCase(); const rows=(DATA.references[cat]||[]).filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q)); let headers=[...new Set(rows.flatMap(r=>Object.keys(r)))]; if(!headers.length)headers=['Value']; if($('refTable')) $('refTable').innerHTML=`<table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${headers.map(h=>`<td>${esc(r[h]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
function purchaseTable(filter){
  let kinds=Array.isArray(filter)?filter:[filter];
  let rows=state.purchases.filter(p=>kinds.includes(p.kind) && p.kind!=='characteristic');
  if(!rows.length)return '<p class="muted">Nothing yet.</p>';
  return `<div class="tablewrap"><table><thead><tr><th>Entry</th><th>Kind</th><th>XP</th><th>Detail</th><th></th></tr></thead><tbody>${rows.map(p=>{let can=canRemovePurchase(p); return `<tr><td><strong>${esc(p.label||p.name)}</strong></td><td>${esc(p.kind)}</td><td>${xp(p.xp)}</td><td>${esc(p.detail||'')}</td><td><button class="bad" ${can?'': 'disabled title="Remove higher rank / Psy Rating dependency first"'} onclick="removePurchase('${p.id}')">Remove</button></td></tr>`}).join('')}</tbody></table></div>`
}
function renderFinal(){
  const h=homeBy[state.origin.homeworld]||{}, b=bgBy[state.origin.background]||{}, r=roleBy[state.origin.role]||{}, div=DATA.divinations.find(d=>String(d.Rolls)===String(state.origin.divination))||{};
  const byKind={}; state.purchases.filter(p=>p.kind!=='characteristic').forEach(p=>{(byKind[p.kind]||(byKind[p.kind]=[])).push(p)});
  const statRows=CHAR_NAMES.map(c=>`<tr><td>${esc(c)}</td><td>${finalCharacteristic(c)}</td><td>${charBonus(c)}</td><td>${c==='Influence'?'Not purchasable':esc(charRankLabel(state.characteristics.advances[c]))}</td><td>${c==='Influence'?'—':xp(charAdvanceTotal(c,state.characteristics.advances[c]))}</td></tr>`).join('');
  const skillRows=state.purchases.filter(p=>p.kind==='skill').sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<tr><td>${esc(p.name)} ${p.spec?'('+esc(p.spec)+')':''}</td><td>${esc(skillRankLabel(p.rank))}</td><td>${xp(p.xp)}</td></tr>`).join('');
  $('finalTab').innerHTML=`${sectionArt('finalTab')}<div class="grid"><div class="card span12"><h1>${esc(state.basics.name||'Unnamed Acolyte')}</h1><div class="row"><span class="pill">XP Budget <strong>${xp(state.basics.xpBudget)}</strong></span><span class="pill">Spent <strong>${xp(purchaseTotal())}</strong></span><span class="pill">Remaining <strong>${xp(remainingXP())}</strong></span><span class="pill">Psy Rating <strong>${psyRating()}</strong></span></div><p>${esc(state.basics.notes)}</p></div>
  <div class="card span4 summaryBlock"><h2>Origin</h2><table><tr><th>Homeworld</th><td>${esc(state.origin.homeworld)}</td></tr><tr><th>Background</th><td>${esc(state.origin.background)}</td></tr><tr><th>Role</th><td>${esc(state.origin.role)}</td></tr><tr><th>Divination</th><td>${esc(div.Rolls)} — ${esc(div['Divination Prophecy'])}<br>${esc(div['Divination Effect'])}</td></tr><tr><th>Wounds</th><td>${esc(h.Wounds)}</td></tr><tr><th>Fate</th><td>${esc(h['Fate Threshold'])} (${esc(h["Emperor's Blessing"])} blessing)</td></tr></table></div>
  <div class="card span4 summaryBlock"><h2>Aptitudes</h2><div class="chips">${computedAptitudes().map(a=>`<span class="chip good">${esc(a)}</span>`).join('')}</div><h3>Starting package notes</h3><p>${esc(state.origin.freeText)}</p></div>
  <div class="card span4 summaryBlock"><h2>Bonuses</h2><p><strong>Home:</strong> ${esc(h['Home World Bonus'])}</p><p><strong>Background:</strong> ${esc(b['Background Bonus'])}</p><p><strong>Role:</strong> ${esc(r['Role Bonus'])}</p></div>
  <div class="card span6 summaryBlock"><h2>Characteristics</h2><table><thead><tr><th>Characteristic</th><th>Final</th><th>Bonus</th><th>Advance</th><th>XP</th></tr></thead><tbody>${statRows}<tr><th colspan="4">Characteristic XP total</th><th>${xp(allCharAdvanceTotal())}</th></tr></tbody></table></div>
  <div class="card span6 summaryBlock"><h2>Skills</h2><table><thead><tr><th>Skill</th><th>Rank</th><th>XP paid</th></tr></thead><tbody>${skillRows||'<tr><td colspan="3" class="muted">No skills recorded.</td></tr>'}</tbody></table></div>
  ${finalPurchaseBlock('Talents','talent')}${finalPurchaseBlock('Elite / Psy Rating','elite','psyRating')}${finalPurchaseBlock('Psychic Powers','psychicPower')}
  <div class="card span12 summaryBlock"><h2>Inventory</h2>${inventoryTable()}</div><div class="card span12 source">Sources: ${DATA.meta.sources.map(esc).join(' • ')}</div></div>`;
}
function finalPurchaseBlock(title,...kinds){let rows=state.purchases.filter(p=>kinds.includes(p.kind) && p.kind!=='characteristic'); return `<div class="card span6 summaryBlock"><h2>${esc(title)}</h2><table><thead><tr><th>Name</th><th>XP</th><th>Detail</th></tr></thead><tbody>${rows.map(p=>`<tr><td>${esc(p.label||p.name)}</td><td>${xp(p.xp)}</td><td>${esc(p.detail||'')}</td></tr>`).join('')||'<tr><td colspan="3" class="muted">None.</td></tr>'}</tbody></table></div>`}
function renderTop(){$('xpBudgetTop').textContent=(Number(state.basics.xpBudget)||0).toLocaleString('en-US'); $('xpSpentTop').textContent=purchaseTotal().toLocaleString('en-US'); $('xpRemainTop').textContent=remainingXP().toLocaleString('en-US');}
function renderAll(){cleanupPsyRatingState(); renderTop(); renderNav(); renderSetup(); renderChar(); renderSkills(); renderTalents(); renderPsy(); renderArmoury(); renderReference(); if(activeTab==='finalTab')renderFinal(); document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); $(activeTab).classList.add('active');}
function saveAuto(){localStorage.setItem('dh2eGeneratorState', JSON.stringify(state));}
function sanitiseState(){
  state.purchases=(state.purchases||[]).filter(p=>p.kind!=='characteristic');
  cleanupPsyRatingState();
  if(!state.settings) state.settings={};
  if(state.settings.enforceReqsUserTouched!==true){state.settings.enforceReqs=true; state.settings.enforceReqsUserTouched=false;}
}
function loadAuto(){let raw=localStorage.getItem('dh2eGeneratorState'); if(raw){try{Object.assign(state, JSON.parse(raw)); sanitiseState(); return true}catch(e){console.warn(e)}} return false;}
function download(filename,text){let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:'application/json'})); a.download=filename; a.click(); URL.revokeObjectURL(a.href)}
$('saveBtn').onclick=()=>{saveAuto(); alert('Saved in this browser. Use Export JSON for a portable backup.')};
$('loadBtn').onclick=()=>{if(loadAuto()){renderAll(); alert('Loaded saved character.')}else alert('No saved local character found.')};
$('resetBtn').onclick=()=>{if(confirm('Reset everything in this browser? Export JSON first if you want a backup.')){localStorage.removeItem('dh2eGeneratorState'); location.reload();}};
$('exportBtn').onclick=()=>download((state.basics.name||'dh2e-character').replace(/[^a-z0-9_-]+/gi,'_')+'.json', JSON.stringify(state,null,2));
$('importBtn').onclick=()=>$('importFile').click();
$('importFile').onchange=e=>{let f=e.target.files[0]; if(!f)return; let reader=new FileReader(); reader.onload=()=>{try{let obj=JSON.parse(reader.result); Object.keys(state).forEach(k=>delete state[k]); Object.assign(state,obj); sanitiseState(); saveAuto(); renderAll(); alert('Imported.')}catch(err){alert('Import failed: '+err.message)}}; reader.readAsText(f)};
initDefaults(); loadAuto(); initDefaults(); renderAll();
</script>
</body>
</html>
